function confirmEingang(id,ablaufPflicht){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  const decOk=isDecUnit(a.einheit);
  const addMenge=decOk?(parseDecimal(document.getElementById('e-mg').value)||1):(parseInt(document.getElementById('e-mg').value)||1);
  const preis=parseDecimal(document.getElementById('e-pr').value)||0;
  const isAktion=document.getElementById('e-aktion')&&document.getElementById('e-aktion').checked;
  const kaufdatum=document.getElementById('e-kd').value||todayISO();
  const ablaufdatum=document.getElementById('e-ad').value;
  const geChip=document.querySelector('#e-ge .chip.on[data-ge]');
  const kaufort=geChip?geChip.dataset.ge:(a.kaufort||'');
  // Pflichtprüfung Ablaufdatum
  if(ablaufPflicht&&!ablaufdatum){
    const adDisplay=document.getElementById('e-ad-display');
    if(adDisplay){adDisplay.style.borderColor='var(--dg)';adDisplay.style.boxShadow='0 0 0 3px color-mix(in srgb,var(--dg) 20%,transparent)';}
    toast('Bitte Ablaufdatum eingeben — dieser Artikel hatte bisher immer eines');
    return;
  }
  // Neue Packung hinzufügen
  if(!a.packungen)a.packungen=[];
  a.packungen.push({id:newPackId(),menge:addMenge,kaufdatum,ablaufdatum});
  syncMenge(a); // a.menge + a.ablaufdatum aus Packungen neu berechnen
  a.kaufdatum=kaufdatum;
  if(kaufort)a.kaufort=kaufort;
  // Preis loggen
  if(!a.preisHistorie)a.preisHistorie=[];
  a.preisHistorie.push({datum:kaufdatum,preis,menge:addMenge,einheit:a.einheit||'Stk',typ:'ein',aktion:isAktion||false,kaufort:kaufort||''});
  if(preis>0&&!isAktion){a.preis=preis;}
  addLogEntry('ein',a.id,a.name,a.lager,a.kat,addMenge,a.einheit,preis,isAktion||false);
  saveL();
  const aktionHinweis=isAktion?' (Aktionspreis, Standardpreis unverändert)':'';
  toast('+'+fmtMenge(addMenge)+' '+esc(a.einheit||'Stk')+' · CHF '+(preis>0?preis.toFixed(2):'—')+aktionHinweis);
  goScreen('s-lager');
}

function processAusgangScan(code){
  if(!code)return;
  const list=document.getElementById('ausgang-list');
  const found=artikelByCode(code);
  if(!found){
    if(list.children.length===1&&list.children[0].textContent.includes('Noch keine'))list.innerHTML='';
    const div=document.createElement('div');
    div.className='ausgang-notfound';
    div.innerHTML=I.alert+' Unbekannter Barcode: '+esc(code);
    list.insertBefore(div,list.firstChild);
    toast('Barcode nicht gefunden: '+code);
    return;
  }
  ensurePackungen(found);
  const aktivePack=found.packungen.filter(p=>p.menge>0);
  if(aktivePack.length>1){
    // Mehrere Packungen — Auswahl-Dialog zeigen
    showAusgangPackDialog(found,list);
  }else{
    // Einzelne Packung — Bestätigungsdialog mit Vorher/Nachher
    showAusgangConfirmDialog(found,aktivePack[0]?aktivePack[0].id:null,list);
  }

function ausgangPackAbbuchen(a,packId,menge,list){
  if(!a)return;
  ensurePackungen(a);
  const pack=a.packungen.find(p=>p.id===packId);
  if(pack){
    pack.menge=Math.max(0,pack.menge-menge);
  }else if(a.packungen.length){
    // Fallback: erste Packung
    a.packungen[0].menge=Math.max(0,a.packungen[0].menge-menge);
  }
  syncMenge(a);
  // Ausgang in Preis-Historie loggen
  if(!a.preisHistorie)a.preisHistorie=[];
  a.preisHistorie.push({datum:todayISO(),preis:0,menge,einheit:a.einheit||'Stk',typ:'aus',aktion:false});
  addLogEntry('aus',a.id,a.name,a.lager,a.kat,menge,a.einheit,0);
  saveL();
  ausgangLog.unshift({id:a.id,name:a.name,foto:a.foto,lager:a.lager,einheit:a.einheit,zeit:Date.now()});
  if(list){
    if(list.children.length===1&&list.children[0].textContent.includes('Noch keine'))list.innerHTML='';
    const th=a.foto?'<div class="at"><img src="'+esc(a.foto)+'"/></div>':'<div class="at">'+I.pkg.replace('20px;height:20px','18px;height:18px')+'</div>';
    const div=document.createElement('div');
    div.className='ausgang-log';
    div.innerHTML=th+'<div class="ai"><div class="an">'+esc(a.name)+'</div><div class="am">'+esc(a.lager)+' · noch '+a.menge+' '+esc(a.einheit||'Stk')+'</div></div><div class="ausgang-badge">−1</div>';
    list.insertBefore(div,list.firstChild);
  }
  toast('−1 entnommen: '+a.name+' (noch '+a.menge+')');
}

function genOwnCode(){
  // Eigenes internes Code-Format: HB-000123 (6-stellig, fortlaufend)
  const used=new Set(S.a.filter(a=>a.ownCode).map(a=>a.ownCode));
  let n=S.a.length+1;
  let code;
  do{ code='HB-'+String(n).padStart(6,'0'); n++; }while(used.has(code));
  return code;
}

function getAblaufdatum(a){
  // Frühestes MHD aus Packungen, oder direkt a.ablaufdatum als Fallback
  if(a.packungen&&a.packungen.length){
    const withDate=a.packungen.filter(p=>p.menge>0&&p.ablaufdatum).sort((x,y)=>x.ablaufdatum.localeCompare(y.ablaufdatum));
    if(withDate.length)return withDate[0].ablaufdatum;
  }
  return a.ablaufdatum||'';
}

  const a=S.a.find(x=>x.id===artikelId);

  if(!a.barcode&&!a.ownCode){

    saveL();

  // Mehrere Packungen mit unterschiedlichen MHDs? → Auswahl-Dialog
  ensurePackungen(a);
  const aktive=a.packungen.filter(p=>p.menge>0);

function mmToPx(mm,dpi){ return Math.round(mm/25.4*(dpi||96)); }

function renderLabelPreview(){
  const a=etikettArtikel();
  if(!a)return;
  const fmt=DK_FORMATS.find(f=>f.id===labelFormatId)||DK_FORMATS[0];
  const code=a.barcode||a.ownCode;
  const showPrice=document.getElementById('lbl-show-price')&&document.getElementById('lbl-show-price').checked;
  const showKaufdatum=document.getElementById('lbl-show-kaufdatum')&&document.getElementById('lbl-show-kaufdatum').checked;
  const showAblauf=document.getElementById('lbl-show-ablauf')&&document.getElementById('lbl-show-ablauf').checked;
  drawLabelCanvas('label-canvas',a,fmt,code,showPrice,showKaufdatum,showAblauf,4); // async, kein await nötig für Vorschau
}

async function drawLabelCanvas(canvasId,a,fmt,code,showPrice,showKaufdatum,showAblauf,scale){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpi=scale*96;
  const wpx=mmToPx(fmt.printW,dpi);
  const hpx=mmToPx(fmt.printH||40,dpi);
  canvas.width=wpx;
  canvas.height=hpx;
  canvas.style.width=mmToPx(fmt.printW,96*2)+'px';
  canvas.style.height=mmToPx(fmt.printH||40,96*2)+'px';
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,wpx,hpx);

  if(fmt.id==='dk11204'){
    // DK-11204: 54mm × 17mm
    // Layout: QR-Code links (quadratisch, volle Höhe), Text rechts
    const pad=Math.round(scale*3);
    const qrSize=hpx; // QR-Code nimmt volle Höhe = quadratisch
    const textX=qrSize+pad;
    const textW=wpx-qrSize-pad*2;

    // QR-Code via QRCode.js auf temporäres Canvas rendern
    const qrContainer=document.createElement('div');
    qrContainer.style.display='none';
    document.body.appendChild(qrContainer);
    let qrOk=false;
    try{
      new QRCode(qrContainer,{
        text:code,
        width:qrSize,
        height:qrSize,
        colorDark:'#000000',
        colorLight:'#ffffff',
        correctLevel:QRCode.CorrectLevel.M,
      });
      // QRCode.js erzeugt ein <canvas> oder <img> — beides abfangen
      const qrCanvas=qrContainer.querySelector('canvas');
      const qrImg=qrContainer.querySelector('img');
      if(qrCanvas){
        ctx.drawImage(qrCanvas,0,0,qrSize,qrSize);
        qrOk=true;
      }else if(qrImg){
        // img könnte noch laden — kurze Wartezeit via Promise
        await new Promise(res=>{
          if(qrImg.complete){ctx.drawImage(qrImg,0,0,qrSize,qrSize);qrOk=true;res();}
          else{qrImg.onload=()=>{ctx.drawImage(qrImg,0,0,qrSize,qrSize);qrOk=true;res();};qrImg.onerror=()=>res();}
        });
      }
    }catch(e){qrOk=false;}
    qrContainer.remove();

    if(!qrOk){
      // Fallback: Code128 Barcode wenn QR fehlschlägt
      const bcCanvas=document.createElement('canvas');
      try{
        JsBarcode(bcCanvas,code,{format:'CODE128',width:Math.max(2,Math.floor(wpx/80)),height:hpx-pad,fontSize:0,margin:0,displayValue:false,background:'#ffffff',lineColor:'#000000'});
        ctx.drawImage(bcCanvas,0,0,Math.min(bcCanvas.width,wpx*0.6),hpx);
      }catch(e){}
    }

    // Text rechts vom QR-Code:
    // Zeile 1: Name (bold, gross)
    // Zeile 2: MHD (gross, auffällig)
    // Zeile 3: Kauf + Preis (klein, eine Zeile)
    const line1=a.name;
    const line2=showAblauf&&a.ablaufdatum?'MHD: '+fmtDateCH(a.ablaufdatum):'';
    const line3Parts=[];
    if(showKaufdatum&&a.kaufdatum)line3Parts.push('Kauf: '+fmtDateCH(a.kaufdatum));
    if(showPrice&&a.preis)line3Parts.push('CHF '+a.preis.toFixed(2));
    const line3=line3Parts.join('  ');

    const lines=[line1,line2,line3].filter(Boolean);
    // Gewichtung: Name 35%, MHD 40%, Kauf+Preis 25%
    const weights=lines.length===3?[0.35,0.40,0.25]:lines.length===2?[0.5,0.5]:[1];
    const totalH=hpx-pad*2;

    ctx.textBaseline='top';
    let curY=pad;
    lines.forEach((line,i)=>{
      const lineH=Math.round(totalH*weights[i]);
      const bold=i===0?'bold ':'bold '; // Name und MHD beide bold
      const maxFs=Math.round(lineH*0.78);
      let fs=maxFs;
      do{fs=Math.max(fs-1,5);ctx.font=bold+fs+'px sans-serif';}
      while(fs>5&&ctx.measureText(line).width>textW);
      // Kauf+Preis-Zeile nicht bold
      if(i===lines.length-1&&lines.length===3){
        ctx.font=fs+'px sans-serif';
      }
      ctx.fillStyle=i===1?'#000000':i===0?'#000000':'#444444';
      ctx.fillText(line,textX,curY+Math.round((lineH-fs)*0.2));
      curY+=lineH;
    });

  }else{
    // Andere Formate: Barcode oben, Text darunter
    const pad=Math.round(scale*3);
    const bcCanvas=document.createElement('canvas');
    let bcOk=false;
    try{
      JsBarcode(bcCanvas,code,{
        format:'CODE128',
        width:Math.max(1,Math.round(scale*1.3)),
        height:Math.round(hpx*0.55),
        fontSize:Math.round(scale*7),
        margin:Math.round(scale*2),
        displayValue:true,
        background:'#ffffff',
        lineColor:'#000000',
      });
      bcOk=true;
    }catch(e){bcOk=false;}

    if(bcOk){
      const bcDisplayH=Math.round(hpx*0.6);
      ctx.drawImage(bcCanvas,0,0,bcCanvas.width,bcCanvas.height, pad,0,wpx-pad*2,bcDisplayH);
      drawInfoText(ctx,a,wpx,hpx,pad,bcDisplayH+pad,wpx-pad*2,scale,showPrice,showKaufdatum,showAblauf);
    }else{
      drawInfoText(ctx,a,wpx,hpx,pad,pad,wpx-pad*2,scale,showPrice,showKaufdatum,showAblauf);
    }
  }
}

function drawInfoText(ctx,a,wpx,hpx,x,y,maxW,scale,showPrice,showKaufdatum,showAblauf){
  const fs=Math.max(6,Math.round(scale*6.5));
  const fsSmall=Math.max(5,Math.round(scale*5.5));
  const lh=Math.round(fs*1.4);
  ctx.fillStyle='#000000';
  ctx.textBaseline='top';
  // Name (bold)
  ctx.font='bold '+fs+'pt sans-serif';
  const name=truncText(ctx,a.name,maxW);
  ctx.fillText(name,x,y);
  let cy=y+lh;
  // Sublines
  ctx.font=fsSmall+'pt sans-serif';
  ctx.fillStyle='#333333';
  const subs=[];
  if(a.marke)subs.push(a.marke);
  if(a.lager)subs.push(a.lager);
  if(showPrice&&a.preis)subs.push('CHF '+a.preis.toFixed(2));
  if(showKaufdatum&&a.kaufdatum)subs.push('Kauf: '+fmtDateCH(a.kaufdatum));
  if(showAblauf&&a.ablaufdatum)subs.push('MHD: '+fmtDateCH(a.ablaufdatum));
  subs.forEach(s=>{
    if(cy+lh>hpx)return;
    ctx.fillText(truncText(ctx,s,maxW),x,cy);
    cy+=Math.round(lh*0.9);
  });
}

function drawTextOnly(ctx,a,fmt,wpx,hpx,scale,showPrice,showKaufdatum,showAblauf){

function truncText(ctx,text,maxW){
  if(ctx.measureText(text).width<=maxW)return text;
  let t=text;
  while(t.length>1&&ctx.measureText(t+'…').width>maxW)t=t.slice(0,-1);
  return t+'…';
}

function parseRezepte(j){
  // Unterstützt mehrere JSON-Strukturen:
  // 1. {recipes:[{name, ings:[{n,q,u}], portions, cat, ...}]} — Rezeptbuch-Format
  // 2. {rezepte:[{name, zutaten:[...], port, kat, ...}]} — internes Format
  // 3. [{name, zutaten:[...]}] — Array-Format
  const raw=Array.isArray(j)?j:(j.recipes||j.rezepte||[]);
  return raw.map(r=>{
    // Zutaten normalisieren: {n,q,u} → Zutatname-String
    let zutaten=r.zutaten||[];
    if(!zutaten.length&&r.ings){
      zutaten=r.ings.map(i=>i.n||(i.name||''));
    }
    return {
      name:r.name||'',
      kat:r.kat||r.cat||'',
      port:r.port||r.portions||4,
      min:r.min||r.time||30,
      emoji:r.emoji||'🍽️',
      zutaten,
      ings:r.ings||[], // original behalten für Detailansicht
      img:r.img||r.foto||'',
    };
  });
}
async function syncRezepte(){
  if(!gh.tok||!gh.own){
    toast('GitHub noch nicht konfiguriert — bitte zuerst in Einstellungen verbinden');
    goScreen('s-settings');
    return;
  }
  // Rezepte kommen aus dem Rezeptbuch-Repo (kann ein anderes Repo sein als haushaltbuch)
  const rzRepo=gh.rzrepo||gh.repo; // Fallback auf haushaltbuch-Repo wenn nicht konfiguriert
  toast('Lade Rezepte von GitHub…');
  try{
    // Direkt per fetch, da ghGet immer gh.repo verwendet
    const url='https://api.github.com/repos/'+gh.own+'/'+rzRepo+'/contents/Rezepte.json';
    const r=await fetch(url,{headers:{
      'Authorization':'token '+gh.tok,
      'Accept':'application/vnd.github.v3+json',
    }});
    if(!r.ok){
      // Fallback: kleingeschriebene Variante versuchen
      const r2=await fetch('https://api.github.com/repos/'+gh.own+'/'+rzRepo+'/contents/rezepte.json',{headers:{
        'Authorization':'token '+gh.tok,
        'Accept':'application/vnd.github.v3+json',
      }});
      if(!r2.ok)throw new Error('Datei nicht gefunden in '+rzRepo+' ('+r.status+')');
      const f2=await r2.json();
      const j2=JSON.parse(b64DecodeUtf8(f2.content.replace(/\n/g,'')));
      S.rz=parseRezepte(j2);
    }else{
      const f=await r.json();
      const j=JSON.parse(b64DecodeUtf8(f.content.replace(/\n/g,'')));
      S.rz=parseRezepte(j);
    }
    saveL();renderRezepte();
    // KI-Cache invalidieren — neue Rezepte brauchen neuen Abgleich
    aiMatchCache={};
    toast(S.rz.length+' Rezepte geladen');
  }catch(e){
    toast('Fehler: '+e.message.slice(0,60));
  }
}

// Synonym-Lookup-Map aufbauen
const SYNONYM_MAP=new Map();
SYNONYME.forEach(gruppe=>{
  gruppe.forEach(wort=>{
    SYNONYM_MAP.set(wort.toLowerCase(), gruppe.map(w=>w.toLowerCase()));
  });
});

function getSynonymGruppe(wort){
  const w=wort.toLowerCase().trim();
  if(SYNONYM_MAP.has(w))return SYNONYM_MAP.get(w);
  // Teilstring nur für Schlüssel mind. 5 Zeichen — verhindert «ei» in «Portwein»
  for(const [key,gruppe] of SYNONYM_MAP){
    if(key.length>=5&&(w.includes(key)||(key.includes(w)&&w.length>=5)))return gruppe;
  }
  return [w];
}

// Grundzutaten: immer als vorhanden gewertet (Selbstverständlichkeiten, nicht im Lager getrackt)
const GRUNDZUTATEN=['wasser','salz','pfeffer','öl','olivenöl','rapsöl','sonnenblumenöl','pflanzenöl','zucker','mehl','essig'];
function istGrundzutat(z){
  const w=z.toLowerCase().trim();
  return GRUNDZUTATEN.some(g=>w===g||w.includes(g)||g.includes(w)&&w.length>=3);
}

function aiMatch(zutat,lagerNamen){
  const z=zutat.toLowerCase().trim();
  // Grundzutaten gelten immer als vorhanden
  if(istGrundzutat(z))return true;
  const zGruppe=getSynonymGruppe(z);
  return lagerNamen.some(n=>{
    const nl=n.toLowerCase().trim();
    if(nl===z)return true;
    // Teilstring nur wenn beide mind. 5 Zeichen
    if(z.length>=5&&nl.length>=5&&(nl.includes(z)||z.includes(nl)))return true;
    // Synonymgruppen: nur exakte Übereinstimmungen
    const nGruppe=getSynonymGruppe(nl);
    return zGruppe.some(zs=>nGruppe.some(ns=>ns===zs));
  });
}

function renderRezepte(){
  const names=S.a.filter(a=>a.menge>0).map(a=>a.name.toLowerCase());
  const q=(document.getElementById('rezept-search')?.value||'').toLowerCase().trim();
  const src=S.rz.length?S.rz.map(r=>{
    const zt=(r.zutaten||[]).map(z=>typeof z==='string'?z:(z.n||z.zutat||z.name||''));
    return{id:r.id||r.titel,name:r.titel||r.name,emoji:r.emoji||'\uD83C\uDF7D',min:r.dauer||r.zeit||20,port:r.portionen||4,zt,img:r.img||'',ings:r.ings||[],kat:r.kat||r.cat||''};
  }):[
    {id:1,name:'Pasta Carbonara',emoji:'\uD83C\uDF5D',min:20,port:4,zt:['Pasta','Eier','Speck','Parmesan','Rahm'],img:''},
    {id:2,name:'Gemüsesuppe',emoji:'\uD83C\uDF72',min:40,port:6,zt:['Karotten','Lauch','Sellerie','Kartoffeln','Bouillon'],img:''},
    {id:3,name:'Pfannkuchen',emoji:'\uD83E\uDD5E',min:20,port:4,zt:['Mehl','Eier','Milch','Butter','Salz'],img:''},
  ];
  // Suchfilter anwenden
  const filtered=q?src.filter(r=>
    r.name.toLowerCase().includes(q)||
    (r.zt||[]).some(z=>z.toLowerCase().includes(q))||
    (r.kat||'').toLowerCase().includes(q)
  ):src;
  // Bald ablaufende Lager-Artikel ermitteln (Bestand>0, effektiv ≤7 Tage)
  const ablaufArtikel=S.a.filter(a=>a.menge>0&&a.ablaufdatum&&effektiveTage(a)!==null&&effektiveTage(a)<=7);
  const ablaufNamen=ablaufArtikel.map(a=>({name:a.name.toLowerCase(),tage:effektiveTage(a)}));

  const sc=filtered.map(r=>{
    const have=r.zt.filter(z=>aiMatch(z,names));
    // Welche vorhandenen Zutaten laufen bald ab?
    const ablaufZutaten=[];
    let minTage=999;
    r.zt.forEach(z=>{
      const zl=z.toLowerCase();
      ablaufNamen.forEach(an=>{
        if(zl===an.name||(zl.length>=5&&an.name.length>=5&&(zl.includes(an.name)||an.name.includes(zl)))){
          ablaufZutaten.push(z);
          if(an.tage<minTage)minTage=an.tage;
        }
      });
    });
    return{...r,have,pct:Math.round(have.length/Math.max(r.zt.length,1)*100),ablaufZutaten:[...new Set(ablaufZutaten)],minAblaufTage:ablaufZutaten.length?minTage:null};
  }).sort((a,b)=>{
    // Zuerst: kochbare Rezepte mit bald ablaufenden Zutaten (dringlichste zuerst)
    const aDring=a.pct>=50&&a.minAblaufTage!==null;
    const bDring=b.pct>=50&&b.minAblaufTage!==null;
    if(aDring&&bDring)return a.minAblaufTage-b.minAblaufTage;
    if(aDring!==bDring)return aDring?-1:1;
    return b.pct-a.pct;
  });
  // Rezepte mit bald ablaufenden Zutaten (und mind. halb kochbar)
  const dringend=sc.filter(r=>r.pct>=50&&r.minAblaufTage!==null);
  const full=sc.filter(r=>r.pct===100&&r.minAblaufTage===null),part=sc.filter(r=>r.pct>=50&&r.pct<100&&r.minAblaufTage===null),miss=sc.filter(r=>r.pct<50);
  let h='';
  if(q&&!sc.length){
    h='<div style="text-align:center;padding:32px 16px;color:var(--t3);font-size:14px">Kein Rezept gefunden für «'+esc(q)+'»</div>';
  }else{
    if(!src.length)h='<div class="empty">'+I.pkg+'<p>Keine Rezepte</p><small>GitHub synchronisieren um rezepte.json zu laden</small></div>';
    if(dringend.length)h+='<div class="sh" style="color:var(--wn)">⏰ Bald ablaufende Zutaten verwerten ('+dringend.length+')</div>'+dringend.map(rcCard).join('');
    if(full.length)h+='<div class="sh">Vollständig kochbar ('+full.length+')</div>'+full.map(rcCard).join('');
    if(part.length)h+='<div class="sh">Fast kochbar</div>'+part.map(rcCard).join('');
    if(miss.length)h+='<div class="sh">Zutaten fehlen</div>'+miss.map(rcCard).join('');
  }
  document.getElementById('rezept-list').innerHTML=h;
}

  document.getElementById('rezept-detail-body').innerHTML=

    '<div style="display:flex;gap:12px;margin-bottom:16px">'+
      '<div style="flex:1;background:var(--bg);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:20px">👥</div><div style="font-size:12px;color:var(--t2);margin-top:2px">'+r.port+' Port.</div></div>'+
      '<div style="flex:1;background:var(--bg);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:20px">⏱️</div><div style="font-size:12px;color:var(--t2);margin-top:2px">'+r.min+' min</div></div>'+
      (r.kat?'<div style="flex:1;background:var(--bg);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:20px">🏷️</div><div style="font-size:12px;color:var(--t2);margin-top:2px">'+esc(r.kat)+'</div></div>':'')+
    '</div>'+
    '<div style="font-weight:600;font-size:15px;margin-bottom:8px">Zutaten</div>'+

  goScreen('s-rezept-detail');

function ekAddZutat(z,existing){
  // z kann String (alt) oder {n,q,u}-Objekt (neu, mit Menge) sein
  const name=typeof z==='string'?z:(z.n||'');
  if(!name||existing.has(name.toLowerCase()))return null;
  const menge=typeof z==='object'?(z.q||''):'';
  const einheit=typeof z==='object'?(z.u||''):'';
  S.ek.push({id:Date.now()+Math.random(),text:name,menge,einheit,checked:false});
  existing.add(name.toLowerCase());
  return name;
}
function addMissingFromDetail(){
  const btn=event.currentTarget;
  let miss=[];
  try{miss=JSON.parse(btn.dataset.miss);}catch(e){return;}
  if(!S.ek)S.ek=[];
  const existing=new Set(S.ek.map(e=>e.text.toLowerCase()));
  const added=[];
  miss.forEach(z=>{const n=ekAddZutat(z,existing);if(n)added.push(n);});
  if(added.length){saveL();toast(added.length+' Zutat'+(added.length===1?'':'en')+' auf Einkaufsliste (mit Menge)');}
  else toast('Alle schon auf der Einkaufsliste');
}
function addMissingToEinkauf(btn){
  let miss=[];
  try{miss=JSON.parse(btn.dataset.miss);}catch(e){return;}
  if(!S.ek)S.ek=[];
  const existing=new Set(S.ek.map(e=>e.text.toLowerCase()));
  const added=[];
  miss.forEach(z=>{const n=ekAddZutat(z,existing);if(n)added.push(n);});
  if(added.length){
    saveL();
    toast(added.length+' Zutat'+(added.length===1?'':'en')+' auf Einkaufsliste');
    btn.style.background='var(--ol)';
    btn.style.borderColor='color-mix(in srgb,var(--ok) 40%,transparent)';
    btn.style.color='var(--ok)';
    btn.textContent='✓ Zur Einkaufsliste hinzugefügt';
    btn.disabled=true;
  }else{
    toast('Alle fehlenden Zutaten schon auf der Einkaufsliste');
  }
}

let statPeriod=30;
function renderStatPeriodChips(){
  const opts=[{d:7,l:'7 Tage'},{d:30,l:'30 Tage'},{d:90,l:'90 Tage'},{d:365,l:'1 Jahr'},{d:99999,l:'Alle'}];

}
function setStatPeriod(d){statPeriod=d;renderStat();}

function renderStat(){
  renderStatPeriodChips();
  const log=S.log||[];
  const cutoff=statPeriod>=99999?0:Date.now()-statPeriod*86400000;
  const filtered=log.filter(e=>e.zeit>=cutoff);
  const ein=filtered.filter(e=>e.t==='ein');
  const aus=filtered.filter(e=>e.t==='aus');
  const weg=filtered.filter(e=>e.t==='weg');
  const totalEin=ein.reduce((s,e)=>s+e.menge,0);
  const totalAus=aus.reduce((s,e)=>s+e.menge,0);
  const totalAusgaben=ein.reduce((s,e)=>s+(e.preis||0)*e.menge,0);
  const aktionen=ein.filter(e=>e.aktion);
  const totalAktion=aktionen.reduce((s,e)=>s+(e.preis||0)*e.menge,0);
  // Foodwaste
  const totalWeg=weg.reduce((s,e)=>s+e.menge,0);
  const totalWegWert=weg.reduce((s,e)=>s+(e.preis||0)*e.menge,0);
  // Aktionen-Ersparnis: Differenz zwischen Normalpreis (a.preis heute) und bezahltem Aktionspreis
  let ersparnis=0;
  aktionen.forEach(e=>{
    const art=S.a.find(x=>x.id===e.aid);
    const normal=art?(art.preis||0):0;
    if(normal>e.preis)ersparnis+=(normal-e.preis)*e.menge;
  });

  if(!filtered.length){
    document.getElementById('stat-body').innerHTML=
      '<div style="text-align:center;padding:40px 16px;color:var(--t3);font-size:14px">Noch keine Bewegungen erfasst.<br>Statistik füllt sich automatisch beim Erfassen von Eingängen und Ausgängen.</div>';
    return;
  }

  let h='';

  // 1. Überblick-Kennzahlen
  const avgAusgaben=totalAusgaben>0&&statPeriod<99999?(totalAusgaben/(statPeriod/30)).toFixed(2):'—';
  h+='<div class="sh">Überblick</div>';
  h+='<div class="stg">'+
    '<div class="stc"><div class="stl">Eingänge</div><div class="stn ok">'+totalEin+'</div></div>'+
    '<div class="stc"><div class="stl">Ausgänge</div><div class="stn" style="color:var(--dg)">'+totalAus+'</div></div>'+
    '<div class="stc"><div class="stl">Ausgaben total</div><div class="stn a">CHF '+(totalAusgaben>0?totalAusgaben.toFixed(2):'—')+'</div></div>'+
    '<div class="stc"><div class="stl">Ø pro Monat</div><div class="stn a">CHF '+avgAusgaben+'</div></div>'+
  '</div>';

  // Foodwaste + Ersparnis Kacheln
  if(totalWeg>0||ersparnis>0){
    h+='<div class="stg" style="margin-top:8px">'+
      (totalWeg>0?'<div class="stc"><div class="stl">🗑 Verworfen</div><div class="stn" style="color:var(--wn)">'+totalWeg+' Stk</div><div style="font-size:11px;color:var(--t2);margin-top:2px">≈ CHF '+totalWegWert.toFixed(2)+' Wert</div></div>':'')+
      (ersparnis>0?'<div class="stc"><div class="stl">💰 Aktions-Ersparnis</div><div class="stn ok">CHF '+ersparnis.toFixed(2)+'</div><div style="font-size:11px;color:var(--t2);margin-top:2px">'+aktionen.length+' Aktionskäufe</div></div>':'')+
    '</div>';
  }

  // Foodwaste-Muster-Auswertung
  if(opt.fwAuswertung&&weg.length>=2){
    // Nach Artikelname gruppieren
    const proArtikel={};
    weg.forEach(e=>{const k=e.name||'?';if(!proArtikel[k])proArtikel[k]={anzahl:0,wert:0,menge:0};proArtikel[k].anzahl++;proArtikel[k].menge+=e.menge;proArtikel[k].wert+=(e.preis||0)*e.menge;});
    const topArtikel=Object.entries(proArtikel).sort((a,b)=>b[1].anzahl-a[1].anzahl).slice(0,5);
    // Nach Kategorie gruppieren
    const proKat={};
    weg.forEach(e=>{const k=e.kat||'?';if(!proKat[k])proKat[k]=0;proKat[k]+=(e.preis||0)*e.menge;});
    const topKat=Object.entries(proKat).sort((a,b)=>b[1]-a[1])[0];
    h+='<div class="stat-chart-card" style="margin-top:8px"><div class="stat-chart-title">🔍 Foodwaste-Muster</div>';
    if(topKat&&totalWegWert>0){
      const pct=Math.round(topKat[1]/totalWegWert*100);
      h+='<div style="font-size:13px;color:var(--t2);margin:6px 0 10px">Grösster Verlust-Bereich: <strong style="color:var(--wn)">'+esc(topKat[0])+'</strong> ('+pct+'% des Wertes)</div>';
    }
    h+=topArtikel.map(([name,d])=>
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)">'+
        '<span style="font-size:13px">'+esc(name)+'</span>'+
        '<span style="font-size:12px;color:var(--wn);font-weight:600">'+d.anzahl+'× · CHF '+d.wert.toFixed(2)+'</span>'+
      '</div>'
    ).join('');
    h+='<div style="font-size:11px;color:var(--t3);margin-top:8px;line-height:1.5">💡 Tipp: Bei häufig verworfenen Artikeln kleinere Mengen kaufen oder den Mindestbestand senken.</div>';
    h+='</div>';
  }

  // 2. Ausgaben gesamt + Aktionen
  if(totalAusgaben>0){
    const aktionPct=totalAusgaben>0?Math.round(totalAktion/totalAusgaben*100):0;
    h+='<div class="stat-chart-card">'+
      '<div class="stat-chart-title">Ausgaben im Zeitraum</div>'+
      '<div style="font-size:28px;font-weight:700;color:var(--ac);margin:4px 0">CHF '+totalAusgaben.toFixed(2)+'</div>'+
      (totalAktion>0?'<div style="font-size:13px;color:var(--wn);margin-top:4px">🏷️ Davon Aktionspreise: CHF '+totalAktion.toFixed(2)+' ('+aktionPct+'%)</div>':'')+
    '</div>';
  }

  // 3. Wöchentliche Bewegungen
  h+=renderWeeklyChart(filtered);

  // 4. Ausgaben nach Monat (wenn Zeitraum >= 60 Tage)
  if(statPeriod>=60||statPeriod>=99999){
    h+=renderMonthlySpendChart(ein.filter(e=>e.preis>0));
  }

  // 5. Meistverbrauchte Artikel
  h+=renderTopItemsChart(aus,'Meistverbrauchte Artikel','aus');

  // 6. Meistgekaufte Artikel (Eingänge)
  h+=renderTopItemsChart(ein,'Meistgekaufte Artikel','ein');

  // 7. Ausgaben nach Kategorie
  h+=renderCategorySpendChart(ein.filter(e=>e.preis>0));

  // 8. Ausgaben nach Lagerort
  h+=renderLocationSpendChart(ein.filter(e=>e.preis>0));

  // 9. Umschlagshäufigkeit (Eingang vs Ausgang pro Artikel)
  h+=renderTurnoverChart(filtered);

  // 10. Letzte Bewegungen
  h+='<div class="sh">Letzte Bewegungen</div>';
  const recent=filtered.slice().reverse().slice(0,30);
  h+=recent.map(e=>{
    const icon=e.t==='ein'?'<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>':'<svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
    const dt=new Date(e.zeit);
    const ts=fmtDateCH(e.datum)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    const priceStr=e.preis>0?' · CHF '+(e.preis*e.menge).toFixed(2)+(e.aktion?' 🏷️':''):'';
    const deletedBadge=e.geloescht?'<span style="font-size:10px;background:var(--b2);color:var(--t2);border-radius:6px;padding:1px 5px;margin-left:4px">gelöscht</span>':'';
    return '<div class="log-entry"><div class="log-icon '+e.t+'">'+icon+'</div><div class="log-info"><div class="log-name">'+esc(e.name)+deletedBadge+'</div><div class="log-meta">'+ts+' · '+esc(e.lager||'')+priceStr+'</div></div><div class="log-amt '+e.t+'">'+(e.t==='ein'?'+':'−')+e.menge+' '+esc(e.einheit||'Stk')+'</div></div>';
  }).join('');
  if(filtered.length>30)h+='<div style="text-align:center;padding:8px;color:var(--t3);font-size:12px">… und '+(filtered.length-30)+' weitere Einträge</div>';

  document.getElementById('stat-body').innerHTML=h;
}

function renderMonthlySpendChart(entries){
  if(!entries.length)return '';
  const byMonth={};
  entries.forEach(e=>{
    const m=e.datum?e.datum.slice(0,7):'';
    if(!m)return;
    byMonth[m]=(byMonth[m]||0)+(e.preis||0)*e.menge;
  });
  const months=Object.keys(byMonth).sort().slice(-12);
  if(months.length<2)return '';
  const max=Math.max(...months.map(m=>byMonth[m]));
  const rows=months.map(m=>{
    const [y,mo]=m.split('-');
    const lbl=mo+'/'+y.slice(2);
    const pct=Math.max(6,Math.round(byMonth[m]/max*100));
    return '<div class="bar-row"><div class="bar-label">'+esc(lbl)+'</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pct+'%"><span class="bar-val">CHF '+byMonth[m].toFixed(0)+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Ausgaben nach Monat</div><div class="stat-chart-sub">Letzte '+months.length+' Monate</div>'+rows+'</div>';
}

function renderLocationSpendChart(entries){
  if(!entries.length)return '';
  const byLager={};
  entries.forEach(e=>{const l=e.lager||'Unbekannt';byLager[l]=(byLager[l]||0)+(e.preis||0)*e.menge;});
  const sorted=Object.entries(byLager).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)return '';
  const max=sorted[0][1];
  const rows=sorted.map(([l,sum])=>{
    const pct=Math.max(6,Math.round(sum/max*100));
    return '<div class="bar-row"><div class="bar-label" title="'+esc(l)+'">'+esc(l)+'</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pct+'%"><span class="bar-val">CHF '+sum.toFixed(0)+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Ausgaben nach Lagerort</div><div class="stat-chart-sub">Zeigt wo eingekauft/gelagert wird</div>'+rows+'</div>';
}

function renderTurnoverChart(filtered){
  const byArt={};
  filtered.forEach(e=>{
    if(!byArt[e.name])byArt[e.name]={ein:0,aus:0};
    byArt[e.name][e.t]+=e.menge;
  });
  const sorted=Object.entries(byArt).filter(([,v])=>v.ein>0&&v.aus>0).sort((a,b)=>(b[1].aus+b[1].ein)-(a[1].aus+a[1].ein)).slice(0,6);
  if(!sorted.length)return '';
  const maxVal=Math.max(...sorted.map(([,v])=>Math.max(v.ein,v.aus)));
  const rows=sorted.map(([name,v])=>{
    const pEin=Math.max(4,Math.round(v.ein/maxVal*100));
    const pAus=Math.max(4,Math.round(v.aus/maxVal*100));
    return '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:3px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(name)+'</div>'+
      '<div class="bar-row" style="margin-bottom:2px"><div class="bar-label" style="font-size:11px;color:var(--ok)">Eingang</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pEin+'%"><span class="bar-val">'+v.ein+'</span></div></div></div>'+
      '<div class="bar-row"><div class="bar-label" style="font-size:11px;color:var(--dg)">Ausgang</div><div class="bar-track"><div class="bar-fill aus" style="width:'+pAus+'%"><span class="bar-val">'+v.aus+'</span></div></div></div>'+
    '</div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Umschlag: Eingang vs. Ausgang</div><div class="stat-chart-sub">Top Artikel nach Gesamtbewegung</div>'+rows+'</div>';
}

function isoWeekKey(ts){
  const d=new Date(ts);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const week1=new Date(d.getFullYear(),0,4);
  const wk=1+Math.round(((d-week1)/86400000-3+((week1.getDay()+6)%7))/7);
  return d.getFullYear()+'-W'+String(wk).padStart(2,'0');
}
function renderWeeklyChart(filtered){
  const byWeek={};
  filtered.forEach(e=>{
    const wk=isoWeekKey(e.zeit);
    if(!byWeek[wk])byWeek[wk]={ein:0,aus:0};
    byWeek[wk][e.t]+=e.menge;
  });
  const weeks=Object.keys(byWeek).sort().slice(-8);
  if(!weeks.length)return '';
  const max=Math.max(1,...weeks.map(w=>Math.max(byWeek[w].ein,byWeek[w].aus)));
  const bars=weeks.map(w=>{
    const d=byWeek[w];
    const hEin=Math.round(d.ein/max*48);
    const hAus=Math.round(d.aus/max*48);
    const lbl=w.split('-W')[1];
    return '<div class="kw-bar-pair"><div class="kw-bars"><div class="kw-bar ein" style="height:'+Math.max(hEin,d.ein>0?2:0)+'px" title="Eingang KW'+lbl+': '+d.ein+'"></div><div class="kw-bar aus" style="height:'+Math.max(hAus,d.aus>0?2:0)+'px" title="Ausgang KW'+lbl+': '+d.aus+'"></div></div><div class="kw-lbl">KW'+lbl+'</div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Eingänge / Ausgänge pro Woche</div><div class="stat-chart-sub">Letzte '+weeks.length+' Wochen mit Bewegungen</div><div class="kw-spark">'+bars+'</div><div class="legend-row"><span><span class="legend-dot" style="background:var(--ac)"></span>Eingang</span><span><span class="legend-dot" style="background:var(--dg)"></span>Ausgang</span></div></div>';
}
function renderTopItemsChart(entries,title,cls){
  if(!entries.length)return '';
  const byName={};
  entries.forEach(e=>{byName[e.name]=(byName[e.name]||0)+e.menge;});
  const sorted=Object.entries(byName).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max=sorted[0][1];
  const rows=sorted.map(([name,menge])=>{
    const pct=Math.max(8,Math.round(menge/max*100));
    return '<div class="bar-row"><div class="bar-label" title="'+esc(name)+'">'+esc(name)+'</div><div class="bar-track"><div class="bar-fill '+cls+'" style="width:'+pct+'%"><span class="bar-val">'+menge+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">'+title+'</div><div class="stat-chart-sub">Im gewählten Zeitraum</div>'+rows+'</div>';
}
function renderCategorySpendChart(entries){
  if(!entries.length)return '';
  const byKat={};
  entries.forEach(e=>{const k=e.kat||'Ohne Kategorie';byKat[k]=(byKat[k]||0)+(e.preis||0)*e.menge;});
  const sorted=Object.entries(byKat).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=sorted[0][1];
  const rows=sorted.map(([kat,sum])=>{
    const pct=Math.max(8,Math.round(sum/max*100));
    return '<div class="bar-row"><div class="bar-label" title="'+esc(kat)+'">'+esc(kat)+'</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pct+'%"><span class="bar-val">CHF '+sum.toFixed(0)+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Ausgaben nach Kategorie</div><div class="stat-chart-sub">Basierend auf erfassten Kaufpreisen</div>'+rows+'</div>';
}

let ekShopFilter='alle';
function setEkShopFilter(g){ekShopFilter=g;renderEk();}
function renderEk(){
  // Shop-Filter Chips
  const shopChipsEl=document.getElementById('ek-shop-chips');
  if(shopChipsEl){
    const usedShops=[...new Set(S.a.filter(a=>a.menge<a.mindest&&a.kaufort).map(a=>a.kaufort))];
    if(usedShops.length>0){
      shopChipsEl.innerHTML=['alle',...usedShops].map(g=>'<button class="chip'+(ekShopFilter===g?' on':'')+'" onclick="setEkShopFilter(\''+esc(g)+'\')">'+esc(g==='alle'?'Alle Geschäfte':g)+'</button>').join('');
      shopChipsEl.style.display='flex';
    }else{
      shopChipsEl.innerHTML='';shopChipsEl.style.display='none';
    }
  }
  const auto=S.a.filter(a=>a.menge<a.mindest&&(ekShopFilter==='alle'||a.kaufort===ekShopFilter));
  const hasItems=auto.length>0||S.ek.length>0;
  let h='';
  // Laden-Modus Button (nur wenn Einträge vorhanden)
  if(hasItems){
    h+='<button onclick="openLadenModus()" style="width:100%;padding:14px;margin-bottom:14px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">🛒 Laden-Modus starten</button>';
  }
  h+='<div class="sh">Automatisch — unter Mindestbestand'+(ekShopFilter!=='alle'?' · '+esc(ekShopFilter):'')+'</div>';
  h+=auto.length?auto.map(a=>{
    const ov=(S.eko||{})[a.id]||{};
    const mg=ov.menge!==undefined?ov.menge:String(Math.max(1,(a.mindest||0)-a.menge));
    const eh=ov.einheit||a.einheit||'Stk';
    return '<div class="ei" id="eia-'+a.id+'"><input type="checkbox" onchange="ckA('+a.id+',this.checked)"/>'+
      '<div style="flex:1;min-width:0" onclick="showEkArtikelInfo('+a.id+')"><div class="eit" style="color:var(--ac)">'+esc(a.name)+'</div><div class="eis">'+esc(a.lager)+(a.kaufort?' · '+esc(a.kaufort):'')+'</div></div>'+
      '<input type="text" inputmode="decimal" value="'+esc(mg)+'" onchange="setEkoMenge('+a.id+',this.value)" onclick="event.stopPropagation()" style="width:54px;padding:6px 8px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--tx);text-align:right;flex-shrink:0"/>'+
      '<select onchange="setEkoEinheit('+a.id+',this.value)" onclick="event.stopPropagation()" style="width:66px;padding:6px 4px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--tx);flex-shrink:0">'+ekEinheitOptions(eh)+'</select>'+
    '</div>';
  }).join(''):'<div style="color:var(--t3);font-size:13px;padding:4px 0 12px">Alle Artikel im Soll</div>';
  h+='<div class="sh">Manuell</div><div class="mir"><input type="text" id="mi-i" placeholder="Artikel hinzufügen..." onkeydown="if(event.key===\'Enter\')addM()"/><button onclick="addM()">+</button></div><div id="mi-l">';
  S.ek.forEach(e=>{
    const matchA=S.a.find(a=>a.name.toLowerCase()===e.text.toLowerCase());
    h+='<div class="ei'+(e.checked?' ck':'')+'" id="eim-'+e.id+'"><input type="checkbox" '+(e.checked?'checked':'')+' onchange="ckM('+e.id+',this.checked)"/>'+
    '<div class="eit" style="flex:1;min-width:0;'+(matchA?'color:var(--ac);cursor:pointer':'')+ '"'+(matchA?' onclick="showEkArtikelInfo('+matchA.id+')"':'')+'>'+esc(e.text)+'</div>'+
    '<input type="text" inputmode="decimal" value="'+esc(e.menge||'')+'" placeholder="Mge" onchange="setEkMenge('+e.id+',this.value)" onclick="event.stopPropagation()" style="width:54px;padding:6px 8px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--tx);text-align:right;flex-shrink:0"/>'+
    '<select onchange="setEkEinheit('+e.id+',this.value)" onclick="event.stopPropagation()" style="width:66px;padding:6px 4px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--tx);flex-shrink:0">'+ekEinheitOptions(e.einheit||'')+'</select>'+
    '<button class="eid" onclick="delM('+e.id+')">&#x2715;</button></div>';
  });
  h+='</div>';
  document.getElementById('ek-body').innerHTML=h;
}

/* ── Laden-Modus (Vollbild-Einkaufsliste für unterwegs) ──────────── */
// Typische Laden-Reihenfolge nach Kategorie
const LADEN_REIHENFOLGE=['Gemüse & Früchte','Backwaren & Brot','Fleisch & Fisch','Milchprodukte','Konserven & Trockenware','Gewürze & Saucen','Süsswaren','Getränke','Tiefkühl','Reinigung & Pflege','Diverses'];
let ladenChecked={}; // {artikelId oder 'm'+manualId: true}

function openLadenModus(){
  ladenChecked={};
  renderLadenModus();
  document.getElementById('laden-overlay').style.display='flex';
}
function closeLadenModus(){
  document.getElementById('laden-overlay').style.display='none';
  renderEk();
}
function renderLadenModus(){
  const auto=S.a.filter(a=>a.menge<a.mindest&&(ekShopFilter==='alle'||a.kaufort===ekShopFilter));
  // Nach Laden-Reihenfolge sortieren
  const sorted=auto.slice().sort((a,b)=>{
    const ia=LADEN_REIHENFOLGE.indexOf(a.kat),ib=LADEN_REIHENFOLGE.indexOf(b.kat);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  const manual=S.ek.filter(e=>!e.checked);
  const total=sorted.length+manual.length;
  const done=Object.keys(ladenChecked).filter(k=>ladenChecked[k]).length;

  let h='<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:10">'+
    '<div><div style="font-weight:700;font-size:17px">🛒 Einkaufen'+(ekShopFilter!=='alle'?' · '+esc(ekShopFilter):'')+'</div>'+
    '<div style="font-size:12px;color:var(--t2)">'+done+' von '+total+' erledigt</div></div>'+
    '<button onclick="finishLadenModus()" style="background:var(--ok);color:#fff;border:none;border-radius:var(--rs);padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer">Fertig</button>'+
  '</div>'+
  // Fortschrittsbalken
  '<div style="height:4px;background:var(--bd)"><div style="height:100%;background:var(--ok);width:'+(total?Math.round(done/total*100):0)+'%;transition:width .2s"></div></div>'+
  '<div style="padding:8px 16px calc(24px + env(safe-area-inset-bottom));overflow-y:auto;flex:1">';

  // Automatische Artikel nach Kategorie gruppiert
  let lastKat='';
  sorted.forEach(a=>{
    if(a.kat!==lastKat){
      h+='<div style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 6px">'+esc(a.kat||'Sonstiges')+'</div>';
      lastKat=a.kat;
    }
    const ck=!!ladenChecked[a.id];
    const ovL=(S.eko||{})[a.id]||{};
    const brauche=ovL.menge!==undefined?ovL.menge:Math.max(1,a.mindest-a.menge);
    const braucheEh=ovL.einheit||a.einheit||'Stk';
    h+='<div onclick="toggleLaden('+a.id+')" style="display:flex;align-items:center;gap:14px;padding:16px 12px;background:'+(ck?'var(--ol)':'var(--sf)')+';border:1px solid '+(ck?'var(--ok)':'var(--bd)')+';border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s">'+
      '<div style="width:32px;height:32px;border-radius:50%;border:2.5px solid '+(ck?'var(--ok)':'var(--b2)')+';background:'+(ck?'var(--ok)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:18px;font-weight:700">'+(ck?'✓':'')+'</div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600;'+(ck?'text-decoration:line-through;color:var(--t3)':'')+'">'+esc(a.name)+'</div>'+
      '<div style="font-size:13px;color:var(--t2)">'+(ck&&typeof ladenChecked[a.id]==='object'?'✓ '+fmtMenge(ladenChecked[a.id].menge)+' '+esc(a.einheit||'Stk')+' · CHF '+ladenChecked[a.id].preis.toFixed(2)+(ladenChecked[a.id].kaufort?' · '+esc(ladenChecked[a.id].kaufort):''):esc(String(brauche))+' '+esc(braucheEh)+(a.preis?' · zuletzt CHF '+a.preis.toFixed(2):''))+'</div></div>'+
    '</div>';
  });

  // Manuelle Einträge
  if(manual.length){
    h+='<div style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 6px">Manuell notiert</div>';
    manual.forEach(e=>{
      const key='m'+e.id;
      const ck=!!ladenChecked[key];
      h+='<div onclick="toggleLadenM('+e.id+')" style="display:flex;align-items:center;gap:14px;padding:16px 12px;background:'+(ck?'var(--ol)':'var(--sf)')+';border:1px solid '+(ck?'var(--ok)':'var(--bd)')+';border-radius:var(--r);margin-bottom:8px;cursor:pointer">'+
        '<div style="width:32px;height:32px;border-radius:50%;border:2.5px solid '+(ck?'var(--ok)':'var(--b2)')+';background:'+(ck?'var(--ok)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:18px;font-weight:700">'+(ck?'✓':'')+'</div>'+
        '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600;'+(ck?'text-decoration:line-through;color:var(--t3)':'')+'">'+esc(e.text)+'</div>'+
        (e.menge?'<div style="font-size:13px;color:var(--t2)">'+esc(e.menge)+'</div>':'')+'</div>'+
      '</div>';
    });
  }

  if(!total)h+='<div style="text-align:center;padding:48px 24px;color:var(--t3)"><div style="font-size:40px;margin-bottom:8px">✅</div><div style="font-size:15px;font-weight:600;color:var(--t2)">Nichts zu kaufen</div></div>';

  h+='</div>';
  document.getElementById('laden-content').innerHTML=h;
}
function toggleLaden(id){
  if(ladenChecked[id]){
    // Abwählen: Kaufdaten verwerfen
    delete ladenChecked[id];
    if(navigator.vibrate)navigator.vibrate(40);
    renderLadenModus();
    return;
  }
  // Anwählen: Kauf-Dialog mit vorbefüllten Daten
  showLadenKaufDialog(id);
}

function showLadenKaufDialog(id){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  const existing=document.getElementById('laden-kauf-dlg');
  if(existing)existing.remove();
  const ov=(S.eko||{})[a.id]||{};
  const vorMenge=ov.menge!==undefined?ov.menge:String(Math.max(1,(a.mindest||0)-a.menge));
  const vorPreis=a.preis>0?a.preis.toFixed(2):'';
  const vorOrt=ekShopFilter!=='alle'?ekShopFilter:(a.kaufort||'');
  const dlg=document.createElement('div');
  dlg.id='laden-kauf-dlg';
  dlg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8500;display:flex;align-items:flex-end;justify-content:center';
  dlg.innerHTML=
    '<div style="background:var(--sf);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:16px 16px calc(16px + env(safe-area-inset-bottom))">'+
      '<div style="font-weight:700;font-size:16px;margin-bottom:12px">'+esc(a.name)+'</div>'+
      '<div class="tc" style="margin-bottom:10px">'+
        '<div class="fd"><label>Anzahl / Menge'+(isDecUnit(a.einheit)?' ('+esc(a.einheit)+')':'')+'</label><input type="text" inputmode="decimal" id="lk-mg" value="'+esc(vorMenge)+'" style="width:100%;padding:10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:16px;text-align:right"/></div>'+
        '<div class="fd"><label>Kaufdatum</label>'+dateField('lk-kd',todayISO())+'</div>'+
      '</div>'+
      '<div class="fd" style="margin-bottom:10px"><label>Preis pro '+(isDecUnit(a.einheit)?esc(a.einheit):'Einheit')+' (CHF)</label><input type="text" inputmode="decimal" id="lk-pr" value="'+vorPreis+'" placeholder="0.00" style="width:100%;padding:10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:16px;text-align:right;font-weight:600"/></div>'+
      '<div class="fd" style="margin-bottom:14px"><label>Wo gekauft</label><div class="lcw" id="lk-ge">'+
        S.ge.map(g=>'<button class="chip'+(vorOrt===g?' on':'')+'" data-ge="'+esc(g)+'" onclick="document.querySelectorAll(\'#lk-ge .chip[data-ge]\').forEach(c=>c.classList.remove(\'on\'));this.classList.add(\'on\')">'+esc(g)+'</button>').join('')+
      '</div></div>'+
      '<div style="display:flex;gap:8px">'+
        '<button onclick="document.getElementById(\'laden-kauf-dlg\').remove()" style="flex:1;padding:12px;border:1px solid var(--bd);background:var(--bg);border-radius:var(--rs);font-size:14px;cursor:pointer;color:var(--t2)">Abbrechen</button>'+
        '<button onclick="confirmLadenKauf('+a.id+')" style="flex:2;padding:12px;background:var(--ok);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer">✓ Gekauft</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(dlg);
}

function confirmLadenKauf(id){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  const decOk=isDecUnit(a.einheit);
  let menge=parseDecimal(document.getElementById('lk-mg').value)||1;
  if(!decOk)menge=Math.max(1,Math.round(menge));
  const datum=document.getElementById('lk-kd').value||todayISO();
  const preis=parseDecimal(document.getElementById('lk-pr').value)||0;
  const geChip=document.querySelector('#lk-ge .chip.on[data-ge]');
  const kaufort=geChip?geChip.dataset.ge:(a.kaufort||'');
  ladenChecked[id]={menge,datum,preis,kaufort};
  const dlg=document.getElementById('laden-kauf-dlg');
  if(dlg)dlg.remove();
  if(navigator.vibrate)navigator.vibrate(40);
  renderLadenModus();
}
function toggleLadenM(id){
  const key='m'+id;
  ladenChecked[key]=!ladenChecked[key];
  if(navigator.vibrate)navigator.vibrate(40);
  renderLadenModus();
}
function finishLadenModus(){
  // Abgehakte automatische Artikel: mit bestätigten Kaufdaten buchen
  const autoChecked=S.a.filter(a=>ladenChecked[a.id]&&typeof ladenChecked[a.id]==='object');
  // Abgehakte manuelle → aus Liste entfernen
  const manualCheckedIds=S.ek.filter(e=>ladenChecked['m'+e.id]).map(e=>e.id);
  S.ek=S.ek.filter(e=>!manualCheckedIds.includes(e.id));

  autoChecked.forEach(a=>{
    const k=ladenChecked[a.id]; // {menge,datum,preis,kaufort}
    if(S.eko&&S.eko[a.id])delete S.eko[a.id];
    ensurePackungen(a);
    a.packungen.push({id:newPackId(),menge:k.menge,kaufdatum:k.datum,ablaufdatum:''});
    syncMenge(a);
    a.kaufdatum=k.datum;
    if(k.kaufort)a.kaufort=k.kaufort;
    if(!a.preisHistorie)a.preisHistorie=[];
    a.preisHistorie.push({datum:k.datum,preis:k.preis,menge:k.menge,einheit:a.einheit||'Stk',typ:'ein',aktion:false,kaufort:k.kaufort||''});
    if(k.preis>0)a.preis=k.preis;
    addLogEntry('ein',a.id,a.name,a.lager,a.kat,k.menge,a.einheit,k.preis,false);
  });
  saveL();
  if(autoChecked.length)toast('✓ '+autoChecked.length+' Artikel als Eingang gebucht');
  closeLadenModus();
  renderLager();
}
function ckA(id,v){const el=document.getElementById('eia-'+id);if(el)el.classList.toggle('ck',v);}
function addGeschaeft(btn){
  const n=prompt('Neues Geschäft:');if(!n||!n.trim())return;
  const nm=n.trim();if(!S.ge.includes(nm)){S.ge.push(nm);saveL();}
  const wrap=document.getElementById('f-ge');if(!wrap)return;
  const chip=document.createElement('button');
  chip.className='chip on';chip.dataset.ge=nm;chip.textContent=nm;
  chip.onclick=()=>{document.querySelectorAll('#f-ge .chip[data-ge]').forEach(c=>c.classList.remove('on'));chip.classList.add('on');};
  wrap.insertBefore(chip,btn);
  document.querySelectorAll('#f-ge .chip[data-ge]').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
}
function addM(){const i=document.getElementById('mi-i');const t=i.value.trim();if(!t)return;S.ek.push({id:Date.now(),text:t,menge:'1',einheit:'Stk',checked:false});i.value='';saveL();renderEk();}
function ckM(id,v){
  const e=S.ek.find(x=>x.id===id);if(!e)return;
  if(!v){
    // Abhaken rückgängig → einfach unchecken
    e.checked=false;saveL();
    const el=document.getElementById('eim-'+id);if(el)el.classList.toggle('ck',false);
    return;
  }
  // Abhaken → Einbuchungs-Dialog
  const name=e.text||'';
  const bekannt=S.a.find(a=>a.name.toLowerCase()===name.toLowerCase());
  if(bekannt){
    // Bekannter Artikel → nur MHD abfragen, Bestand erhöhen
    showEkEinbuchungBekannt(e,bekannt);
  }else{
    // Unbekannt → Barcode scannen + Formular
    showEkEinbuchungNeu(e);
  }
}

function showEkEinbuchungBekannt(ekEntry,artikel){
  const existing=document.getElementById('ek-einbuch-dlg');if(existing)existing.remove();
  const menge=parseDecimal(ekEntry.menge)||1;
  const dlg=document.createElement('div');
  dlg.id='ek-einbuch-dlg';
  dlg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8500;display:flex;align-items:flex-end;justify-content:center';
  dlg.innerHTML=
    '<div style="background:var(--sf);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:16px 16px calc(16px + env(safe-area-inset-bottom))">'+
      '<div style="font-weight:700;font-size:16px;margin-bottom:4px">'+esc(artikel.name)+' einbuchen</div>'+
      '<div style="font-size:12px;color:var(--ok);margin-bottom:12px">✓ Artikel bekannt · Bestand: '+fmtMenge(artikel.menge)+' '+esc(artikel.einheit||'Stk')+'</div>'+
      '<div class="tc" style="margin-bottom:14px">'+
        '<div class="fd"><label>Menge</label><input type="text" inputmode="decimal" id="ekb-mg" value="'+fmtMenge(menge)+'" style="width:100%;padding:11px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:17px;text-align:right;font-weight:600"/></div>'+
        '<div class="fd"><label>Ablaufdatum (MHD)</label>'+dateField('ekb-mhd','')+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px">'+
        '<button onclick="document.getElementById(\'ek-einbuch-dlg\').remove()" style="flex:1;padding:12px;border:1px solid var(--bd);background:var(--bg);border-radius:var(--rs);font-size:14px;cursor:pointer;color:var(--t2)">Abbrechen</button>'+
        '<button onclick="doEkEinbuchungBekannt('+ekEntry.id+','+artikel.id+')" style="flex:2;padding:12px;background:var(--ok);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer">✓ Einbuchen</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(dlg);
  setTimeout(()=>suppressAutofill(dlg),0);
}

function doEkEinbuchungBekannt(ekId,artikelId){
  const a=S.a.find(x=>x.id===artikelId);if(!a)return;
  const decOk=isDecUnit(a.einheit);
  let menge=parseDecimal(document.getElementById('ekb-mg').value)||1;
  if(!decOk)menge=Math.max(1,Math.round(menge));
  const mhd=document.getElementById('ekb-mhd').value||'';
  ensurePackungen(a);
  a.packungen.push({id:newPackId(),menge,kaufdatum:todayISO(),ablaufdatum:mhd});
  syncMenge(a);
  if(!a.preisHistorie)a.preisHistorie=[];
  a.preisHistorie.push({datum:todayISO(),preis:a.preis||0,menge,einheit:a.einheit||'Stk',typ:'ein',aktion:false,kaufort:a.kaufort||''});
  addLogEntry('ein',a.id,a.name,a.lager,a.kat,menge,a.einheit,a.preis||0,false);
  // Einkaufslisteneintrag abhaken
  const e=S.ek.find(x=>x.id===ekId);
  if(e)e.checked=true;
  saveL();
  const dlg=document.getElementById('ek-einbuch-dlg');if(dlg)dlg.remove();
  toast('✓ '+fmtMenge(menge)+' '+esc(a.einheit||'Stk')+' «'+a.name+'» eingebucht');
  renderEk();
}

function showEkEinbuchungNeu(ekEntry){
  const existing=document.getElementById('ek-einbuch-dlg');if(existing)existing.remove();
  const dlg=document.createElement('div');
  dlg.id='ek-einbuch-dlg';
  dlg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8500;display:flex;align-items:flex-end;justify-content:center';
  dlg.innerHTML=
    '<div style="background:var(--sf);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:16px 16px calc(16px + env(safe-area-inset-bottom))">'+
      '<div style="font-weight:700;font-size:16px;margin-bottom:4px">«'+esc(ekEntry.text)+'» — neuer Artikel</div>'+

function invAdjust(d){
  const a=invList[invIdx];
  const el=document.getElementById('inv-menge');
  const cur=parseInt(el.textContent)||0;
  const neu=Math.max(0,cur+d);
  el.textContent=neu;
  el.style.color=neu!==a.menge?'var(--wn)':'var(--tx)';
}
function invConfirm(){
  const a=invList[invIdx];
  const neu=parseInt(document.getElementById('inv-menge').textContent)||0;
  if(neu!==a.menge){
    const diff=neu-a.menge;
    ensurePackungen(a);
    if(diff>0){
      a.packungen.push({id:newPackId(),menge:diff,kaufdatum:todayISO(),ablaufdatum:''});
    }else{
      let rest=-diff;
      const sorted=a.packungen.filter(p=>p.menge>0).sort((x,y)=>{
        if(!x.ablaufdatum&&!y.ablaufdatum)return x.kaufdatum.localeCompare(y.kaufdatum);
        if(!x.ablaufdatum)return 1;if(!y.ablaufdatum)return -1;
        return x.ablaufdatum.localeCompare(y.ablaufdatum);
      });
      for(const p of sorted){
        if(rest<=0)break;
        const nimm=Math.min(p.menge,rest);
        p.menge-=nimm;rest-=nimm;
      }
    }
    syncMenge(a);
    if(!S.log)S.log=[];
    S.log.push({t:diff>0?'ein':'aus',aid:a.id,name:a.name,lager:a.lager,kat:a.kat,menge:Math.abs(diff),einheit:a.einheit||'Stk',preis:0,aktion:false,datum:todayISO(),zeit:Date.now(),inventur:true});
    invKorrekturen++;
  }
  invIdx++;
  renderInventur();
}
function invSkip(){invIdx++;renderInventur();}

function saveInvBufferEntry(barcode,editIndex){
  const menge=parseDecimal(document.getElementById('invcap-mg').value)||1;
  const mhd=document.getElementById('invcap-mhd').value||'';
  const pkgMenge=parseDecimal(document.getElementById('invcap-pg').value)||'';
  const pkgEinheit=document.getElementById('invcap-pe').value||'';
  const entry={barcode,menge,mhd,pkgMenge,pkgEinheit,name:'',foto:''};
  // Bestehende Enrichment-Daten beibehalten beim Editieren
  if(editIndex>=0&&invBuffer[editIndex]){
    entry.name=invBuffer[editIndex].name||'';
    entry.foto=invBuffer[editIndex].foto||'';
  }
  if(editIndex>=0){
    invBuffer[editIndex]={...invBuffer[editIndex],...entry};
  }else{
    invBuffer.push(entry);
    // Asynchron anreichern: bekannten Artikel oder OFF-Lookup
    enrichInvEntry(invBuffer.length-1,barcode);
  }
  saveInvBuffer();
  const dlg=document.getElementById('invcap-mhd-dlg');
  if(dlg)dlg.remove();
  if(navigator.vibrate)navigator.vibrate(40);
  renderInvCapture();
  if(editIndex<0)setTimeout(()=>startInvScan(),300);
}

async function enrichInvEntry(idx,barcode){
  if(idx<0||idx>=invBuffer.length)return;
  const entry=invBuffer[idx];
  // 1. Bereits im Lager?
  const bekannt=artikelByCode(barcode);
  if(bekannt){
    entry.name=bekannt.name;
    entry.foto=bekannt.foto||'';
    entry.bekannt=true;
    saveInvBuffer();renderInvCapture();
    return;
  }
  // 2. OFF-Lookup
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(barcode)+'.json');
    if(r.ok){
      const data=await r.json();
      if(data.status===1&&data.product){
        const p=data.product;
        entry.name=p.product_name_de||p.product_name||p.generic_name||'';
        entry.foto=p.image_front_small_url||p.image_front_url||p.image_url||'';
        entry.marke=p.brands?p.brands.split(',')[0].trim():'';
        entry.offGefunden=true;
      }
    }
  }catch(e){/* Netzwerkfehler — ignorieren */}
  saveInvBuffer();renderInvCapture();
}
function editInvBufferEntry(i){
  const e=invBuffer[i];if(!e)return;
  askInvMengeMhd(e.barcode,i);
}
function delInvBufferEntry(i){
  invBuffer.splice(i,1);saveInvBuffer();renderInvCapture();
}
function clearInvBuffer(){
  if(!confirm('Zwischenspeicher wirklich leeren? Alle '+invBuffer.length+' erfassten Barcodes gehen verloren.'))return;
  invBuffer=[];saveInvBuffer();renderInvCapture();
}
let invUebernahmeQueue=[];
let invBufferCurrent=null;
function startInvUebernahme(){
  if(!invBuffer.length)return;
  invUebernahmeQueue=[...invBuffer];
  closeInvCapture();
  naechsteInvUebernahme();
}
function naechsteInvUebernahme(){
  if(!invUebernahmeQueue.length){
    toast('Alle Eintr\u00e4ge \u00fcbernommen');
    invBufferCurrent=null;
    return;
  }
  const e=invUebernahmeQueue[0];
  const imLager=artikelByCode(e.barcode);
  if(imLager){
    if(confirm('\u00ab'+imLager.name+'\u00bb ist bereits im Lager.\n\n'+fmtMenge(e.menge)+' Stk als Eingang buchen'+(e.mhd?' (MHD '+fmtDateCH(e.mhd)+')':'')+'?')){
      ensurePackungen(imLager);
      imLager.packungen.push({id:newPackId(),menge:e.menge,kaufdatum:todayISO(),ablaufdatum:e.mhd||''});
      syncMenge(imLager);
      if(!imLager.preisHistorie)imLager.preisHistorie=[];
      imLager.preisHistorie.push({datum:todayISO(),preis:imLager.preis||0,menge:e.menge,einheit:imLager.einheit||'Stk',typ:'ein',aktion:false,kaufort:''});
      addLogEntry('ein',imLager.id,imLager.name,imLager.lager,imLager.kat,e.menge,imLager.einheit,imLager.preis||0,false);
      saveL();
      toast('\u2713 '+imLager.name+': Bestand erh\u00f6ht');
    }
    removeFromBufferAndQueue(e);
    naechsteInvUebernahme();
  }else{
    openFormFromInvBuffer(e);
  }
}
function removeFromBufferAndQueue(e){
  invUebernahmeQueue.shift();
  const bi=invBuffer.findIndex(x=>x.barcode===e.barcode&&x.menge===e.menge&&x.mhd===e.mhd);
  if(bi>=0){invBuffer.splice(bi,1);saveInvBuffer();}
}
function openFormFromInvBuffer(e){
  invBufferCurrent=e;
  openForm();
  setTimeout(async ()=>{
    const bc=document.getElementById('f-bc');if(bc){bc.value=e.barcode;checkBarcodeDup(e.barcode);}
    const ft=document.getElementById('form-title');
    if(ft)ft.textContent='Inventar '+(invBuffer.length-invUebernahmeQueue.length+1)+'/'+invBuffer.length;
    // Erst Online-Suche (füllt Name/Kategorie/Verpackung), dann unsere erfassten Werte drüberschreiben
    await doLookupForm();
    // Anzahl
    const mg=document.getElementById('f-mg');if(mg)mg.value=e.menge;
    // MHD sichtbar setzen (auch das evtl. vorhandene Klartext-Anzeigefeld aktualisieren)
    setDateField('f-ad',e.mhd||'');
    // Packungsgrösse aus Inventar-Erfassung (übersteuert Lookup-Wert falls erfasst)
    if(e.pkgMenge){
      const pg=document.getElementById('f-pg');if(pg)pg.value=e.pkgMenge;
      const pe=document.getElementById('f-pe');
      if(pe&&e.pkgEinheit){const o=[...pe.options].find(x=>x.value===e.pkgEinheit);if(o)pe.value=e.pkgEinheit;}
    }
    // Lagerort-Vorwahl anwenden: Lagerort, Standard-Kategorie, Mindestbestand 0
    if(invCapLager){
      const lc=document.querySelector('#f-lo .chip[data-lager="'+invCapLager+'"]');
      if(lc){document.querySelectorAll('#f-lo .chip[data-lager]').forEach(c=>c.classList.remove('on'));lc.classList.add('on');}
      // Standard-Kategorie nur setzen, wenn die Online-Suche keine geliefert hat
      const aktiveKat=document.querySelector('#f-ka .chip.on[data-kat]');
      if(!aktiveKat){
        const stdKat=lagerStandardKat(invCapLager);
        const kc=document.querySelector('#f-ka .chip[data-kat="'+stdKat+'"]');
        if(kc){document.querySelectorAll('#f-ka .chip[data-kat]').forEach(c=>c.classList.remove('on'));kc.classList.add('on');}
      }
      const mn=document.getElementById('f-mn');if(mn&&!mn.value)mn.value='0';
    }
  },150);
}

async function handleQuittungFile(input){
  const file=input.files[0];if(!file)return;
  const body=document.getElementById('quittung-body');
  body.innerHTML='<div style="text-align:center;padding:24px;color:var(--t2)"><div class="spn" style="margin:0 auto 12px"></div>Claude analysiert die Quittung…</div>';

  // Bild als Base64 lesen
  const b64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Datei konnte nicht gelesen werden'));
    r.readAsDataURL(file);
  });

  // Echten Bild-Typ aus den Base64-Daten erkennen (file.type ist auf Android oft falsch)
  let mediaType=file.type||'image/jpeg';
  if(b64.startsWith('/9j/'))mediaType='image/jpeg';
  else if(b64.startsWith('iVBOR'))mediaType='image/png';
  else if(b64.startsWith('R0lGO'))mediaType='image/gif';
  else if(b64.startsWith('UklGR'))mediaType='image/webp';

  // Claude Vision API
  try{
    const prompt=
      'Analysiere diese Quittung/Kassenbon und extrahiere alle gekauften Artikel.\n'+
      'Antworte NUR mit einem JSON-Objekt, keine andere Ausgabe:\n'+
      '{\n'+
      '  "geschaeft": "Migros",\n'+
      '  "datum": "2026-06-23",\n'+
      '  "artikel": [\n'+
      '    {"name":"Vollmilch","menge":2,"preis":1.85,"einheit":"Stk","kat":"Milchprodukte"},\n'+
      '    ...\n'+
      '  ]\n'+
      '}\n\n'+
      'Regeln:\n'+
      '- name: Produktname von der Quittung\n'+
      '- menge: Anzahl (Standard 1)\n'+
      '- preis: Preis PRO EINHEIT in CHF (Zahl, kein Währungssymbol)\n'+
      '- einheit: Stk/kg/g/l/dl/Pkg/Flasche/Dose etc.\n'+
      '- kat: eine von: Milchprodukte, Fleisch & Fisch, Gemüse & Früchte, Tiefkühl, Getränke, Konserven & Trockenware, Backwaren & Brot, Gewürze & Saucen, Süsswaren, Reinigung & Pflege, Diverses\n'+
      '- geschaeft: Geschäftsname (Migros/Coop/Lidl/Aldi/Denner/Volg/Online oder erkannter Name)\n'+
      '- datum: Datum im Format JJJJ-MM-TT (oder heutiges Datum falls nicht lesbar)\n'+
      '- Nur echte Produkte, keine Rabatte/Steuern/Totals als eigene Artikel';

    const aiKey=localStorage.getItem('hb_ai_key')||'';
    if(!aiKey){
      body.innerHTML='<div style="text-align:center;padding:24px;color:var(--wn)"><div style="font-size:36px;margin-bottom:8px">🔑</div>Kein Anthropic API Key hinterlegt.<br><br><button onclick="closeQuittung();goScreen(\'s-settings\')" style="padding:10px 20px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:600">Zu den Einstellungen</button></div>';
      return;
    }
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':aiKey,'anthropic-dangerous-direct-browser-access':'true','anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
          {type:'text',text:prompt}
        ]}]
      })
    });
    if(!res.ok){
      const errText=await res.text().catch(()=>'');
      let errMsg='API-Fehler '+res.status;
      if(res.status===401)errMsg='API Key ungültig (401). Prüfe den Key in den Einstellungen.';
      else if(res.status===403)errMsg='Zugriff verweigert (403). API Key hat nicht genügend Rechte.';
      else if(res.status===400){
        try{const e=JSON.parse(errText);errMsg='Anfrage-Fehler: '+(e.error?.message||errText.slice(0,120));}catch(x){errMsg='Anfrage-Fehler (400): '+errText.slice(0,120);}
      }
      else if(res.status===429)errMsg='Zu viele Anfragen (429). Bitte kurz warten.';
      else if(res.status===529)errMsg='Anthropic API überlastet (529). Bitte später erneut versuchen.';
      body.innerHTML='<div style="text-align:center;padding:24px;color:var(--dg)"><div style="font-size:36px;margin-bottom:8px">⚠️</div>'+esc(errMsg)+'</div>';
      return;
    }
    const data=await res.json();
    // Token-Verbrauch tracken
    if(data.usage){
      const u=data.usage;
      const inTok=u.input_tokens||0;
      const outTok=u.output_tokens||0;
      // Sonnet 4.6 Preise: $3/MTok input, $15/MTok output
      const kostenUsd=(inTok*3+outTok*15)/1000000;
      const kostenChf=Math.round(kostenUsd*0.88*10000)/10000; // ~0.88 CHF/USD
      trackAiUsage(inTok,outTok,kostenChf);
    }
    const text=data.content&&data.content[0]&&data.content[0].text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    let parsed;
    try{parsed=JSON.parse(clean);}catch(pe){
      body.innerHTML='<div style="text-align:center;padding:24px;color:var(--dg)"><div style="font-size:36px;margin-bottom:8px">⚠️</div>Antwort konnte nicht verarbeitet werden.<br><br><div style="font-size:11px;color:var(--t3);margin-top:8px;text-align:left;max-height:120px;overflow:auto;background:var(--bg);padding:8px;border-radius:var(--rs)">'+esc(text.slice(0,500))+'</div></div>';
      return;
    }

    quittungItems=parsed.artikel||[];
    quittungGeschaeft=parsed.geschaeft||'';
    quittungIdx=0;

    if(!quittungItems.length){
      body.innerHTML='<div style="text-align:center;padding:24px;color:var(--dg)">Keine Artikel auf der Quittung erkannt. Bitte ein klareres Foto versuchen.</div>';
      return;
    }

    // Übersicht zeigen
    renderQuittungUebersicht(parsed.datum||todayISO());

  }catch(e){
    const body=document.getElementById('quittung-body');
    body.innerHTML='<div style="text-align:center;padding:24px;color:var(--dg)"><div style="font-size:36px;margin-bottom:8px">⚠️</div>Fehler beim Quittungsscan:<br><br><strong>'+esc(e.message)+'</strong><br><br><div style="font-size:12px;color:var(--t3);margin-top:12px;line-height:1.5">Mögliche Ursachen:<br>• API Key ungültig oder nicht eingetragen<br>• Kein Guthaben auf dem Anthropic-Konto<br>• Bild zu gross oder unleserlich<br><br>API Key prüfen: <button onclick="closeQuittung();goScreen(\'s-settings\')" style="color:var(--ac);background:none;border:none;text-decoration:underline;cursor:pointer;font-size:12px">Einstellungen öffnen</button></div></div>';
  }
}

function renderQuittungUebersicht(datum){

  const ge=quittungGeschaeft;
  let h='<div style="background:var(--ol);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;font-size:13px">'+
    '✓ <strong>'+quittungItems.length+' Artikel</strong> erkannt'+
    (ge?' · '+esc(ge):'')+
    (datum?' · '+fmtDateCH(datum):'')+
  '</div>';
  h+='<div style="font-size:13px;color:var(--t2);margin-bottom:10px">Jeden Artikel einzeln bestätigen:</div>';
  h+=quittungItems.map((it,i)=>{
    const existing=S.a.find(a=>a.name.toLowerCase().includes(it.name.toLowerCase().slice(0,5))||it.name.toLowerCase().includes(a.name.toLowerCase().slice(0,5)));
    const badge=existing?'<span style="font-size:10px;background:var(--al);color:var(--ac);border-radius:6px;padding:1px 6px;margin-left:6px">im Lager</span>':'<span style="font-size:10px;background:var(--wl);color:var(--wn);border-radius:6px;padding:1px 6px;margin-left:6px">neu</span>';
    if(it._done){

function confirmQuittungArtikel(idx,hasExisting,existingId){
  const body=document.getElementById('quittung-body');
  const datum=body.dataset.datum||todayISO();
  const name=document.getElementById('qq-name').value.trim();
  const menge=parseInt(document.getElementById('qq-mg').value)||1;
  const einheit=document.getElementById('qq-ei').value.trim()||'Stk';
  const preis=parseDecimal(document.getElementById('qq-pr').value)||0;
  const kat=document.getElementById('qq-kat').value.trim()||'Diverses';
  const geChip=document.querySelector('#qq-ge .chip.on[data-ge]');
  const kaufort=geChip?geChip.dataset.ge:quittungGeschaeft;
  const ablaufdatum=document.getElementById('qq-ad')?document.getElementById('qq-ad').value:'';

  // Pflicht-Check MHD
  if(hasExisting&&document.getElementById('qq-ad')&&!ablaufdatum){
    toast('Bitte Ablaufdatum eingeben');return;
  }

  if(hasExisting&&existingId){
    // Bestehenden Artikel im Lager aktualisieren
    const a=S.a.find(x=>x.id===existingId);
    if(a){
      ensurePackungen(a);
      a.packungen.push({id:newPackId(),menge,kaufdatum:datum,ablaufdatum:ablaufdatum||''});
      syncMenge(a);
      a.kaufdatum=datum;
      a.kaufort=kaufort||a.kaufort;
      if(!a.preisHistorie)a.preisHistorie=[];
      a.preisHistorie.push({datum,preis,menge,einheit:a.einheit||'Stk',typ:'ein',aktion:false,kaufort:kaufort||''});
      if(preis>0)a.preis=preis;
      addLogEntry('ein',a.id,a.name,a.lager,a.kat,menge,einheit,preis,false);
    }
  }else{
    // Neuen Artikel anlegen
    const newId=S.nid++;
    const lager=S.lo[0]||'Vorratsschrank';
    S.a.push({id:newId,name,marke:'',kat,lager,kaufort,menge,einheit,mindest:0,barcode:'',preis,packMenge:0,packEinheit:'',kaufdatum:datum,ablaufdatum,notiz:'',foto:'',fotoPath:'',packungen:[{id:newPackId(),menge,kaufdatum:datum,ablaufdatum:ablaufdatum||''}],preisHistorie:[{datum,preis,menge,einheit:einheit||'Stk',typ:'ein',aktion:false,kaufort:kaufort||''}]});
    addLogEntry('ein',newId,name,lager,kat,menge,einheit,preis,false);
  }
  saveL();
  toast('✓ '+esc(name)+' gebucht');

  // Artikel aus Liste markieren als erledigt
  quittungItems[idx]._done=true;
  renderQuittungUebersicht(datum);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function packInfo(a){
  const pmNum=parseFloat(a.packMenge);
  if(!pmNum||pmNum<=0||isNaN(pmNum))return '';
  const pm=pmNum%1===0?pmNum:pmNum.toFixed(1);
  let pe=a.packEinheit;
  if(!pe||pe==='undefined'||pe==='null')pe='dl';
  const eh=(!a.einheit||a.einheit==='undefined')?'Stk':a.einheit;
  return pm+' '+pe+'/'+(eh==='Stk'?'Stk':eh);
}
function packTotal(a){
  if(!a.packMenge||a.packMenge<=0)return '';
  const total=a.menge*a.packMenge;
  const tot=total%1===0?total:total.toFixed(1);
  return tot+' '+(a.packEinheit||'dl')+' gesamt';
}
function parseDecimal(v){return parseFloat(String(v).replace(',','.'))||0;}
const DEC_UNITS=['kg','g','l','dl','ml'];
function isDecUnit(e){return DEC_UNITS.includes(String(e||'').toLowerCase());}
function fmtMenge(m){const n=parseFloat(m)||0;return Math.abs(n-Math.round(n))<0.001?String(Math.round(n)):String(Math.round(n*1000)/1000).replace('.',',');}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysUntil(iso){
  if(!iso)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(iso+'T00:00:00');
  return Math.round((d-today)/86400000);
}

// Haltbarkeits-Puffer nach MHD (Tage), pro Kategorie.
// Quelle: Tafel Deutschland / Verbraucherzentrale Hamburg (Richtwerte «Haltbarkeit über MHD hinaus»),
// konservativ auf Kategorien übertragen. Nur für MHD, nie für Verbrauchsdatum («zu verbrauchen bis»).
// Verderbliche Kategorien bewusst 0 (Sicherheitsschranke, siehe VERDERBLICH).
const KAT_PUFFER_DEFAULT={
  'Milchprodukte':0,        // frisch 0; H-Milch/Käse länger, aber pro Artikel-Override
  'Fleisch & Fisch':0,      // meist Verbrauchsdatum → immer 0
  'Gemüse & Früchte':0,     // frisch, sensorisch prüfen
  'Tiefkühl':60,            // «mehrere Monate», konservativ 2 Monate
  'Getränke':90,
  'Konserven & Trockenware':365, // Konserven/Reis/Nudeln/Mehl: +1 Jahr
  'Backwaren & Brot':2,     // Brot & Brötchen: +2 Tage
  'Gewürze & Saucen':180,   // hoher Zucker/Essig/Salzgehalt konserviert
  'Süsswaren':90,
  'Reinigung & Pflege':365, // kein Lebensmittel
  'Diverses':0,
};
// Effektiver Kategorie-Puffer: benutzerdefiniert (opt.katPuffer) vor Standard
function katPuffer(kat){
  if(opt.katPuffer&&typeof opt.katPuffer[kat]==='number')return opt.katPuffer[kat];
  return KAT_PUFFER_DEFAULT[kat]||0;
}
// Kategorien, die nie einen Puffer bekommen (frisch / meist Verbrauchsdatum)
const VERDERBLICH=['Fleisch & Fisch','Gemüse & Früchte'];

// Typische Haltbarkeit frischer Gemüse-/Obstsorten in Tagen ab Kauf (Richtwerte).
// Quellen: Verbraucherzentrale, BMEL «Richtwerte Lagerhaltung», BMLUK A-Z der Lagerung.
// Für Produkte ohne aufgedrucktes MHD → automatische Vorbelegung eines «Frisch bis»-Datums.
const FRISCHE_HALTBARKEIT={
  // lange haltbar (Wurzeln, Kohl, Zwiebeln)
  'kartoffel':60,'kartoffeln':60,'zwiebel':60,'zwiebeln':60,'knoblauch':90,
  'karotte':21,'karotten':21,'rüebli':21,'möhre':21,'möhren':21,'randen':30,'rote bete':30,
  'kürbis':60,'kohl':21,'weisskohl':21,'rotkohl':21,'wirsing':14,'rotkabis':21,'weisskabis':21,
  'sellerie':14,'lauch':10,'kohlrabi':14,'rettich':7,'rande':30,
  'apfel':30,'äpfel':30,'birne':10,'birnen':10,'orange':21,'orangen':21,'zitrone':21,'zitronen':21,
  // mittel
  'paprika':10,'peperoni':10,'gurke':7,'zucchini':7,'zucchetti':7,'aubergine':7,'auberginen':7,
  'brokkoli':5,'broccoli':5,'blumenkohl':7,'fenchel':10,
  'tomate':7,'tomaten':7,'avocado':5,'mango':5,'kiwi':7,'ananas':4,
  'orange':21,'mandarine':14,'clementine':14,'grapefruit':21,
  // kurz haltbar (Blattgemüse, Beeren, Pilze, Kräuter)
  'salat':4,'kopfsalat':4,'blattsalat':4,'spinat':3,'feldsalat':3,'nüsslisalat':3,'rucola':3,
  'pilz':4,'pilze':4,'champignon':4,'champignons':4,
  'erdbeere':3,'erdbeeren':3,'himbeere':2,'himbeeren':2,'heidelbeere':5,'heidelbeeren':5,
  'brombeere':3,'brombeeren':3,'kirsche':5,'kirschen':5,'traube':7,'trauben':7,
  'banane':5,'bananen':5,'pfirsich':5,'nektarine':5,'aprikose':5,'pflaume':7,'pflaumen':7,
  'spargel':4,'bohne':5,'bohnen':5,'erbse':4,'erbsen':4,'radieschen':5,
  'basilikum':3,'petersilie':5,'schnittlauch':5,'koriander':4,'dill':4,'kräuter':4,
};
// Haltbarkeit nach dem Öffnen (Tage), pro Kategorie. Richtwerte (Verbraucherzentrale).
const ANBRUCH_HALTBARKEIT={
  'Milchprodukte':3,        // offene Milch/Rahm 2-3 Tage
  'Fleisch & Fisch':1,      // offen sehr kurz
  'Gemüse & Früchte':2,
  'Getränke':3,             // offener Saft
  'Konserven & Trockenware':3, // offene Konserve (umgefüllt)
  'Gewürze & Saucen':30,    // offene Sauce im Kühlschrank
  'Backwaren & Brot':3,
  'Süsswaren':14,
  'Tiefkühl':1,             // aufgetaut
  'Diverses':5,
};
function anbruchHaltbarkeit(kat){return ANBRUCH_HALTBARKEIT[kat]!==undefined?ANBRUCH_HALTBARKEIT[kat]:5;}

// Kompaktes Ablauf-Badge für Detailzeile: rot mit − wenn abgelaufen, grün mit + wenn haltbar
function expBadgeKurz(a){
  const roh=daysUntil(a.ablaufdatum);
  if(roh===null)return '';
  const puffer=getPuffer(a);
  const eff=roh+puffer;
  if(roh<0){
    // über MHD
    if(eff>=0){
      // laut Puffer noch ok
      return '<span style="color:var(--wn);font-weight:600">🟡 −'+Math.abs(roh)+'d</span>';
    }
    return '<span style="color:var(--dg);font-weight:600">−'+Math.abs(roh)+'d</span>';
  }
  if(roh===0)return '<span style="color:var(--wn);font-weight:600">heute</span>';
  return '<span style="color:var(--ok);font-weight:600">+'+roh+'d</span>';
}
function frischeHaltbarkeit(name){
  const n=(name||'').toLowerCase().trim();
  // Exakter Treffer
  if(FRISCHE_HALTBARKEIT[n]!==undefined)return FRISCHE_HALTBARKEIT[n];
  // Teilstring: längste passende Schlüssel bevorzugen
  let best=null,bestLen=0;
  for(const k in FRISCHE_HALTBARKEIT){
    if((n.includes(k)||k.includes(n))&&k.length>bestLen){best=FRISCHE_HALTBARKEIT[k];bestLen=k.length;}
  }
  return best; // null wenn nichts passt
}

function getPuffer(a){
  // Pro-Artikel-Override (a.puffer) hat Vorrang; sonst Kategorie-Puffer
  if(VERDERBLICH.includes(a.kat))return 0; // Sicherheitsschranke: verderblich nie puffern
  if(typeof a.puffer==='number'&&a.puffer>=0)return a.puffer;
  return katPuffer(a.kat);
}
// Effektive Resttage inkl. Puffer (für Artikel-Objekt)
function effektiveTage(a){
  if(!a.ablaufdatum)return null;
  const roh=daysUntil(a.ablaufdatum);
  if(roh===null)return null;
  return roh+getPuffer(a);
}
function fmtDateCH(iso){
  if(!iso)return '—';
  const p=iso.split('-');if(p.length!==3)return iso;
  return p[2]+'.'+p[1]+'.'+p[0];
}
function expClass(days){
  if(days===null)return '';
  if(days<0)return 'over';
  if(days<=3)return 'over';
  if(days<=7)return 'soon';
  return 'fresh';
}
function expLabel(days){
  if(days===null)return '';
  if(days<0)return 'abgelaufen seit '+Math.abs(days)+' Tag'+(Math.abs(days)===1?'':'en');
  if(days===0)return 'läuft heute ab';
  if(days===1)return 'läuft morgen ab';
  return 'noch '+days+' Tage';
}
function expBadge(iso){
  if(!iso)return '';
  const d=daysUntil(iso);
  const cls=expClass(d);
  return '<span class="exp-badge '+cls+'">'+expLabel(d)+'</span>';
}
// Puffer-bewusstes Badge: berücksichtigt Haltbarkeits-Richtwert der Kategorie/Artikels
function expBadgeA(a){
  if(!a.ablaufdatum)return '';
  const roh=daysUntil(a.ablaufdatum);
  const puffer=getPuffer(a);
  // Normal (kein Puffer oder noch vor MHD): wie gehabt
  if(puffer<=0||roh>=0)return expBadge(a.ablaufdatum);
  // Über MHD, aber Puffer greift
  const eff=roh+puffer;
  if(eff>=0){
    // laut Richtwert noch geniessbar
    return '<span class="exp-badge soon" title="MHD überschritten, laut Richtwert (+'+puffer+' Tage) meist noch geniessbar — bitte prüfen">🟡 MHD +'+Math.abs(roh)+'d · meist noch ok</span>';
  }
  // Auch über Puffer hinaus → wirklich abgelaufen
  return '<span class="exp-badge over">abgelaufen seit '+Math.abs(roh)+' Tagen</span>';
}
