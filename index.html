<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Haushaltbuch"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#2563EB"/>
<link rel="manifest" href="manifest.json?v=10"/>
<link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Haushaltbuch</title>
<style>
:root{--ac:#2563EB;--al:#EFF6FF;--am:#BFDBFE;--ad:#1D4ED8;--wn:#D97706;--wl:#FFFBEB;--dg:#DC2626;--dl:#FEF2F2;--ok:#059669;--ol:#ECFDF5;--bg:#F8F9FA;--sf:#FFFFFF;--bd:#E5E7EB;--b2:#D1D5DB;--tx:#111827;--t2:#6B7280;--t3:#9CA3AF;--r:12px;--rs:8px;--nh:64px;--th:56px}
@media(prefers-color-scheme:dark){:root{--ac:#3B82F6;--al:#1E3A5F;--am:#1E40AF;--ad:#60A5FA;--wn:#F59E0B;--wl:#2D1F00;--dg:#EF4444;--dl:#3B0A0A;--ok:#10B981;--ol:#022C1A;--bg:#111827;--sf:#1F2937;--bd:#374151;--b2:#4B5563;--tx:#F9FAFB;--t2:#9CA3AF;--t3:#6B7280}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit;font-size:inherit}
#app{height:100%;display:flex;flex-direction:column}
#screens{flex:1;overflow:hidden;position:relative}
.sc{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .12s}
.sc.on{opacity:1;pointer-events:all}.tb{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;height:var(--th);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.tb-t{font-size:18px;font-weight:700;letter-spacing:-.3px}
.tb-r{display:flex;gap:6px}
.ib{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer}
.ib:hover{background:var(--bg)}
.ib.a{background:var(--al);border-color:var(--am);color:var(--ac)}
.ib svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75}
.sbar{padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.sw{position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;pointer-events:none}
.sw input{width:100%;padding:9px 10px 9px 33px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;color:var(--tx)}
.sw input:focus{outline:none;border-color:var(--ac)}
.chips{padding:8px 16px 6px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:var(--sf);border-bottom:1px solid var(--bd)}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--bd);font-size:13px;background:transparent;color:var(--t2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:5px}
.chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.chip.on{background:var(--al);border-color:var(--am);color:var(--ac);font-weight:500}
.scroll{flex:1;overflow-y:auto;padding:12px 16px 16px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.sh{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px}
.sh:first-child{margin-top:0}
.lgs{margin-bottom:10px}
.lgh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none}
.lgh.open .chv{transform:rotate(180deg)}
.lgh-l{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600}
.lgh-l svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.75}
.lgh-r{display:flex;align-items:center;gap:6px}
.bdg{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--t2);border:1px solid var(--bd)}
.bdg.w{background:var(--wl);color:var(--wn)}
.chv{width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;transition:transform .2s}
.lgi{background:var(--sf);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.lgi.hide{display:none}
.ar{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.ar:last-child{border-bottom:none}
.ar:hover{background:var(--bg)}
.at{width:44px;height:44px;border-radius:var(--rs);background:var(--bg);border:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.at img{width:100%;height:100%;object-fit:cover}
.at svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.75}
.ai{flex:1;min-width:0}
.an{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:12px;color:var(--t2);margin-top:1px}
.abs{text-align:right;flex-shrink:0}
.bn{font-size:17px;font-weight:700}
.bn.ok{color:var(--ok)}.bn.wn{color:var(--wn)}.bn.lo{color:var(--dg)}
.bu{font-size:11px;color:var(--t3)}
.exp-badge{font-size:10px;padding:2px 7px;border-radius:8px;margin-top:2px;display:inline-block;white-space:nowrap}
.exp-badge.fresh{background:var(--ol);color:var(--ok)}
.exp-badge.soon{background:var(--wl);color:var(--wn)}
.exp-badge.over{background:var(--dl);color:var(--dg)}
.sort-bar{display:flex;gap:6px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);font-size:12px;background:var(--sf);color:var(--t2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:4px}
.sort-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.sort-btn.on{background:var(--al);border-color:var(--am);color:var(--ac);font-weight:500}
#bnav,[id^="bnav"]{background:var(--sf);border-top:1px solid var(--bd);display:flex;height:var(--nh);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;position:sticky;bottom:0;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--t3);font-size:9px;font-weight:500;cursor:pointer;padding:4px 2px;min-width:0;overflow:hidden}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;flex-shrink:0}
.nb span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.nb.on{color:var(--ac)}
.nbw{position:relative}
.nbb{position:absolute;top:-4px;right:-6px;background:var(--dg);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 32px);margin:10px 16px 4px;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--ad)}
.add-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5}
.stg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.stc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.stl{font-size:12px;color:var(--t2);margin-bottom:4px}
.stn{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stn.w{color:var(--wn)}.stn.ok{color:var(--ok)}.stn.a{color:var(--ac)}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer}
.rc:hover{background:var(--bg)}
.rct{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.rci{width:48px;height:48px;border-radius:var(--rs);background:var(--ol);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.rci.p{background:var(--wl)}
.rct-n{font-size:15px;font-weight:600;margin-bottom:2px}
.rct-s{font-size:12px;color:var(--t2)}
.mr{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.mp{font-weight:600}.mp.f{color:var(--ok)}.mp.p{color:var(--wn)}
.mt{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.mf{height:100%;border-radius:3px;background:var(--ac)}.mf.f{background:var(--ok)}
.ztgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.zt{font-size:11px;padding:2px 8px;border-radius:10px}
.zt.ok{background:var(--ol);color:var(--ok)}.zt.ms{background:var(--wl);color:var(--wn)}
.ei{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px}
.ei input[type=checkbox]{width:18px;height:18px;accent-color:var(--ok);cursor:pointer;flex-shrink:0}
.ei.ck .eit{text-decoration:line-through;color:var(--t3)}
.eit{flex:1;font-size:14px}
.eis{font-size:12px;color:var(--t2)}
.eid{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.mir{display:flex;gap:8px;margin-bottom:8px}
.mir input{flex:1;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px}
.mir input:focus{outline:none;border-color:var(--ac)}
.mir button{padding:10px 16px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:20px;font-weight:300;cursor:pointer;line-height:1}
.ftp{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;height:var(--th);display:flex;align-items:center;gap:12px;flex-shrink:0}
.bkb{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;flex-shrink:0}
.bkb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.ftl{font-size:16px;font-weight:600;flex:1}
.fb{padding:14px 16px 32px}
.fd{margin-bottom:14px}
.fd label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:5px}
.fd input,.fd select,.fd textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:15px}
.fd input:focus,.fd select:focus,.fd textarea:focus{outline:none;border-color:var(--ac)}
.fd textarea{resize:vertical;min-height:70px;line-height:1.5}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ur{display:flex;gap:8px}.ur input{flex:1}.ur select{width:90px}
.pz{border:2px dashed var(--b2);border-radius:var(--r);padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:var(--bg)}
.pz:hover{border-color:var(--ac)}
.pz svg{width:32px;height:32px;stroke:var(--t3);fill:none;stroke-width:1.75}
.pz span{font-size:14px;color:var(--t2)}.pz small{font-size:12px;color:var(--t3)}
.ppw{position:relative;display:none}
.ppw img{width:100%;border-radius:var(--rs);max-height:180px;object-fit:cover;display:block}
.rph{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.bcr{display:flex;gap:8px;align-items:flex-end}
.bcr .fd{flex:1;margin-bottom:0}
.scb{height:42px;padding:0 14px;background:var(--al);color:var(--ac);border:1px solid var(--am);border-radius:var(--rs);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.scb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75}
.sui{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-top:8px;text-align:center;display:none}
.sui p{font-size:13px;color:var(--t2);margin-bottom:8px}
.sln{font-family:monospace;font-size:22px;letter-spacing:4px;color:var(--t2);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sok{display:none;align-items:center;gap:7px;font-size:13px;color:var(--ok);background:var(--ol);border-radius:var(--rs);padding:7px 10px;margin-top:6px}
.sok svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.cam-wrap{position:relative;background:#000;border-radius:var(--rs);overflow:hidden;margin-top:8px;display:none}
.cam-wrap video{width:100%;display:block;max-height:280px;object-fit:cover}
.cam-frame{position:absolute;inset:20% 12%;border:2px solid var(--ac);border-radius:8px;box-shadow:0 0 0 999px rgba(0,0,0,.35);pointer-events:none}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:100%;height:2px;background:var(--ac);left:0;animation:camscan 1.8s ease-in-out infinite}
.cam-frame::before{top:0}
.cam-frame::after{display:none}
@keyframes camscan{0%{top:0}50%{top:100%}100%{top:0}}
.cam-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.cam-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.cam-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;color:#fff;font-size:12px;background:rgba(0,0,0,.4);padding:4px 0}
.cam-err{display:none;font-size:13px;color:var(--dg);background:var(--dl);border-radius:var(--rs);padding:9px 12px;margin-top:8px}
.lookup-btn{height:42px;padding:0 14px;background:var(--ol);color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 40%,transparent);border-radius:var(--rs);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.lookup-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.75}
.lookup-btn:disabled{opacity:.5;cursor:default}
.lookup-status{font-size:13px;padding:8px 11px;border-radius:var(--rs);margin-top:8px;display:none;align-items:center;gap:7px}
.lookup-status.ok{background:var(--ol);color:var(--ok);display:flex}
.lookup-status.err{background:var(--wl);color:var(--wn);display:flex}
.lookup-status.busy{background:var(--al);color:var(--ac);display:flex}
.ausgang-log{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;animation:logIn .25s ease}
@keyframes logIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ausgang-log .at{width:36px;height:36px}
.ausgang-log .ai{flex:1;min-width:0}
.ausgang-log .an{font-size:13px}
.ausgang-log .am{font-size:11px}
.ausgang-badge{font-size:13px;font-weight:700;color:var(--dg);background:var(--dl);padding:2px 9px;border-radius:8px;flex-shrink:0}
.ausgang-notfound{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--wl);border:1px solid color-mix(in srgb,var(--wn) 30%,transparent);border-radius:var(--rs);margin-bottom:6px;font-size:13px;color:var(--wn);animation:logIn .25s ease}
.scan-toggle{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--dg);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px}
.scan-toggle svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75}
.scan-toggle.active{background:var(--t2)}
.stat-chart-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.stat-chart-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.stat-chart-sub{font-size:11px;color:var(--t2);margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:12px;color:var(--t2);width:78px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-fill.ein{background:var(--ac)}
.bar-fill.aus{background:var(--dg)}
.bar-val{font-size:10px;color:#fff;font-weight:600;white-space:nowrap}
.bar-val.outside{color:var(--t2);position:absolute;left:calc(100% + 6px)}
.legend-row{display:flex;gap:14px;font-size:11px;color:var(--t2);margin-top:8px}
.legend-dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px}
.kw-spark{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:6px}
.kw-bar-pair{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.kw-bars{display:flex;align-items:flex-end;gap:2px;height:48px;width:100%;justify-content:center}
.kw-bar{width:7px;border-radius:2px 2px 0 0}
.kw-bar.ein{background:var(--ac)}
.kw-bar.aus{background:var(--dg)}
.kw-lbl{font-size:9px;color:var(--t3)}
.log-entry{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:5px;font-size:13px}
.log-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.log-icon.ein{background:var(--ol);color:var(--ac)}
.log-icon.aus{background:var(--dl);color:var(--dg)}
.log-icon svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.log-info{flex:1;min-width:0}
.log-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:11px;color:var(--t2)}
.log-amt{font-size:13px;font-weight:600;flex-shrink:0}
.log-amt.ein{color:var(--ac)}
.log-amt.aus{color:var(--dg)}

/* Etikett / Label printing */
.label-format-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.label-format-opt{border:1px solid var(--bd);border-radius:var(--rs);padding:10px;cursor:pointer;text-align:center;background:var(--sf)}
.label-format-opt.on{border-color:var(--ac);background:var(--al)}
.label-format-opt .lf-name{font-size:13px;font-weight:600}
.label-format-opt .lf-dim{font-size:11px;color:var(--t2);margin-top:2px}
.label-preview-wrap{display:flex;justify-content:center;padding:20px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:14px;overflow-x:auto}
#label-sheet{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);padding:6px;box-sizing:border-box}
#label-sheet .lbl-name{font-weight:700;color:#000;text-align:center;line-height:1.15;width:100%;overflow:hidden}
#label-sheet .lbl-sub{color:#000;text-align:center;line-height:1.2;width:100%;overflow:hidden}
#label-sheet svg{display:block}
.own-code-box{background:var(--al);border:1px solid var(--am);border-radius:var(--rs);padding:11px 13px;margin-bottom:14px;font-size:13px;color:var(--ac)}
.own-code-box strong{font-family:monospace;font-size:14px}
.lcw{display:flex;flex-wrap:wrap;gap:7px}
.br{display:flex;gap:10px;margin-top:20px}
.bp{flex:1;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer}
.bp:hover{background:var(--ad)}

.dh img{width:100%;height:100%;object-fit:cover}

.db{padding:16px}
.dn{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.dbr{font-size:14px;color:var(--t2);margin-bottom:14px}
.il{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ir{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bd);font-size:14px}
.ir:last-child{border-bottom:none}
.ik{color:var(--t2);display:flex;align-items:center;gap:8px}
.ik svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75}
.iv{font-weight:500}
.spr{display:flex;align-items:center;gap:12px}
.spb{width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.spv{font-size:20px;font-weight:700;min-width:32px;text-align:center}
.acr{display:flex;gap:8px}
.acb{flex:1;padding:11px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.acb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75}
.acb.d{border-color:color-mix(in srgb,var(--dg) 40%,transparent);color:var(--dg)}
.acb:hover{background:var(--bg)}
.db-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);font-size:14px;color:var(--tx);margin-bottom:8px;cursor:pointer;text-align:left}
.db-btn svg{width:18px;height:18px;stroke:var(--ac);fill:none;stroke-width:1.75;flex-shrink:0}
.db-btn.d svg{stroke:var(--dg)}.db-btn.d{color:var(--dg)}
.ss{margin-bottom:20px}
.ssl{font-size:15px;font-weight:600;margin-bottom:10px}
.lmi{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;font-size:14px}
.lmi svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.75}
.ghf{margin-bottom:12px}
.ghf label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.ghf input{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px}
.ghf input:focus{outline:none;border-color:var(--ac)}
.ghs{font-size:13px;padding:8px 12px;border-radius:var(--rs);margin-bottom:10px}
.ghs.ok{background:var(--ol);color:var(--ok)}.ghs.err{background:var(--dl);color:var(--dg)}.ghs.info{background:var(--al);color:var(--ac)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--t3);display:inline-block;margin-right:4px;flex-shrink:0}

.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}

#update-banner{position:fixed;top:0;left:0;right:0;background:var(--ac);color:#fff;display:none;align-items:center;justify-content:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;font-size:13px;font-weight:500;z-index:10500}
#update-banner.show{display:flex}
#update-banner button{background:rgba(255,255,255,.22);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#ldr{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;display:none;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

#lightbox-close{position:absolute;top:calc(14px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10001}
#lightbox-close svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;pointer-events:none}
.dh{cursor:zoom-in}
.at.has-photo{cursor:zoom-in}
#ldr.on{opacity:1;pointer-events:all}
.ldb{background:var(--sf);border-radius:var(--r);padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spn{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldm{font-size:14px;color:var(--t2)}

/* ── GitHub API ───────────────────────────────────────────────────── */
async function ghReq(path,method,body){
  if(!gh.tok||!gh.own||!gh.repo)throw new Error('GitHub nicht konfiguriert');
  const r=await fetch('https://api.github.com/repos/'+gh.own+'/'+gh.repo+path,{
    method:method||'GET',
    headers:{'Authorization':'token '+gh.tok,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){const t=await r.text();throw new Error('GitHub '+r.status+': '+t.slice(0,100));}
  return r.status===204?null:r.json();
}
async function ghGet(path){try{return await ghReq('/contents/'+path);}catch(e){return null;}}
function b64DecodeUtf8(b64){
  // Mirrors the encode side (encodeURIComponent → unescape → btoa) in reverse,
  // so umlauts and other non-ASCII characters survive the round-trip through GitHub.
  return decodeURIComponent(escape(atob(b64)));
}
async function ghPut(path,content,msg,sha){
  const b64=btoa(unescape(encodeURIComponent(content)));
  const body={message:msg,content:b64,branch:gh.br};
  if(sha)body.sha=sha;
  return ghReq('/contents/'+path,'PUT',body);
}
async function ghPutBin(path,b64raw,msg,sha){
  const b64=b64raw.includes(',')?b64raw.split(',')[1]:b64raw;
  const body={message:msg,content:b64,branch:gh.br};
  if(sha)body.sha=sha;
  return ghReq('/contents/'+path,'PUT',body);
}
async function ghDel(path,msg,sha){
  return ghReq('/contents/'+path,'DELETE',{message:msg,sha:sha,branch:gh.br});
}
async function uploadFoto(b64,fn){
  const path='bilder/'+fn;
  const ex=await ghGet(path);
  await ghPutBin(path,b64,'Foto: '+fn,ex?ex.sha:undefined);
  return 'https://raw.githubusercontent.com/'+gh.own+'/'+gh.repo+'/'+gh.br+'/'+path;
}

async function doSync(){
  if(!gh.tok||!gh.own||!gh.repo){toast('GitHub noch nicht konfiguriert');goScreen('s-settings');return;}
  ldr('Synchronisiere mit GitHub...');sdot('sy');
  try{
    // Nachträglicher Foto-Upload: Artikel, deren Foto noch lokal als Base64 vorliegt
    // (z.B. angelegt bevor GitHub konfiguriert war), werden jetzt hochgeladen.
    const pending=S.a.filter(a=>a.foto&&a.foto.startsWith('data:'));
    if(pending.length){
      ldr('Lade '+pending.length+' Foto(s) hoch…');
      for(const a of pending){
        try{
          const fn=a.fotoPath||(Date.now()+'_'+a.id+'.jpg');
          const url=await uploadFoto(a.foto,fn);
          a.foto=url;
          a.fotoPath=fn;
        }catch(e){
          console.error('Foto-Upload fehlgeschlagen für',a.name,e);
        }
      }
      saveL();
      ldr('Synchronisiere mit GitHub...');
    }

    const ex=await ghGet('haushaltbuch.json');
    const exp={artikel:S.a.map(a=>({...a})),lagerorte:S.lo,kategorien:S.ka,einheiten:S.ei,einkauf:S.ek,log:S.log||[],aktualisiert:new Date().toISOString()};
    await ghPut('haushaltbuch.json',JSON.stringify(exp,null,2),'Haushaltbuch Update',ex?ex.sha:undefined);
    // Load rezepte.json
    const rzf=await ghGet('rezepte.json');
    if(rzf&&rzf.content){
      try{
        const j=JSON.parse(b64DecodeUtf8(rzf.content.replace(/\n/g,'')));
        S.rz=Array.isArray(j)?j:(j.rezepte||[]);
        saveL();
      }catch(e){}
    }
    dirty=false;sdot('ok');hideLdr();
    toast(pending.length?(pending.length+' Foto(s) + Daten synchronisiert'):'Synchronisiert mit GitHub');
    renderLager();
  }catch(err){hideLdr();sdot('dt');toast('Fehler: '+err.message.slice(0,60));}
}

async function loadFromGH(){
  if(!gh.tok||!gh.own||!gh.repo)return;
  ldr('Lade von GitHub...');
  try{
    const f=await ghGet('haushaltbuch.json');
    if(f&&f.content){
      const d=JSON.parse(b64DecodeUtf8(f.content.replace(/\n/g,'')));
      S.a=d.artikel||[];S.lo=d.lagerorte||[...LD];S.ka=d.kategorien||[...KD];S.ei=d.einheiten||[...ED];S.ek=d.einkauf||[];S.log=d.log||[];
      S.nid=S.a.length?Math.max(...S.a.map(x=>x.id||0))+1:1;
      saveL();
    }
    const rzf=await ghGet('rezepte.json');
    if(rzf&&rzf.content){
      try{const j=JSON.parse(b64DecodeUtf8(rzf.content.replace(/\n/g,'')));S.rz=Array.isArray(j)?j:(j.rezepte||[]);saveL();}catch(e){}
    }
    sdot('ok');hideLdr();toast('Daten von GitHub geladen');renderLager();
  }catch(err){hideLdr();toast('Fehler: '+err.message.slice(0,50));}
}

/* ── Live-Kamera-Scanner (ZXing) ──────────────────────────────────── */
let zxReader=null;
let zxStream=null;
let zxTargetInputId=null; // which input field receives the scanned code
let zxOnResult=null; // optional callback(code) after scan

function getZXing(){
  // @zxing/browser exposes window.ZXingBrowser (has BrowserMultiFormatReader).
  // @zxing/library alone exposes window.ZXing (core only, no browser reader in older builds).
  if(window.ZXingBrowser&&window.ZXingBrowser.BrowserMultiFormatReader)return window.ZXingBrowser;
  if(window.ZXing&&window.ZXing.BrowserMultiFormatReader)return window.ZXing;
  return null;
}
function cameraApiAvailable(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
}
function httpsOk(){
  return location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';
}
async function waitForZXing(timeoutMs){
  const start=Date.now();
  while(Date.now()-start<timeoutMs){
    if(getZXing())return getZXing();
    await new Promise(r=>setTimeout(r,150));
  }
  return null;
}
function scannerSupported(){
  return cameraApiAvailable()&&httpsOk()&&!!getZXing();
}

let zxContinuous=false;
let zxLastCode='';
let zxLastTime=0;

async function openScanner(targetInputId,onResult,continuous){
  zxTargetInputId=targetInputId;
  zxOnResult=onResult||null;
  zxContinuous=!!continuous;
  zxLastCode='';zxLastTime=0;
  const wrap=document.getElementById('cam-'+targetInputId);
  if(!wrap)return;

  if(!httpsOk()){
    showCamErr(targetInputId,'Kamera benötigt eine sichere Verbindung (https://). Diese Seite läuft nicht über HTTPS.');
    return;
  }
  if(!cameraApiAvailable()){
    showCamErr(targetInputId,'Dieser Browser unterstützt keinen Kamerazugriff (getUserMedia fehlt). Bitte Barcode manuell eingeben.');
    return;
  }
  let ZX=getZXing();
  if(!ZX){
    showCamErr(targetInputId,'Scanner-Modul lädt noch…');
    ZX=await waitForZXing(4000);
  }
  if(!ZX){
    showCamErr(targetInputId,'Scanner-Bibliothek konnte nicht geladen werden (evtl. Internetverbindung oder Werbeblocker prüfen). Bitte Barcode manuell eingeben.');
    return;
  }

  wrap.style.display='block';
  hideCamErr(targetInputId);
  try{
    const video=document.getElementById('camv-'+targetInputId);
    const BrowserMultiFormatReader=ZX.BrowserMultiFormatReader;
    zxReader=new BrowserMultiFormatReader();
    let deviceId=undefined;
    try{
      const devices=await BrowserMultiFormatReader.listVideoInputDevices();
      const back=devices.find(d=>/back|rear|environment/i.test(d.label));
      if(back)deviceId=back.deviceId;
    }catch(de){/* device listing can fail before permission is granted; continue with default */}
    await zxReader.decodeFromVideoDevice(deviceId,video,(result,error)=>{
      if(result){
        const code=result.getText();
        const now=Date.now();
        if(code===zxLastCode&&(now-zxLastTime)<2500)return; // debounce duplicate scans
        zxLastCode=code;zxLastTime=now;
        if(navigator.vibrate)navigator.vibrate(80);
        if(!zxContinuous){
          closeScanner();
          const input=document.getElementById(targetInputId);
          if(input)input.value=code;
        }
        if(zxOnResult)zxOnResult(code);
        else flashScanOk(targetInputId,code);
      }
    });
  }catch(e){
    let msg='Kein Kamerazugriff: '+(e.message||'unbekannter Fehler')+'.';
    if(e.name==='NotAllowedError')msg='Kamera-Berechtigung wurde verweigert. Bitte in den Browser-/Website-Einstellungen erlauben.';
    else if(e.name==='NotFoundError')msg='Keine Kamera gefunden.';
    else if(e.name==='NotReadableError')msg='Kamera wird bereits von einer anderen App verwendet.';
    showCamErr(targetInputId,msg+' Bitte Barcode manuell eingeben.');
  }
}
function closeScanner(){
  try{if(zxReader){zxReader.reset();zxReader=null;}}catch(e){}
  document.querySelectorAll('.cam-wrap').forEach(w=>w.style.display='none');
}
function showCamErr(id,msg){
  const e=document.getElementById('camerr-'+id);
  if(e){e.textContent=msg;e.style.display='block';}
  const w=document.getElementById('cam-'+id);
  if(w)w.style.display='none';
}
function hideCamErr(id){const e=document.getElementById('camerr-'+id);if(e)e.style.display='none';}
function flashScanOk(id,code){
  toast('Barcode erkannt: '+code);
}
function camScannerHTML(id){
  return '<div class="cam-wrap" id="cam-'+id+'"><button class="cam-close" onclick="closeScanner()">'+I.xc+'</button><video id="camv-'+id+'" autoplay playsinline muted></video><div class="cam-frame"></div><div class="cam-hint">Barcode ins Feld halten</div></div><div class="cam-err" id="camerr-'+id+'"></div>';
}

/* ── Open Food Facts Lookup ───────────────────────────────────────── */
async function lookupOFF(barcode,statusElId){
  const statusEl=document.getElementById(statusElId);
  if(!barcode){if(statusEl){statusEl.className='lookup-status err';statusEl.innerHTML='Bitte zuerst einen Barcode eingeben.';}return null;}
  if(statusEl){statusEl.className='lookup-status busy';statusEl.innerHTML='<span class="spn" style="width:14px;height:14px;border-width:2px"></span> Suche Produktdaten...';}
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(barcode)+'.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.status!==1||!data.product){
      if(statusEl){statusEl.className='lookup-status err';statusEl.innerHTML=I.xc+' Kein Produkt zu diesem Barcode gefunden.';}
      return null;
    }
    const p=data.product;
    const result={
      name:p.product_name_de||p.product_name||p.generic_name||'',
      marke:p.brands?p.brands.split(',')[0].trim():'',
      foto:p.image_front_url||p.image_url||'',
      kat:mapOFFCategory(p.categories_tags||[]),
    };
    if(statusEl){statusEl.className='lookup-status ok';statusEl.innerHTML=I.chk+' Produkt gefunden: '+esc(result.name||barcode);}
    return result;
  }catch(e){
    if(statusEl){statusEl.className='lookup-status err';statusEl.innerHTML=I.xc+' Online-Suche fehlgeschlagen (keine Verbindung?).';}
    return null;
  }
}
function mapOFFCategory(tags){
  const t=tags.join(' ').toLowerCase();
  if(/milk|dairy|cheese|yogurt|cream/.test(t))return 'Milchprodukte';
  if(/meat|fish|poultry|sausage/.test(t))return 'Fleisch & Fisch';
  if(/vegetable|fruit/.test(t))return 'Gemüse & Früchte';
  if(/frozen/.test(t))return 'Tiefkühl';
  if(/beverage|drink|water|juice|soda|wine|beer/.test(t))return 'Getränke';
  if(/canned|pasta|rice|cereal|flour/.test(t))return 'Konserven & Trockenware';
  if(/bread|bakery|pastry/.test(t))return 'Backwaren & Brot';
  if(/spice|sauce|condiment|oil|vinegar/.test(t))return 'Gewürze & Saucen';
  if(/sweet|chocolate|candy|snack/.test(t))return 'Süsswaren';
  if(/clean|hygiene|detergent/.test(t))return 'Reinigung & Pflege';
  return '';
}

    fil=[...fil].sort((a,b)=>a.name.localeCompare(b.name,'de'));

  nav();

function addEinheit(sel){
  const n=prompt('Neue Einheit (z.B. Sack, Karton):');
  if(!n||!n.trim()){sel.value=S.ei[0]||'Stk';return;}
  const nm=n.trim();
  if(!S.ei.includes(nm)){S.ei.push(nm);saveL();}
  const opt=document.createElement('option');opt.value=nm;opt.textContent=nm;
  sel.insertBefore(opt,sel.lastElementChild);
  sel.value=nm;
}

function addKF(){

async function doLookupForm(){
  const bc=document.getElementById('f-bc').value.trim();
  const result=await lookupOFF(bc,'lookup-status-f');
  if(!result)return;
  if(result.name&&!document.getElementById('f-nm').value.trim())document.getElementById('f-nm').value=result.name;
  if(result.marke&&!document.getElementById('f-mk').value.trim())document.getElementById('f-mk').value=result.marke;
  if(result.kat){
    const kc=document.querySelector('#f-ka .chip[data-kat="'+result.kat+'"]');
    if(kc){document.querySelectorAll('#f-ka .chip[data-kat]').forEach(c=>c.classList.remove('on'));kc.classList.add('on');}
  }
  if(result.foto&&!fb64){
    try{
      const imgR=await fetch(result.foto);
      const blob=await imgR.blob();
      const reader=new FileReader();
      reader.onload=ev=>{
        fb64=ev.target.result;
        ffn=Date.now()+'_off.jpg';
        document.getElementById('ppi').src=fb64;
        document.getElementById('pz').style.display='none';
        document.getElementById('ppw').style.display='block';
      };
      reader.readAsDataURL(blob);
    }catch(e){}
  }
}
function onPh(ev){
  const file=ev.target.files[0];if(!file)return;
  ffn=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const rd=new FileReader();
  rd.onload=r=>{fb64=r.target.result;document.getElementById('ppi').src=fb64;document.getElementById('pz').style.display='none';document.getElementById('ppw').style.display='block';};
  rd.readAsDataURL(file);
}
function rmPh(){fb64='';ffn='';document.getElementById('ppw').style.display='none';document.getElementById('pz').style.display='flex';document.getElementById('ppi').src='';document.getElementById('fph').value='';}
async function saveForm(){
  const name=document.getElementById('f-nm').value.trim();
  if(!name){alert('Bitte eine Bezeichnung eingeben.');return;}
  const lc=document.querySelector('#f-lo .chip.on[data-lager]');
  if(!lc){alert('Bitte einen Lagerort wählen.');return;}
  const kc=document.querySelector('#f-ka .chip.on[data-kat]');
  if(!kc){alert('Bitte eine Kategorie wählen.');return;}
  ldr('Speichert...');
  let furl='',fpth='';
  if(fb64&&gh.tok&&gh.own&&gh.repo){
    try{furl=await uploadFoto(fb64,ffn);fpth=ffn;}
    catch(e){hideLdr();toast('Foto-Upload fehlgeschlagen: '+e.message.slice(0,40));furl=fb64;fpth=ffn;}
  }else if(fb64){furl=fb64;fpth=ffn;}
  else if(editId){const ex=S.a.find(x=>x.id===editId);if(ex){furl=ex.foto||'';fpth=ex.fotoPath||'';}}
  const preis=parseFloat(document.getElementById('f-pr').value)||0;
  const kaufdatum=document.getElementById('f-kd').value||todayISO();
  const packMenge=parseFloat(document.getElementById('f-pg').value)||0;
  const packEinheit=document.getElementById('f-pe').value;
  const d={name,marke:document.getElementById('f-mk').value.trim(),kat:kc.dataset.kat,lager:lc.dataset.lager,menge:parseInt(document.getElementById('f-mg').value)||0,einheit:document.getElementById('f-ei').value,mindest:parseInt(document.getElementById('f-mn').value)||1,barcode:document.getElementById('f-bc').value.trim(),preis,packMenge,packEinheit,kaufdatum,ablaufdatum:document.getElementById('f-ad').value||'',notiz:document.getElementById('f-nt').value.trim(),foto:furl,fotoPath:fpth};
  if(!editId&&preis>0){d.preisHistorie=[{datum:kaufdatum,preis,menge:d.menge}];}
  else if(editId){const ex=S.a.find(x=>x.id===editId);d.preisHistorie=ex&&ex.preisHistorie?ex.preisHistorie:[];}
  if(editId){const i=S.a.findIndex(x=>x.id===editId);if(i>=0)S.a[i]={...S.a[i],...d};}
  else{
    const newId=S.nid++;
    S.a.push({id:newId,...d});
    if(d.menge>0)addLogEntry('ein',newId,d.name,d.lager,d.kat,d.menge,d.einheit,preis);
  }
  fb64='';ffn='';saveL();hideLdr();closeForm();toast(editId?'Artikel aktualisiert':'Artikel hinzugefügt');
}

function confirmEingang(id,ablaufPflicht){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  const addMenge=parseInt(document.getElementById('e-mg').value)||1;
  const preis=parseFloat(document.getElementById('e-pr').value)||0;
  const isAktion=document.getElementById('e-aktion')&&document.getElementById('e-aktion').checked;
  const kaufdatum=document.getElementById('e-kd').value||todayISO();
  const ablaufdatum=document.getElementById('e-ad').value;
  // Pflichtprüfung Ablaufdatum
  if(ablaufPflicht&&!ablaufdatum){
    const adDisplay=document.getElementById('e-ad-display');
    if(adDisplay){adDisplay.style.borderColor='var(--dg)';adDisplay.style.boxShadow='0 0 0 3px color-mix(in srgb,var(--dg) 20%,transparent)';}
    toast('Bitte Ablaufdatum eingeben — dieser Artikel hatte bisher immer eines');
    return;
  }
  a.menge+=addMenge;
  a.kaufdatum=kaufdatum;
  if(ablaufdatum)a.ablaufdatum=ablaufdatum;
  // Preis immer loggen
  if(!a.preisHistorie)a.preisHistorie=[];
  a.preisHistorie.push({datum:kaufdatum,preis,menge:addMenge,aktion:isAktion||false});
  // Standardpreis nur aktualisieren wenn kein Aktionspreis
  if(preis>0&&!isAktion){
    a.preis=preis;
  }
  addLogEntry('ein',a.id,a.name,a.lager,a.kat,addMenge,a.einheit,preis,isAktion||false);
  saveL();
  const aktionHinweis=isAktion?' (Aktionspreis, Standardpreis unverändert)':'';
  toast('+'+addMenge+' '+esc(a.einheit||'Stk')+' · CHF '+(preis>0?preis.toFixed(2):'—')+aktionHinweis);
  goScreen('s-lager');
}

  const list=document.getElementById('ausgang-list');

  if(!found){

  found.menge=Math.max(0,found.menge-1);

  saveL();
  ausgangLog.unshift({id:found.id,name:found.name,foto:found.foto,lager:found.lager,einheit:found.einheit,zeit:Date.now()});
  if(list.children.length===1&&list.children[0].textContent.includes('Noch keine'))list.innerHTML='';

/* ── Eigene Barcodes & Etiketten-Druck ────────────────────────────── */
let etikettArtikelId=null;
const DK_FORMATS=[
  {id:'dk11204',name:'DK-11204 (Standard)',wmm:54,hmm:17,kind:'die-cut',printW:54,printH:17},
  {id:'dk2205', name:'DK-2205 / DK-2251', wmm:62,hmm:0, kind:'continuous',printW:62,printH:40},
  {id:'dk1201', name:'DK-1201 Adress',    wmm:90,hmm:29,kind:'die-cut',printW:90,printH:29},
  {id:'dk1209', name:'DK-1209 klein',     wmm:62,hmm:29,kind:'die-cut',printW:62,printH:29},
];
let labelFormatId='dk11204';

function genOwnCode(){
  // Eigenes internes Code-Format: HB-000123 (6-stellig, fortlaufend)
  const used=new Set(S.a.filter(a=>a.ownCode).map(a=>a.ownCode));
  let n=S.a.length+1;
  let code;
  do{ code='HB-'+String(n).padStart(6,'0'); n++; }while(used.has(code));
  return code;
}

function openEtikett(artikelId){
  const a=S.a.find(x=>x.id===artikelId);
  if(!a)return;
  etikettArtikelId=artikelId;
  // Falls kein Barcode vorhanden, eigenen Code zuweisen (einmalig, dauerhaft)
  if(!a.barcode&&!a.ownCode){
    a.ownCode=genOwnCode();
    saveL();
  }
  renderEtikettScreen();
  goScreen('s-etikett');
}

function renderEtikettScreen(){
  const a=S.a.find(x=>x.id===etikettArtikelId);
  if(!a)return;
  const code=a.barcode||a.ownCode;
  const isOwn=!a.barcode&&!!a.ownCode;

  const fmtChips=DK_FORMATS.map(f=>'<div class="label-format-opt'+(labelFormatId===f.id?' on':'')+'" onclick="setLabelFormat(\''+f.id+'\')"><div class="lf-name">'+esc(f.name)+'</div><div class="lf-dim">'+f.wmm+'×'+(f.hmm||'∞')+' mm</div></div>').join('');

  document.getElementById('etikett-body').innerHTML=
    (isOwn?'<div class="own-code-box">'+I.tag+' Dieser Artikel hat keinen Barcode. Eigener interner Code wurde vergeben: <strong>'+esc(code)+'</strong></div>':'')+
    '<div class="fd"><label>Etikettenformat (Brother DK)</label><div class="label-format-grid">'+fmtChips+'</div></div>'+
    '<div class="label-preview-wrap"><div id="label-preview-outer"><canvas id="label-canvas" style="max-width:100%;height:auto;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.12)"></canvas></div></div>'+
    '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">'+
      '<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)"><input type="checkbox" id="lbl-show-price" '+(a.preis?'checked':'')+' style="width:16px;height:16px" onchange="renderLabelPreview()"/> Preis anzeigen</label>'+
      '<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)"><input type="checkbox" id="lbl-show-kaufdatum" '+(a.kaufdatum?'checked':'')+' style="width:16px;height:16px" onchange="renderLabelPreview()"/> Kaufdatum anzeigen</label>'+
      '<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)"><input type="checkbox" id="lbl-show-ablauf" '+(a.ablaufdatum?'checked':'')+' style="width:16px;height:16px" onchange="renderLabelPreview()"/> Ablaufdatum (MHD) anzeigen</label>'+
    '</div>'+
    '<button class="bp" style="width:100%;margin-bottom:8px;font-size:16px" onclick="copyLabelToClipboard()">📋 Bild in Zwischenablage kopieren</button>'+
    '<p style="font-size:12px;color:var(--t3);text-align:center;line-height:1.6">Danach Brother iPrint&amp;Label öffnen → Neues Etikett → Bild einfügen</p>';

  renderLabelPreview();
}

function setLabelFormat(id){ labelFormatId=id; renderLabelPreview(); }

function mmToPx(mm,dpi){ return Math.round(mm/25.4*(dpi||96)); }

function renderLabelPreview(){
  const a=S.a.find(x=>x.id===etikettArtikelId);
  if(!a)return;
  const fmt=DK_FORMATS.find(f=>f.id===labelFormatId)||DK_FORMATS[0];
  const code=a.barcode||a.ownCode;
  const showPrice=document.getElementById('lbl-show-price')&&document.getElementById('lbl-show-price').checked;
  const showKaufdatum=document.getElementById('lbl-show-kaufdatum')&&document.getElementById('lbl-show-kaufdatum').checked;
  const showAblauf=document.getElementById('lbl-show-ablauf')&&document.getElementById('lbl-show-ablauf').checked;
  drawLabelCanvas('label-canvas',a,fmt,code,showPrice,showKaufdatum,showAblauf,4);
}

function drawLabelCanvas(canvasId,a,fmt,code,showPrice,showKaufdatum,showAblauf,scale){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpi=scale*96;
  const wpx=mmToPx(fmt.printW,dpi);
  const hpx=mmToPx(fmt.printH||40,dpi);
  canvas.width=wpx;
  canvas.height=hpx;
  canvas.style.width=mmToPx(fmt.printW,96*2)+'px';
  canvas.style.height=mmToPx(fmt.printH||40,96*2)+'px';
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,wpx,hpx);

  const pad=Math.round(scale*3);

  // Render barcode directly onto a temporary canvas via JsBarcode
  const bcCanvas=document.createElement('canvas');
  let bcOk=false;
  try{
    const bcH=fmt.id==='dk11204'
      ?Math.round(hpx*0.78)
      :Math.round(hpx*0.55);
    JsBarcode(bcCanvas,code,{
      format:'CODE128',
      width:Math.max(1,Math.round(scale*1.3)),
      height:bcH,
      fontSize:Math.round(scale*7),
      margin:Math.round(scale*2),
      displayValue:true,
      background:'#ffffff',
      lineColor:'#000000',
    });
    bcOk=true;
  }catch(e){bcOk=false;}

  if(bcOk){
    if(fmt.id==='dk11204'){
      // Landscape: Barcode links, Text rechts
      const bcW=Math.min(bcCanvas.width,Math.round(wpx*0.58));
      const bcY=Math.round((hpx-bcCanvas.height)/2);
      ctx.drawImage(bcCanvas,0,0,bcCanvas.width,bcCanvas.height, 0,Math.max(0,bcY),bcW,bcCanvas.height);
      drawInfoText(ctx,a,wpx,hpx,bcW+pad,pad,wpx-bcW-pad*2,scale,showPrice,showKaufdatum,showAblauf);
    }else{
      // Portrait: Barcode oben, Text darunter
      const bcDisplayH=Math.round(hpx*0.6);
      ctx.drawImage(bcCanvas,0,0,bcCanvas.width,bcCanvas.height, pad,0,wpx-pad*2,bcDisplayH);
      drawInfoText(ctx,a,wpx,hpx,pad,bcDisplayH+pad,wpx-pad*2,scale,showPrice,showKaufdatum,showAblauf);
    }
  }else{
    // Kein Barcode: nur Text
    drawInfoText(ctx,a,wpx,hpx,pad,pad,wpx-pad*2,scale,showPrice,showKaufdatum,showAblauf);
  }
}

function drawInfoText(ctx,a,wpx,hpx,x,y,maxW,scale,showPrice,showKaufdatum,showAblauf){
  const fs=Math.max(6,Math.round(scale*6.5));
  const fsSmall=Math.max(5,Math.round(scale*5.5));
  const lh=Math.round(fs*1.4);
  ctx.fillStyle='#000000';
  ctx.textBaseline='top';
  // Name (bold)
  ctx.font='bold '+fs+'pt sans-serif';
  const name=truncText(ctx,a.name,maxW);
  ctx.fillText(name,x,y);
  let cy=y+lh;
  // Sublines
  ctx.font=fsSmall+'pt sans-serif';
  ctx.fillStyle='#333333';
  const subs=[];
  if(a.marke)subs.push(a.marke);
  if(a.lager)subs.push(a.lager);
  if(showPrice&&a.preis)subs.push('CHF '+a.preis.toFixed(2));
  if(showKaufdatum&&a.kaufdatum)subs.push('Kauf: '+fmtDateCH(a.kaufdatum));
  if(showAblauf&&a.ablaufdatum)subs.push('MHD: '+fmtDateCH(a.ablaufdatum));
  subs.forEach(s=>{
    if(cy+lh>hpx)return;
    ctx.fillText(truncText(ctx,s,maxW),x,cy);
    cy+=Math.round(lh*0.9);
  });
}

function drawTextOnly(ctx,a,fmt,wpx,hpx,scale,showPrice,showKaufdatum,showAblauf){
  const pad=Math.round(scale*4);
  drawInfoText(ctx,a,wpx,hpx,pad,pad,wpx-pad*2,scale,showPrice,showKaufdatum,showAblauf);
}

function truncText(ctx,text,maxW){
  if(ctx.measureText(text).width<=maxW)return text;
  let t=text;
  while(t.length>1&&ctx.measureText(t+'…').width>maxW)t=t.slice(0,-1);
  return t+'…';
}

async function copyLabelToClipboard(){
  const a=S.a.find(x=>x.id===etikettArtikelId);
  if(!a){toast('Kein Artikel ausgewählt');return;}
  const fmt=DK_FORMATS.find(f=>f.id===labelFormatId)||DK_FORMATS[0];
  const code=a.barcode||a.ownCode;
  const showPrice=document.getElementById('lbl-show-price')&&document.getElementById('lbl-show-price').checked;
  const showKaufdatum=document.getElementById('lbl-show-kaufdatum')&&document.getElementById('lbl-show-kaufdatum').checked;
  const showAblauf=document.getElementById('lbl-show-ablauf')&&document.getElementById('lbl-show-ablauf').checked;

  // Render hochauflösend (scale=12 ≈ 300dpi) — synchron, kein Warten nötig
  const hiCanvas=document.createElement('canvas');
  hiCanvas.style.display='none';
  document.body.appendChild(hiCanvas);
  drawLabelCanvas(hiCanvas.id='hb-print-canvas',a,fmt,code,showPrice,showKaufdatum,showAblauf,12);

  try{
    hiCanvas.toBlob(async blob=>{
      hiCanvas.remove();
      if(!blob){toast('Bild konnte nicht erstellt werden');return;}
      try{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        toast('✓ Etikett kopiert — jetzt Brother App öffnen und einfügen');
      }catch(e){
        const url=URL.createObjectURL(blob);
        const w=window.open(url,'_blank');
        if(w)toast('Bild in neuem Tab — lange drücken zum Speichern');
        else toast('Popup blockiert — bitte Popups erlauben');
      }
    },'image/png');
  }catch(e){
    hiCanvas.remove();
    toast('Fehler: '+e.message);
  }
}

function renderRezepte(){
  const names=S.a.map(a=>a.name.toLowerCase());
  const src=S.rz.length?S.rz.map(r=>{
    const zt=(r.zutaten||[]).map(z=>typeof z==='string'?z:(z.zutat||z.name||''));
    return{id:r.id||r.titel,name:r.titel||r.name,emoji:r.emoji||'\uD83C\uDF7D',min:r.dauer||r.zeit||20,port:r.portionen||4,zt};
  }):[
    {id:1,name:'Pasta Carbonara',emoji:'\uD83C\uDF5D',min:20,port:4,zt:['Pasta','Eier','Speck','Parmesan','Rahm']},
    {id:2,name:'Gemüsesuppe',emoji:'\uD83C\uDF72',min:40,port:6,zt:['Karotten','Lauch','Sellerie','Kartoffeln','Bouillon']},
    {id:3,name:'Pfannkuchen',emoji:'\uD83E\uDD5E',min:20,port:4,zt:['Mehl','Eier','Milch','Butter','Salz']},
    {id:4,name:'Grüner Salat',emoji:'\uD83E\uDD57',min:10,port:2,zt:['Salat','Olivenöl','Essig','Salz']},
    {id:5,name:'Omelette',emoji:'\uD83C\uDF73',min:10,port:1,zt:['Eier','Butter','Salz','Käse']},
  ];
  const sc=src.map(r=>{
    const have=r.zt.filter(z=>names.some(n=>n.includes(z.toLowerCase())));
    return{...r,have,pct:Math.round(have.length/Math.max(r.zt.length,1)*100)};
  }).sort((a,b)=>b.pct-a.pct);
  const full=sc.filter(r=>r.pct===100),part=sc.filter(r=>r.pct>=50&&r.pct<100),miss=sc.filter(r=>r.pct<50);
  let h='';
  if(!src.length)h='<div class="empty">'+I.pkg+'<p>Keine Rezepte</p><small>GitHub synchronisieren um rezepte.json zu laden</small></div>';
  if(full.length)h+='<div class="sh">Vollständig kochbar ('+full.length+')</div>'+full.map(rcCard).join('');
  if(part.length)h+='<div class="sh">Fast kochbar</div>'+part.map(rcCard).join('');
  if(miss.length)h+='<div class="sh">Zutaten fehlen</div>'+miss.map(rcCard).join('');
  document.getElementById('rezept-list').innerHTML=h;
}
function rcCard(r){
  const f=r.pct===100;
  const miss=r.zt.filter(z=>!r.have.some(h=>h.toLowerCase()===z.toLowerCase()));
  const tags=[...r.have.map(z=>'<span class="zt ok">'+esc(z)+'</span>'),...miss.map(z=>'<span class="zt ms">'+esc(z)+' fehlt</span>')].join('');
  const missJson=miss.length?'data-miss=\''+esc(JSON.stringify(miss))+'\' ':'';
  const buyBtn=miss.length?'<button '+missJson+'onclick="addMissingToEinkauf(this)" style="margin-top:10px;width:100%;padding:8px;border:1px solid var(--am);background:var(--al);color:var(--ac);border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">'+I.cart+' '+miss.length+' fehlende Zutat'+(miss.length===1?'':'en')+' auf Einkaufsliste</button>':'';
  return '<div class="rc"><div class="rct"><div class="rci'+(f?'':" p")+'">'+r.emoji+'</div><div><div class="rct-n">'+esc(r.name)+'</div><div class="rct-s">'+r.port+' Port. · '+r.min+' min</div></div></div><div class="mr"><span>Zutaten vorhanden</span><span class="mp '+(f?'f':'p')+'">'+r.have.length+'/'+r.zt.length+'</span></div><div class="mt"><div class="mf '+(f?'f':'')+'" style="width:'+r.pct+'%"></div></div><div class="ztgs">'+tags+'</div>'+buyBtn+'</div>';
}
function addMissingToEinkauf(btn){
  let miss=[];
  try{miss=JSON.parse(btn.dataset.miss);}catch(e){return;}
  if(!S.ek)S.ek=[];
  const existing=new Set(S.ek.map(e=>e.text.toLowerCase()));
  const added=[];
  miss.forEach(z=>{
    if(!existing.has(z.toLowerCase())){
      S.ek.push({id:Date.now()+Math.random(),text:z,checked:false});
      existing.add(z.toLowerCase());
      added.push(z);
    }
  });
  if(added.length){
    saveL();
    toast(added.length+' Zutat'+(added.length===1?'':'en')+' auf Einkaufsliste');
    btn.style.background='var(--ol)';
    btn.style.borderColor='color-mix(in srgb,var(--ok) 40%,transparent)';
    btn.style.color='var(--ok)';
    btn.textContent='✓ Zur Einkaufsliste hinzugefügt';
    btn.disabled=true;
  }else{
    toast('Alle fehlenden Zutaten schon auf der Einkaufsliste');
  }
}

/* ── Übersicht ────────────────────────────────────────────────────── */
let statPeriod=30;
function renderStatPeriodChips(){
  const opts=[{d:7,l:'7 Tage'},{d:30,l:'30 Tage'},{d:90,l:'90 Tage'},{d:365,l:'1 Jahr'},{d:99999,l:'Alle'}];
  const el=document.getElementById('stat-period-chips');
  if(el)el.innerHTML=opts.map(o=>'<button class="chip'+(statPeriod===o.d?' on':'')+'" onclick="setStatPeriod('+o.d+')">'+esc(o.l)+'</button>').join('');
}
function setStatPeriod(d){statPeriod=d;renderStat();}

function renderUeb(){
  const t=S.a.length;
  const w=S.a.filter(a=>a.menge<a.mindest);
  const expSoon=S.a.filter(a=>a.ablaufdatum&&daysUntil(a.ablaufdatum)<=7).sort((a,b)=>a.ablaufdatum.localeCompare(b.ablaufdatum));
  const nm=S.a.map(a=>a.name.toLowerCase());
  const k=(S.rz||[]).filter(r=>(r.zutaten||[]).every(z=>nm.some(n=>n.includes((typeof z==='string'?z:(z.zutat||'')).toLowerCase())))).length;
  let h='<div class="stg">'+
    '<div class="stc"><div class="stl">Artikel total</div><div class="stn a">'+t+'</div></div>'+
    '<div class="stc"><div class="stl">Kochbar</div><div class="stn ok">'+k+'</div></div>'+
    '<div class="stc"><div class="stl">Mindestbestand</div><div class="stn '+(w.length?'w':'ok')+'">'+w.length+'</div></div>'+
    '<div class="stc"><div class="stl">Bald ablaufend</div><div class="stn '+(expSoon.length?'w':'ok')+'">'+expSoon.length+'</div></div>'+
  '</div>';
  if(expSoon.length){
    h+='<div class="sh">Bald ablaufend</div>';
    h+=expSoon.map(a=>{const d=daysUntil(a.ablaufdatum);return '<div class="ar" onclick="showDet('+a.id+')"><div class="at">'+I.pkg.replace('20px;height:20px','22px;height:22px')+'</div><div class="ai"><div class="an">'+esc(a.name)+'</div><div class="am">'+esc(a.lager)+'</div></div><div class="abs"><span class="exp-badge '+expClass(d)+'" style="margin-top:0">'+expLabel(d)+'</span></div></div>';}).join('');
  }
  if(w.length){
    h+='<div class="sh">Unter Mindestbestand</div>';
    h+=w.map(a=>'<div class="ar" onclick="showDet('+a.id+')"><div class="at">'+I.pkg.replace('20px;height:20px','22px;height:22px')+'</div><div class="ai"><div class="an">'+esc(a.name)+'</div><div class="am">'+esc(a.lager)+'</div></div><div class="abs"><div class="bn wn">'+a.menge+'/'+a.mindest+'</div><div class="bu">'+esc(a.einheit||'Stk')+'</div></div></div>').join('');
  }
  if(!expSoon.length&&!w.length){
    h+='<div style="text-align:center;padding:32px 16px;color:var(--ok);font-size:15px;font-weight:500">✓ Alles in Ordnung</div>';
  }
  document.getElementById('ub-body').innerHTML=h;
}

function renderStat(){
  renderStatPeriodChips();
  const log=S.log||[];
  const cutoff=statPeriod>=99999?0:Date.now()-statPeriod*86400000;
  const filtered=log.filter(e=>e.zeit>=cutoff);
  const ein=filtered.filter(e=>e.t==='ein');
  const aus=filtered.filter(e=>e.t==='aus');
  const totalEin=ein.reduce((s,e)=>s+e.menge,0);
  const totalAus=aus.reduce((s,e)=>s+e.menge,0);
  const totalAusgaben=ein.reduce((s,e)=>s+(e.preis||0)*e.menge,0);
  const aktionen=ein.filter(e=>e.aktion);
  const totalAktion=aktionen.reduce((s,e)=>s+(e.preis||0)*e.menge,0);

  if(!filtered.length){
    document.getElementById('stat-body').innerHTML=
      '<div style="text-align:center;padding:40px 16px;color:var(--t3);font-size:14px">Noch keine Bewegungen erfasst.<br>Statistik füllt sich automatisch beim Erfassen von Eingängen und Ausgängen.</div>';
    return;
  }

  let h='';

  // 1. Überblick-Kennzahlen
  const avgAusgaben=totalAusgaben>0&&statPeriod<99999?(totalAusgaben/(statPeriod/30)).toFixed(2):'—';
  h+='<div class="sh">Überblick</div>';
  h+='<div class="stg">'+
    '<div class="stc"><div class="stl">Eingänge</div><div class="stn ok">'+totalEin+'</div></div>'+
    '<div class="stc"><div class="stl">Ausgänge</div><div class="stn" style="color:var(--dg)">'+totalAus+'</div></div>'+
    '<div class="stc"><div class="stl">Ausgaben total</div><div class="stn a">CHF '+(totalAusgaben>0?totalAusgaben.toFixed(2):'—')+'</div></div>'+
    '<div class="stc"><div class="stl">Ø pro Monat</div><div class="stn a">CHF '+avgAusgaben+'</div></div>'+
  '</div>';

  // 2. Ausgaben gesamt + Aktionen
  if(totalAusgaben>0){
    const aktionPct=totalAusgaben>0?Math.round(totalAktion/totalAusgaben*100):0;
    h+='<div class="stat-chart-card">'+
      '<div class="stat-chart-title">Ausgaben im Zeitraum</div>'+
      '<div style="font-size:28px;font-weight:700;color:var(--ac);margin:4px 0">CHF '+totalAusgaben.toFixed(2)+'</div>'+
      (totalAktion>0?'<div style="font-size:13px;color:var(--wn);margin-top:4px">🏷️ Davon Aktionspreise: CHF '+totalAktion.toFixed(2)+' ('+aktionPct+'%)</div>':'')+
    '</div>';
  }

  // 3. Wöchentliche Bewegungen
  h+=renderWeeklyChart(filtered);

  // 4. Ausgaben nach Monat (wenn Zeitraum >= 60 Tage)
  if(statPeriod>=60||statPeriod>=99999){
    h+=renderMonthlySpendChart(ein.filter(e=>e.preis>0));
  }

  // 5. Meistverbrauchte Artikel
  h+=renderTopItemsChart(aus,'Meistverbrauchte Artikel','aus');

  // 6. Meistgekaufte Artikel (Eingänge)
  h+=renderTopItemsChart(ein,'Meistgekaufte Artikel','ein');

  // 7. Ausgaben nach Kategorie
  h+=renderCategorySpendChart(ein.filter(e=>e.preis>0));

  // 8. Ausgaben nach Lagerort
  h+=renderLocationSpendChart(ein.filter(e=>e.preis>0));

  // 9. Umschlagshäufigkeit (Eingang vs Ausgang pro Artikel)
  h+=renderTurnoverChart(filtered);

  // 10. Letzte Bewegungen
  h+='<div class="sh">Letzte Bewegungen</div>';
  const recent=filtered.slice().reverse().slice(0,30);
  h+=recent.map(e=>{
    const icon=e.t==='ein'?'<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>':'<svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
    const dt=new Date(e.zeit);
    const ts=fmtDateCH(e.datum)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    const priceStr=e.preis>0?' · CHF '+(e.preis*e.menge).toFixed(2)+(e.aktion?' 🏷️':''):'';
    return '<div class="log-entry"><div class="log-icon '+e.t+'">'+icon+'</div><div class="log-info"><div class="log-name">'+esc(e.name)+'</div><div class="log-meta">'+ts+' · '+esc(e.lager||'')+priceStr+'</div></div><div class="log-amt '+e.t+'">'+(e.t==='ein'?'+':'−')+e.menge+' '+esc(e.einheit||'Stk')+'</div></div>';
  }).join('');
  if(filtered.length>30)h+='<div style="text-align:center;padding:8px;color:var(--t3);font-size:12px">… und '+(filtered.length-30)+' weitere Einträge</div>';

  document.getElementById('stat-body').innerHTML=h;
}

function renderMonthlySpendChart(entries){
  if(!entries.length)return '';
  const byMonth={};
  entries.forEach(e=>{
    const m=e.datum?e.datum.slice(0,7):'';
    if(!m)return;
    byMonth[m]=(byMonth[m]||0)+(e.preis||0)*e.menge;
  });
  const months=Object.keys(byMonth).sort().slice(-12);
  if(months.length<2)return '';
  const max=Math.max(...months.map(m=>byMonth[m]));
  const rows=months.map(m=>{
    const [y,mo]=m.split('-');
    const lbl=mo+'/'+y.slice(2);
    const pct=Math.max(6,Math.round(byMonth[m]/max*100));
    return '<div class="bar-row"><div class="bar-label">'+esc(lbl)+'</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pct+'%"><span class="bar-val">CHF '+byMonth[m].toFixed(0)+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Ausgaben nach Monat</div><div class="stat-chart-sub">Letzte '+months.length+' Monate</div>'+rows+'</div>';
}

function renderLocationSpendChart(entries){
  if(!entries.length)return '';
  const byLager={};
  entries.forEach(e=>{const l=e.lager||'Unbekannt';byLager[l]=(byLager[l]||0)+(e.preis||0)*e.menge;});
  const sorted=Object.entries(byLager).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)return '';
  const max=sorted[0][1];
  const rows=sorted.map(([l,sum])=>{
    const pct=Math.max(6,Math.round(sum/max*100));
    return '<div class="bar-row"><div class="bar-label" title="'+esc(l)+'">'+esc(l)+'</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pct+'%"><span class="bar-val">CHF '+sum.toFixed(0)+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Ausgaben nach Lagerort</div><div class="stat-chart-sub">Zeigt wo eingekauft/gelagert wird</div>'+rows+'</div>';
}

function renderTurnoverChart(filtered){
  const byArt={};
  filtered.forEach(e=>{
    if(!byArt[e.name])byArt[e.name]={ein:0,aus:0};
    byArt[e.name][e.t]+=e.menge;
  });
  const sorted=Object.entries(byArt).filter(([,v])=>v.ein>0&&v.aus>0).sort((a,b)=>(b[1].aus+b[1].ein)-(a[1].aus+a[1].ein)).slice(0,6);
  if(!sorted.length)return '';
  const maxVal=Math.max(...sorted.map(([,v])=>Math.max(v.ein,v.aus)));
  const rows=sorted.map(([name,v])=>{
    const pEin=Math.max(4,Math.round(v.ein/maxVal*100));
    const pAus=Math.max(4,Math.round(v.aus/maxVal*100));
    return '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:3px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(name)+'</div>'+
      '<div class="bar-row" style="margin-bottom:2px"><div class="bar-label" style="font-size:11px;color:var(--ok)">Eingang</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pEin+'%"><span class="bar-val">'+v.ein+'</span></div></div></div>'+
      '<div class="bar-row"><div class="bar-label" style="font-size:11px;color:var(--dg)">Ausgang</div><div class="bar-track"><div class="bar-fill aus" style="width:'+pAus+'%"><span class="bar-val">'+v.aus+'</span></div></div></div>'+
    '</div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Umschlag: Eingang vs. Ausgang</div><div class="stat-chart-sub">Top Artikel nach Gesamtbewegung</div>'+rows+'</div>';
}

function isoWeekKey(ts){
  const d=new Date(ts);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const week1=new Date(d.getFullYear(),0,4);
  const wk=1+Math.round(((d-week1)/86400000-3+((week1.getDay()+6)%7))/7);
  return d.getFullYear()+'-W'+String(wk).padStart(2,'0');
}
function renderWeeklyChart(filtered){
  const byWeek={};
  filtered.forEach(e=>{
    const wk=isoWeekKey(e.zeit);
    if(!byWeek[wk])byWeek[wk]={ein:0,aus:0};
    byWeek[wk][e.t]+=e.menge;
  });
  const weeks=Object.keys(byWeek).sort().slice(-8);
  if(!weeks.length)return '';
  const max=Math.max(1,...weeks.map(w=>Math.max(byWeek[w].ein,byWeek[w].aus)));
  const bars=weeks.map(w=>{
    const d=byWeek[w];
    const hEin=Math.round(d.ein/max*48);
    const hAus=Math.round(d.aus/max*48);
    const lbl=w.split('-W')[1];
    return '<div class="kw-bar-pair"><div class="kw-bars"><div class="kw-bar ein" style="height:'+Math.max(hEin,d.ein>0?2:0)+'px" title="Eingang KW'+lbl+': '+d.ein+'"></div><div class="kw-bar aus" style="height:'+Math.max(hAus,d.aus>0?2:0)+'px" title="Ausgang KW'+lbl+': '+d.aus+'"></div></div><div class="kw-lbl">KW'+lbl+'</div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Eingänge / Ausgänge pro Woche</div><div class="stat-chart-sub">Letzte '+weeks.length+' Wochen mit Bewegungen</div><div class="kw-spark">'+bars+'</div><div class="legend-row"><span><span class="legend-dot" style="background:var(--ac)"></span>Eingang</span><span><span class="legend-dot" style="background:var(--dg)"></span>Ausgang</span></div></div>';
}
function renderTopItemsChart(entries,title,cls){
  if(!entries.length)return '';
  const byName={};
  entries.forEach(e=>{byName[e.name]=(byName[e.name]||0)+e.menge;});
  const sorted=Object.entries(byName).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max=sorted[0][1];
  const rows=sorted.map(([name,menge])=>{
    const pct=Math.max(8,Math.round(menge/max*100));
    return '<div class="bar-row"><div class="bar-label" title="'+esc(name)+'">'+esc(name)+'</div><div class="bar-track"><div class="bar-fill '+cls+'" style="width:'+pct+'%"><span class="bar-val">'+menge+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">'+title+'</div><div class="stat-chart-sub">Im gewählten Zeitraum</div>'+rows+'</div>';
}
function renderCategorySpendChart(entries){
  if(!entries.length)return '';
  const byKat={};
  entries.forEach(e=>{const k=e.kat||'Ohne Kategorie';byKat[k]=(byKat[k]||0)+(e.preis||0)*e.menge;});
  const sorted=Object.entries(byKat).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=sorted[0][1];
  const rows=sorted.map(([kat,sum])=>{
    const pct=Math.max(8,Math.round(sum/max*100));
    return '<div class="bar-row"><div class="bar-label" title="'+esc(kat)+'">'+esc(kat)+'</div><div class="bar-track"><div class="bar-fill ein" style="width:'+pct+'%"><span class="bar-val">CHF '+sum.toFixed(0)+'</span></div></div></div>';
  }).join('');
  return '<div class="stat-chart-card"><div class="stat-chart-title">Ausgaben nach Kategorie</div><div class="stat-chart-sub">Basierend auf erfassten Kaufpreisen</div>'+rows+'</div>';
}

function delM(id){S.ek=S.ek.filter(x=>x.id!==id);saveL();renderEk();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function packInfo(a){
  if(!a.packMenge||a.packMenge<=0)return '';
  const pm=a.packMenge%1===0?a.packMenge:a.packMenge.toFixed(1);
  return pm+' '+(a.packEinheit||'dl')+'/'+(a.einheit==='Stk'?'Stk':a.einheit||'Stk');
}
function packTotal(a){
  if(!a.packMenge||a.packMenge<=0)return '';
  const total=a.menge*a.packMenge;
  const tot=total%1===0?total:total.toFixed(1);
  return tot+' '+(a.packEinheit||'dl')+' gesamt';
}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysUntil(iso){
  if(!iso)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(iso+'T00:00:00');
  return Math.round((d-today)/86400000);
}
function fmtDateCH(iso){
  if(!iso)return '—';
  const p=iso.split('-');if(p.length!==3)return iso;
  return p[2]+'.'+p[1]+'.'+p[0];
}
function expClass(days){
  if(days===null)return '';
  if(days<0)return 'over';
  if(days<=3)return 'over';
  if(days<=7)return 'soon';
  return 'fresh';
}
function expLabel(days){
  if(days===null)return '';
  if(days<0)return 'abgelaufen seit '+Math.abs(days)+' Tag'+(Math.abs(days)===1?'':'en');
  if(days===0)return 'läuft heute ab';
  if(days===1)return 'läuft morgen ab';
  return 'noch '+days+' Tage';
}
function expBadge(iso){
  if(!iso)return '';
  const d=daysUntil(iso);
  const cls=expClass(d);
  return '<span class="exp-badge '+cls+'">'+expLabel(d)+'</span>';
}

/* ── PWA: Service Worker + Install-Prompt + Update-Erkennung ─────── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).then(reg=>{
      console.log('Service Worker registriert:',reg.scope);
      // Beim Laden direkt nach Updates fragen
      reg.update().catch(()=>{});
      reg.addEventListener('updatefound',()=>{
        const newWorker=reg.installing;
        if(!newWorker)return;
        newWorker.addEventListener('statechange',()=>{
          if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
            showUpdateBanner();
          }
        });
      });
    }).catch(err=>{
      console.error('Service Worker Fehler:',err);
    });
    // Periodisch (alle 60s) prüfen, ob eine neuere Version auf dem Server liegt
    setInterval(()=>{
      navigator.serviceWorker.getRegistration().then(reg=>{ if(reg)reg.update().catch(()=>{}); });
    },60000);
  });
  let reloadingForUpdate=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(reloadingForUpdate)return;
    reloadingForUpdate=true;
    window.location.reload();
  });
}
function showUpdateBanner(){
  const b=document.getElementById('update-banner');
  if(b)b.classList.add('show');
}
function checkForUpdate(){
  if(!('serviceWorker' in navigator)){toast('Service Worker nicht unterstützt');return;}
  toast('Suche nach Updates…');
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(!reg){toast('Kein Service Worker registriert');return;}
    reg.update().then(()=>{
      setTimeout(()=>{
        if(reg.waiting){showUpdateBanner();}
        else{toast('Du hast bereits die neueste Version');}
      },800);
    }).catch(()=>toast('Update-Prüfung fehlgeschlagen'));
  });
}

async function runPwaDiagnose(){
  const box=document.getElementById('pwa-diag-result');
  box.innerHTML='<div style="font-size:12px;color:var(--t2);margin-top:8px">Prüfe…</div>';
  const rows=[];
  const ok='<span style="color:var(--ok);font-weight:600">✓</span>';
  const bad='<span style="color:var(--dg);font-weight:600">✗</span>';
  const warn='<span style="color:var(--wn);font-weight:600">!</span>';

  // 1. HTTPS
  const https=location.protocol==='https:';
  rows.push([https?ok:bad,'HTTPS aktiv',location.protocol]);

  // 2. Manifest Link vorhanden im DOM
  const manifestLink=document.querySelector('link[rel="manifest"]');
  rows.push([manifestLink?ok:bad,'Manifest-Link im HTML',manifestLink?manifestLink.getAttribute('href'):'fehlt']);

  // 3. Manifest tatsächlich ladbar + parsebar
  let manifestData=null,manifestErr='';
  if(manifestLink){
    try{
      const r=await fetch(manifestLink.href,{cache:'no-store'});
      const ct=r.headers.get('content-type')||'';
      if(!r.ok)manifestErr='HTTP '+r.status;
      else{
        manifestData=await r.json();
      }
      rows.push([r.ok?ok:bad,'Manifest abrufbar',r.status+' · '+ct]);
    }catch(e){
      rows.push([bad,'Manifest abrufbar',e.message]);
    }
  }

  // 4. Pflichtfelder im Manifest
  if(manifestData){
    rows.push([manifestData.name||manifestData.short_name?ok:bad,'name / short_name',manifestData.name||manifestData.short_name||'fehlt']);
    rows.push([manifestData.start_url?ok:bad,'start_url',manifestData.start_url||'fehlt']);
    const validDisplay=['standalone','fullscreen','minimal-ui'].includes(manifestData.display);
    rows.push([validDisplay?ok:bad,'display',manifestData.display||'fehlt']);
    const icons=manifestData.icons||[];
    const has192=icons.some(i=>i.sizes&&i.sizes.includes('192'));
    const has512=icons.some(i=>i.sizes&&i.sizes.includes('512'));
    rows.push([has192?ok:bad,'Icon 192×192 gelistet',has192?'vorhanden':'fehlt']);
    rows.push([has512?ok:bad,'Icon 512×512 gelistet',has512?'vorhanden':'fehlt']);
    // Check icons actually load
    for(const icon of icons){
      try{
        const iconUrl=new URL(icon.src,manifestLink.href).href;
        const ir=await fetch(iconUrl,{cache:'no-store'});
        rows.push([ir.ok?ok:bad,'Icon lädt: '+icon.sizes,ir.ok?(ir.headers.get('content-type')||''):('HTTP '+ir.status)]);
      }catch(e){
        rows.push([bad,'Icon lädt: '+(icon.sizes||icon.src),e.message]);
      }
    }
  }

  // 5. Service Worker
  if('serviceWorker' in navigator){
    const reg=await navigator.serviceWorker.getRegistration();
    rows.push([reg?ok:bad,'Service Worker registriert',reg?reg.scope:'kein Worker gefunden']);
    if(reg){
      rows.push([reg.active?ok:warn,'Service Worker aktiv',reg.active?reg.active.state:(reg.installing?'installing':reg.waiting?'waiting':'unbekannt')]);
    }
  }else{
    rows.push([bad,'Service Worker API verfügbar','nicht unterstützt']);
  }

  // 6. Bereits installiert?
  const isStandaloneNow=window.matchMedia('(display-mode: standalone)').matches;
  rows.push([isStandaloneNow?warn:ok,'Läuft im Browser (nicht installiert)',isStandaloneNow?'bereits als App offen':'im Browser-Tab']);

  const allOk=rows.every(r=>r[0]===ok||r[0]===warn);
  box.innerHTML='<div style="margin-top:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden">'+
    rows.map(r=>'<div style="display:flex;gap:8px;padding:7px 10px;border-bottom:1px solid var(--bd);font-size:12px;align-items:flex-start"><span style="flex-shrink:0">'+r[0]+'</span><span style="flex:1">'+esc(r[1])+'</span><span style="color:var(--t3);text-align:right;word-break:break-all;max-width:40%">'+esc(String(r[2]))+'</span></div>').join('')+
    '</div><div style="font-size:11px;color:var(--t3);margin-top:6px">'+(allOk?'Alle prüfbaren Kriterien erfüllt. Falls trotzdem nur «Verknüpfung erstellen» erscheint, kann das an Chrome-internem Caching der Installierbarkeits-Bewertung liegen — hilft oft: Chrome-Browserdaten für diese Website löschen.':'Mindestens ein Kriterium mit ✗ markiert — das verhindert vermutlich die Installierbarkeit.')+'</div>';
}
function applyUpdate(){
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg&&reg.waiting){
      reg.waiting.postMessage({type:'SKIP_WAITING'});
    }else{
      window.location.reload();
    }
  });
  const b=document.getElementById('update-banner');
  if(b)b.classList.remove('show');
}
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  const btn=document.getElementById('install-app-btn');
  if(btn)btn.style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  deferredInstallPrompt=null;
  const btn=document.getElementById('install-app-btn');
  if(btn)btn.style.display='none';
  toast('Haushaltbuch wurde installiert');
});
async function installApp(){
  if(!deferredInstallPrompt){
    toast('Installation über Browser-Menü: "Zum Startbildschirm hinzufügen"');
    return;
  }
  deferredInstallPrompt.prompt();
  const choice=await deferredInstallPrompt.userChoice;
  if(choice.outcome==='accepted')toast('Wird installiert…');
  deferredInstallPrompt=null;
}
</script>
