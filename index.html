/* ── PWA: Service Worker + Install-Prompt + Update-Erkennung ─────── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).then(reg=>{
      console.log('Service Worker registriert:',reg.scope);
      // Beim Laden direkt nach Updates fragen
      reg.update().catch(()=>{});
      reg.addEventListener('updatefound',()=>{
        const newWorker=reg.installing;
        if(!newWorker)return;
        newWorker.addEventListener('statechange',()=>{
          if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
            showUpdateBanner();
          }
        });
      });
    }).catch(err=>{
      console.error('Service Worker Fehler:',err);
    });
    // Periodisch (alle 60s) prüfen, ob eine neuere Version auf dem Server liegt
    setInterval(()=>{
      navigator.serviceWorker.getRegistration().then(reg=>{ if(reg)reg.update().catch(()=>{}); });
    },60000);
  });
  let reloadingForUpdate=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(reloadingForUpdate)return;
    reloadingForUpdate=true;
    window.location.reload();
  });
}
function showUpdateBanner(){
  const b=document.getElementById('update-banner');
  if(b)b.classList.add('show');
}
function checkForUpdate(){
  if(!('serviceWorker' in navigator)){toast('Service Worker nicht unterstützt');return;}
  toast('Suche nach Updates…');
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(!reg){toast('Kein Service Worker registriert');return;}
    reg.update().then(()=>{
      setTimeout(()=>{
        if(reg.waiting){showUpdateBanner();}
        else{toast('Du hast bereits die neueste Version');}
      },800);
    }).catch(()=>toast('Update-Prüfung fehlgeschlagen'));
  });
}

async function runPwaDiagnose(){
  const box=document.getElementById('pwa-diag-result');
  box.innerHTML='<div style="font-size:12px;color:var(--t2);margin-top:8px">Prüfe…</div>';
  const rows=[];
  const ok='<span style="color:var(--ok);font-weight:600">✓</span>';
  const bad='<span style="color:var(--dg);font-weight:600">✗</span>';
  const warn='<span style="color:var(--wn);font-weight:600">!</span>';

  // 1. HTTPS
  const https=location.protocol==='https:';
  rows.push([https?ok:bad,'HTTPS aktiv',location.protocol]);

  // 2. Manifest Link vorhanden im DOM
  const manifestLink=document.querySelector('link[rel="manifest"]');
  rows.push([manifestLink?ok:bad,'Manifest-Link im HTML',manifestLink?manifestLink.getAttribute('href'):'fehlt']);

  // 3. Manifest tatsächlich ladbar + parsebar
  let manifestData=null,manifestErr='';
  if(manifestLink){
    try{
      const r=await fetch(manifestLink.href,{cache:'no-store'});
      const ct=r.headers.get('content-type')||'';
      if(!r.ok)manifestErr='HTTP '+r.status;
      else{
        manifestData=await r.json();
      }
      rows.push([r.ok?ok:bad,'Manifest abrufbar',r.status+' · '+ct]);
    }catch(e){
      rows.push([bad,'Manifest abrufbar',e.message]);
    }
  }

  // 4. Pflichtfelder im Manifest
  if(manifestData){
    rows.push([manifestData.name||manifestData.short_name?ok:bad,'name / short_name',manifestData.name||manifestData.short_name||'fehlt']);
    rows.push([manifestData.start_url?ok:bad,'start_url',manifestData.start_url||'fehlt']);
    const validDisplay=['standalone','fullscreen','minimal-ui'].includes(manifestData.display);
    rows.push([validDisplay?ok:bad,'display',manifestData.display||'fehlt']);
    const icons=manifestData.icons||[];
    const has192=icons.some(i=>i.sizes&&i.sizes.includes('192'));
    const has512=icons.some(i=>i.sizes&&i.sizes.includes('512'));
    rows.push([has192?ok:bad,'Icon 192×192 gelistet',has192?'vorhanden':'fehlt']);
    rows.push([has512?ok:bad,'Icon 512×512 gelistet',has512?'vorhanden':'fehlt']);
    // Check icons actually load
    for(const icon of icons){
      try{
        const iconUrl=new URL(icon.src,manifestLink.href).href;
        const ir=await fetch(iconUrl,{cache:'no-store'});
        rows.push([ir.ok?ok:bad,'Icon lädt: '+icon.sizes,ir.ok?(ir.headers.get('content-type')||''):('HTTP '+ir.status)]);
      }catch(e){
        rows.push([bad,'Icon lädt: '+(icon.sizes||icon.src),e.message]);
      }
    }
  }

  // 5. Service Worker
  if('serviceWorker' in navigator){
    const reg=await navigator.serviceWorker.getRegistration();
    rows.push([reg?ok:bad,'Service Worker registriert',reg?reg.scope:'kein Worker gefunden']);
    if(reg){
      rows.push([reg.active?ok:warn,'Service Worker aktiv',reg.active?reg.active.state:(reg.installing?'installing':reg.waiting?'waiting':'unbekannt')]);
    }
  }else{
    rows.push([bad,'Service Worker API verfügbar','nicht unterstützt']);
  }

  // 6. Bereits installiert?
  const isStandaloneNow=window.matchMedia('(display-mode: standalone)').matches;
  rows.push([isStandaloneNow?warn:ok,'Läuft im Browser (nicht installiert)',isStandaloneNow?'bereits als App offen':'im Browser-Tab']);

  const allOk=rows.every(r=>r[0]===ok||r[0]===warn);
  box.innerHTML='<div style="margin-top:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden">'+
    rows.map(r=>'<div style="display:flex;gap:8px;padding:7px 10px;border-bottom:1px solid var(--bd);font-size:12px;align-items:flex-start"><span style="flex-shrink:0">'+r[0]+'</span><span style="flex:1">'+esc(r[1])+'</span><span style="color:var(--t3);text-align:right;word-break:break-all;max-width:40%">'+esc(String(r[2]))+'</span></div>').join('')+
    '</div><div style="font-size:11px;color:var(--t3);margin-top:6px">'+(allOk?'Alle prüfbaren Kriterien erfüllt. Falls trotzdem nur «Verknüpfung erstellen» erscheint, kann das an Chrome-internem Caching der Installierbarkeits-Bewertung liegen — hilft oft: Chrome-Browserdaten für diese Website löschen.':'Mindestens ein Kriterium mit ✗ markiert — das verhindert vermutlich die Installierbarkeit.')+'</div>';
}
function applyUpdate(){
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg&&reg.waiting){
      reg.waiting.postMessage({type:'SKIP_WAITING'});
    }else{
      window.location.reload();
    }
  });
  const b=document.getElementById('update-banner');
  if(b)b.classList.remove('show');
}

window.addEventListener('appinstalled',()=>{
  deferredInstallPrompt=null;
  const btn=document.getElementById('install-app-btn');

});
async function installApp(){
  if(!deferredInstallPrompt){
    toast('Installation über Browser-Menü: "Zum Startbildschirm hinzufügen"');
    return;
  }
  deferredInstallPrompt.prompt();
  const choice=await deferredInstallPrompt.userChoice;
  if(choice.outcome==='accepted')toast('Wird installiert…');
  deferredInstallPrompt=null;
}
