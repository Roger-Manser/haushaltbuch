<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Haushaltbuch"/>
<meta name="theme-color" content="#ffffff"/>
<title>Haushaltbuch</title>
<style>
:root{--ac:#2563EB;--al:#EFF6FF;--am:#BFDBFE;--ad:#1D4ED8;--wn:#D97706;--wl:#FFFBEB;--dg:#DC2626;--dl:#FEF2F2;--ok:#059669;--ol:#ECFDF5;--bg:#F8F9FA;--sf:#FFFFFF;--bd:#E5E7EB;--b2:#D1D5DB;--tx:#111827;--t2:#6B7280;--t3:#9CA3AF;--r:12px;--rs:8px;--nh:64px;--th:56px}
@media(prefers-color-scheme:dark){:root{--ac:#3B82F6;--al:#1E3A5F;--am:#1E40AF;--ad:#60A5FA;--wn:#F59E0B;--wl:#2D1F00;--dg:#EF4444;--dl:#3B0A0A;--ok:#10B981;--ol:#022C1A;--bg:#111827;--sf:#1F2937;--bd:#374151;--b2:#4B5563;--tx:#F9FAFB;--t2:#9CA3AF;--t3:#6B7280}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit;font-size:inherit}
#app{height:100%;display:flex;flex-direction:column}
#screens{flex:1;overflow:hidden;position:relative}
.sc{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .12s}
.sc.on{opacity:1;pointer-events:all}
.tb{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;height:var(--th);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.tb-t{font-size:18px;font-weight:700;letter-spacing:-.3px}
.tb-r{display:flex;gap:6px}
.ib{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer}
.ib:hover{background:var(--bg)}
.ib.a{background:var(--al);border-color:var(--am);color:var(--ac)}
.ib svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75}
.sbar{padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.sw{position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;pointer-events:none}
.sw input{width:100%;padding:9px 10px 9px 33px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;color:var(--tx)}
.sw input:focus{outline:none;border-color:var(--ac)}
.chips{padding:8px 16px 6px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:var(--sf);border-bottom:1px solid var(--bd)}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--bd);font-size:13px;background:transparent;color:var(--t2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:5px}
.chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.chip.on{background:var(--al);border-color:var(--am);color:var(--ac);font-weight:500}
.scroll{flex:1;overflow-y:auto;padding:12px 16px 16px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.sh{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px}
.sh:first-child{margin-top:0}
.lgs{margin-bottom:10px}
.lgh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none}
.lgh.open .chv{transform:rotate(180deg)}
.lgh-l{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600}
.lgh-l svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.75}
.lgh-r{display:flex;align-items:center;gap:6px}
.bdg{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--t2);border:1px solid var(--bd)}
.bdg.w{background:var(--wl);color:var(--wn)}
.chv{width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;transition:transform .2s}
.lgi{background:var(--sf);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.lgi.hide{display:none}
.ar{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.ar:last-child{border-bottom:none}
.ar:hover{background:var(--bg)}
.at{width:44px;height:44px;border-radius:var(--rs);background:var(--bg);border:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.at img{width:100%;height:100%;object-fit:cover}
.at svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.75}
.ai{flex:1;min-width:0}
.an{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:12px;color:var(--t2);margin-top:1px}
.abs{text-align:right;flex-shrink:0}
.bn{font-size:17px;font-weight:700}
.bn.ok{color:var(--ok)}.bn.wn{color:var(--wn)}.bn.lo{color:var(--dg)}
.bu{font-size:11px;color:var(--t3)}
.exp-badge{font-size:10px;padding:2px 7px;border-radius:8px;margin-top:2px;display:inline-block;white-space:nowrap}
.exp-badge.fresh{background:var(--ol);color:var(--ok)}
.exp-badge.soon{background:var(--wl);color:var(--wn)}
.exp-badge.over{background:var(--dl);color:var(--dg)}
.sort-bar{display:flex;gap:6px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);font-size:12px;background:var(--sf);color:var(--t2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:4px}
.sort-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.sort-btn.on{background:var(--al);border-color:var(--am);color:var(--ac);font-weight:500}
#bnav{background:var(--sf);border-top:1px solid var(--bd);display:flex;height:var(--nh);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--t3);font-size:10px;font-weight:500;cursor:pointer;padding:6px 0}
.nb svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.75}
.nb.on{color:var(--ac)}
.nbw{position:relative}
.nbb{position:absolute;top:-4px;right:-6px;background:var(--dg);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 32px);margin:10px 16px 4px;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--ad)}
.add-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5}
.stg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.stc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.stl{font-size:12px;color:var(--t2);margin-bottom:4px}
.stn{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stn.w{color:var(--wn)}.stn.ok{color:var(--ok)}.stn.a{color:var(--ac)}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer}
.rc:hover{background:var(--bg)}
.rct{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.rci{width:48px;height:48px;border-radius:var(--rs);background:var(--ol);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.rci.p{background:var(--wl)}
.rct-n{font-size:15px;font-weight:600;margin-bottom:2px}
.rct-s{font-size:12px;color:var(--t2)}
.mr{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.mp{font-weight:600}.mp.f{color:var(--ok)}.mp.p{color:var(--wn)}
.mt{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.mf{height:100%;border-radius:3px;background:var(--ac)}.mf.f{background:var(--ok)}
.ztgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.zt{font-size:11px;padding:2px 8px;border-radius:10px}
.zt.ok{background:var(--ol);color:var(--ok)}.zt.ms{background:var(--wl);color:var(--wn)}
.ei{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px}
.ei input[type=checkbox]{width:18px;height:18px;accent-color:var(--ok);cursor:pointer;flex-shrink:0}
.ei.ck .eit{text-decoration:line-through;color:var(--t3)}
.eit{flex:1;font-size:14px}
.eis{font-size:12px;color:var(--t2)}
.eid{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.mir{display:flex;gap:8px;margin-bottom:8px}
.mir input{flex:1;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px}
.mir input:focus{outline:none;border-color:var(--ac)}
.mir button{padding:10px 16px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:20px;font-weight:300;cursor:pointer;line-height:1}
.ftp{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;height:var(--th);display:flex;align-items:center;gap:12px;flex-shrink:0}
.bkb{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;flex-shrink:0}
.bkb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.ftl{font-size:16px;font-weight:600;flex:1}
.fb{padding:14px 16px 32px}
.fd{margin-bottom:14px}
.fd label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:5px}
.fd input,.fd select,.fd textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:15px}
.fd input:focus,.fd select:focus,.fd textarea:focus{outline:none;border-color:var(--ac)}
.fd textarea{resize:vertical;min-height:70px;line-height:1.5}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ur{display:flex;gap:8px}.ur input{flex:1}.ur select{width:90px}
.pz{border:2px dashed var(--b2);border-radius:var(--r);padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:var(--bg)}
.pz:hover{border-color:var(--ac)}
.pz svg{width:32px;height:32px;stroke:var(--t3);fill:none;stroke-width:1.75}
.pz span{font-size:14px;color:var(--t2)}.pz small{font-size:12px;color:var(--t3)}
.ppw{position:relative;display:none}
.ppw img{width:100%;border-radius:var(--rs);max-height:180px;object-fit:cover;display:block}
.rph{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.bcr{display:flex;gap:8px;align-items:flex-end}
.bcr .fd{flex:1;margin-bottom:0}
.scb{height:42px;padding:0 14px;background:var(--al);color:var(--ac);border:1px solid var(--am);border-radius:var(--rs);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.scb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75}
.sui{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-top:8px;text-align:center;display:none}
.sui p{font-size:13px;color:var(--t2);margin-bottom:8px}
.sln{font-family:monospace;font-size:22px;letter-spacing:4px;color:var(--t2);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sok{display:none;align-items:center;gap:7px;font-size:13px;color:var(--ok);background:var(--ol);border-radius:var(--rs);padding:7px 10px;margin-top:6px}
.sok svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.lcw{display:flex;flex-wrap:wrap;gap:7px}
.br{display:flex;gap:10px;margin-top:20px}
.bp{flex:1;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer}
.bp:hover{background:var(--ad)}
.bg2{padding:12px 18px;background:transparent;color:var(--t2);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;cursor:pointer}
.dh{width:100%;height:180px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;border-bottom:1px solid var(--bd);overflow:hidden}
.dh img{width:100%;height:100%;object-fit:cover}
.dh svg{width:64px;height:64px;stroke:var(--t3);fill:none;stroke-width:1.5}
.db{padding:16px}
.dn{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.dbr{font-size:14px;color:var(--t2);margin-bottom:14px}
.il{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ir{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bd);font-size:14px}
.ir:last-child{border-bottom:none}
.ik{color:var(--t2);display:flex;align-items:center;gap:8px}
.ik svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75}
.iv{font-weight:500}
.spr{display:flex;align-items:center;gap:12px}
.spb{width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.spv{font-size:20px;font-weight:700;min-width:32px;text-align:center}
.acr{display:flex;gap:8px}
.acb{flex:1;padding:11px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.acb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75}
.acb.d{border-color:color-mix(in srgb,var(--dg) 40%,transparent);color:var(--dg)}
.acb:hover{background:var(--bg)}
.db-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);font-size:14px;color:var(--tx);margin-bottom:8px;cursor:pointer;text-align:left}
.db-btn svg{width:18px;height:18px;stroke:var(--ac);fill:none;stroke-width:1.75;flex-shrink:0}
.db-btn.d svg{stroke:var(--dg)}.db-btn.d{color:var(--dg)}
.ss{margin-bottom:20px}
.ssl{font-size:15px;font-weight:600;margin-bottom:10px}
.lmi{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;font-size:14px}
.lmi svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.75}
.ghf{margin-bottom:12px}
.ghf label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.ghf input{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px}
.ghf input:focus{outline:none;border-color:var(--ac)}
.ghs{font-size:13px;padding:8px 12px;border-radius:var(--rs);margin-bottom:10px}
.ghs.ok{background:var(--ol);color:var(--ok)}.ghs.err{background:var(--dl);color:var(--dg)}.ghs.info{background:var(--al);color:var(--ac)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--t3);display:inline-block;margin-right:4px;flex-shrink:0}
.sdot.ok{background:var(--ok)}.sdot.dt{background:var(--wn);animation:pulse 1.5s ease-in-out infinite}.sdot.sy{background:var(--ac);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}
.empty p{font-size:15px;font-weight:500;color:var(--t2);margin-bottom:4px}
.empty small{font-size:13px}
#toast{position:fixed;bottom:calc(var(--nh) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;opacity:0;transition:all .2s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#ldr{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s}
#ldr.on{opacity:1;pointer-events:all}
.ldb{background:var(--sf);border-radius:var(--r);padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spn{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldm{font-size:14px;color:var(--t2)}
</style>
</head>
<body>
<div id="app">
<div id="screens">

<div class="sc on" id="s-lager">
  <div class="tb">
    <span class="tb-t">Haushaltbuch</span>
    <div class="tb-r">
      <button class="ib" id="sync-btn" title="GitHub Sync" onclick="doSync()">
        <span class="sdot" id="sdot"></span>
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.21-4.45"/></svg>
      </button>
      <button class="ib" onclick="goScreen('s-settings')" title="Einstellungen">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="sbar"><div class="sw">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="lager-search" placeholder="Artikel suchen..." oninput="renderLager()"/>
  </div></div>
  <div class="chips" id="lager-chips"></div>
  <div class="sort-bar" id="sort-bar"></div>
  <div class="scroll" id="lager-list"></div>
  <div style="display:flex;gap:8px;margin:10px 16px 4px">
    <button class="add-btn" style="margin:0;flex:1" onclick="openEingang()">
      <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
      Eingang

function licon(n){
  const k=n.replace(/[äöü]/g,c=>({ä:'ae',ö:'oe',ü:'ue'}[c]||c)).replace(/\s/g,'');
  return LMAP[k]||I.pkg;
}

/* ── State ────────────────────────────────────────────────────────── */

let gh={tok:'',own:'',repo:'',br:'main'};

function loadL(){
  try{const r=localStorage.getItem('hb3');if(r){const d=JSON.parse(r);S.a=d.a||[];S.lo=d.lo||[...LD];S.ka=d.ka||[...KD];S.ei=d.ei||[...ED];S.ek=d.ek||[];S.rz=d.rz||[];S.nid=d.nid||(S.a.length?Math.max(...S.a.map(x=>x.id||0))+1:1);}}catch(e){}
  try{const r=localStorage.getItem('hbgh');if(r)gh=JSON.parse(r);}catch(e){}
}
function saveL(){try{localStorage.setItem('hb3',JSON.stringify(S));}catch(e){}dirty=true;sdot('dt');}
function saveGH(){try{localStorage.setItem('hbgh',JSON.stringify(gh));}catch(e){};}
function sdot(s){const d=document.getElementById('sdot');if(d)d.className='sdot'+(s==='ok'?' ok':s==='dt'?' dt':s==='sy'?' sy':'');}

/* ── GitHub API ───────────────────────────────────────────────────── */
async function ghReq(path,method,body){
  if(!gh.tok||!gh.own||!gh.repo)throw new Error('GitHub nicht konfiguriert');
  const r=await fetch('https://api.github.com/repos/'+gh.own+'/'+gh.repo+path,{
    method:method||'GET',
    headers:{'Authorization':'token '+gh.tok,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){const t=await r.text();throw new Error('GitHub '+r.status+': '+t.slice(0,100));}
  return r.status===204?null:r.json();
}
async function ghGet(path){try{return await ghReq('/contents/'+path);}catch(e){return null;}}
async function ghPut(path,content,msg,sha){
  const b64=btoa(unescape(encodeURIComponent(content)));
  const body={message:msg,content:b64,branch:gh.br};
  if(sha)body.sha=sha;
  return ghReq('/contents/'+path,'PUT',body);
}
async function ghPutBin(path,b64raw,msg,sha){
  const b64=b64raw.includes(',')?b64raw.split(',')[1]:b64raw;
  const body={message:msg,content:b64,branch:gh.br};
  if(sha)body.sha=sha;
  return ghReq('/contents/'+path,'PUT',body);
}
async function ghDel(path,msg,sha){
  return ghReq('/contents/'+path,'DELETE',{message:msg,sha:sha,branch:gh.br});
}
async function uploadFoto(b64,fn){
  const path='bilder/'+fn;
  const ex=await ghGet(path);
  await ghPutBin(path,b64,'Foto: '+fn,ex?ex.sha:undefined);
  return 'https://raw.githubusercontent.com/'+gh.own+'/'+gh.repo+'/'+gh.br+'/'+path;
}

async function doSync(){
  if(!gh.tok||!gh.own||!gh.repo){toast('GitHub noch nicht konfiguriert');goScreen('s-settings');return;}
  ldr('Synchronisiere mit GitHub...');sdot('sy');
  try{
    const ex=await ghGet('haushaltbuch.json');
    const exp={artikel:S.a.map(a=>({...a})),lagerorte:S.lo,kategorien:S.ka,einheiten:S.ei,einkauf:S.ek,aktualisiert:new Date().toISOString()};
    await ghPut('haushaltbuch.json',JSON.stringify(exp,null,2),'Haushaltbuch Update',ex?ex.sha:undefined);
    // Load rezepte.json
    const rzf=await ghGet('rezepte.json');
    if(rzf&&rzf.content){
      try{
        const j=JSON.parse(atob(rzf.content.replace(/\n/g,'')));
        S.rz=Array.isArray(j)?j:(j.rezepte||[]);
        saveL();
      }catch(e){}
    }
    dirty=false;sdot('ok');hideLdr();toast('Synchronisiert mit GitHub');renderLager();
  }catch(err){hideLdr();sdot('dt');toast('Fehler: '+err.message.slice(0,60));}
}

async function loadFromGH(){
  if(!gh.tok||!gh.own||!gh.repo)return;
  ldr('Lade von GitHub...');
  try{
    const f=await ghGet('haushaltbuch.json');
    if(f&&f.content){
      const d=JSON.parse(atob(f.content.replace(/\n/g,'')));
      S.a=d.artikel||[];S.lo=d.lagerorte||[...LD];S.ka=d.kategorien||[...KD];S.ei=d.einheiten||[...ED];S.ek=d.einkauf||[];
      S.nid=S.a.length?Math.max(...S.a.map(x=>x.id||0))+1:1;
      saveL();
    }
    const rzf=await ghGet('rezepte.json');
    if(rzf&&rzf.content){
      try{const j=JSON.parse(atob(rzf.content.replace(/\n/g,'')));S.rz=Array.isArray(j)?j:(j.rezepte||[]);saveL();}catch(e){}
    }
    sdot('ok');hideLdr();toast('Daten von GitHub geladen');renderLager();
  }catch(err){hideLdr();toast('Fehler: '+err.message.slice(0,50));}
}

function renderLager(){
  renderSortBar();
  const bar=document.getElementById('lager-chips');
  const used=[...new Set(S.a.map(x=>x.lager))];
  const tabs=['alle',...S.lo.filter(l=>used.includes(l))];
  bar.innerHTML=tabs.map(l=>'<button class="chip'+(lf===l?' on':'')+'" onclick="setLF(\''+esc(l)+'\')">'+

  const list=document.getElementById('lager-list');
  const q=(document.getElementById('lager-search').value||'').toLowerCase();
  let fil=S.a.filter(a=>{
    const mq=!q||a.name.toLowerCase().includes(q)||(a.marke||'').toLowerCase().includes(q);
    const ml=lf==='alle'||a.lager===lf;
    return mq&&ml;

  if(!fil.length){list.innerHTML='<div class="empty">'+I.pkg.replace('20px;height:20px','48px;height:48px')+'<p>'+(S.a.length?'Keine Artikel gefunden':'Noch keine Artikel')+'</p><small>'+(S.a.length?'Suchbegriff anpassen':'Tippe auf Neuer Artikel')+'</small></div>';nav();return;}

  if(sortMode==='ablauf'){

    const withoutDate=fil.filter(a=>!a.ablaufdatum).sort((a,b)=>a.name.localeCompare(b.name,'de'));
    fil=[...withDate,...withoutDate];
  }else if(sortMode==='name'){
    fil=[...fil].sort((a,b)=>a.name.localeCompare(b.name,'de'));

    fil=[...fil].sort((a,b)=>(a.menge-a.mindest)-(b.menge-b.mindest));

  const rows=fil.map(a=>arRow(a)).join('');

    {id:5,name:'Omelette',emoji:'\uD83C\uDF73',min:10,port:1,zt:['Eier','Butter','Salz','Käse']},
  ];
  const sc=src.map(r=>{
    const have=r.zt.filter(z=>names.some(n=>n.includes(z.toLowerCase())));
    return{...r,have,pct:Math.round(have.length/Math.max(r.zt.length,1)*100)};
  }).sort((a,b)=>b.pct-a.pct);
  const full=sc.filter(r=>r.pct===100),part=sc.filter(r=>r.pct>=50&&r.pct<100),miss=sc.filter(r=>r.pct<50);
  let h='';
  if(!src.length)h='<div class="empty">'+I.pkg+'<p>Keine Rezepte</p><small>GitHub synchronisieren um rezepte.json zu laden</small></div>';
  if(full.length)h+='<div class="sh">Vollständig kochbar ('+full.length+')</div>'+full.map(rcCard).join('');
  if(part.length)h+='<div class="sh">Fast kochbar</div>'+part.map(rcCard).join('');
  if(miss.length)h+='<div class="sh">Zutaten fehlen</div>'+miss.map(rcCard).join('');
  document.getElementById('rezept-list').innerHTML=h;
}
function rcCard(r){
  const f=r.pct===100;
  const miss=r.zt.filter(z=>!r.have.some(h=>h.toLowerCase()===z.toLowerCase()));
  const tags=[...r.have.map(z=>'<span class="zt ok">'+esc(z)+'</span>'),...miss.map(z=>'<span class="zt ms">'+esc(z)+' fehlt</span>')].join('');
  return '<div class="rc"><div class="rct"><div class="rci'+(f?'':" p")+'">'+r.emoji+'</div><div><div class="rct-n">'+esc(r.name)+'</div><div class="rct-s">'+r.port+' Port. · '+r.min+' min</div></div></div><div class="mr"><span>Zutaten vorhanden</span><span class="mp '+(f?'f':'p')+'">'+r.have.length+'/'+r.zt.length+'</span></div><div class="mt"><div class="mf '+(f?'f':'')+'" style="width:'+r.pct+'%"></div></div><div class="ztgs">'+tags+'</div></div>';
}

function saveGHcfg(){gh={tok:document.getElementById('gh-t').value.trim(),own:document.getElementById('gh-o').value.trim(),repo:document.getElementById('gh-r').value.trim(),br:document.getElementById('gh-b').value.trim()||'main'};saveGH();toast('GitHub gespeichert');renderSt();}

function editKat(k){
  const n=prompt('Kategorie umbenennen:',k);if(!n||!n.trim()||n.trim()===k)return;
  const nm=n.trim();
  if(S.ka.includes(nm)){alert('Kategorie «'+nm+'» existiert bereits.');return;}
  S.ka=S.ka.map(x=>x===k?nm:x);
  S.a.forEach(a=>{if(a.kat===k)a.kat=nm;});

}
function expJ(){const b=new Blob([JSON.stringify({artikel:S.a,lagerorte:S.lo,kategorien:S.ka,einheiten:S.ei,einkauf:S.ek,exportiert:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='haushaltbuch_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Export abgeschlossen');}
function impJ(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=r=>{try{const d=JSON.parse(r.target.result);if(!d.artikel)throw new Error('Kein gültiges Format');if(confirm(d.artikel.length+' Artikel importieren? Bestehende Daten überschreiben.')){S.a=d.artikel;S.lo=d.lagerorte||[...LD];S.ka=d.kategorien||[...KD];S.ei=d.einheiten||[...ED];S.ek=d.einkauf||[];S.nid=S.a.length?Math.max(...S.a.map(x=>x.id||0))+1:1;saveL();goScreen('s-lager');toast(d.artikel.length+' Artikel importiert');}}catch(e){alert('Import-Fehler: '+e.message);}};rd.readAsText(f);ev.target.value='';}
function resetAll(){if(!confirm('Alle Daten wirklich löschen?'))return;S={a:[],lo:[...LD],ka:[...KD],ei:[...ED],ek:[],nid:1,rz:[]};saveL();goScreen('s-lager');toast('Daten gelöscht');}

/* ── Utils ────────────────────────────────────────────────────────── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysUntil(iso){
  if(!iso)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(iso+'T00:00:00');
  return Math.round((d-today)/86400000);
}
function fmtDateCH(iso){
  if(!iso)return '—';
  const p=iso.split('-');if(p.length!==3)return iso;
  return p[2]+'.'+p[1]+'.'+p[0];
}
function expClass(days){
  if(days===null)return '';
  if(days<0)return 'over';
  if(days<=3)return 'over';
  if(days<=7)return 'soon';
  return 'fresh';
}
function expLabel(days){
  if(days===null)return '';
  if(days<0)return 'abgelaufen seit '+Math.abs(days)+' Tag'+(Math.abs(days)===1?'':'en');
  if(days===0)return 'läuft heute ab';
  if(days===1)return 'läuft morgen ab';
  return 'noch '+days+' Tage';
}
function expBadge(iso){
  if(!iso)return '';
  const d=daysUntil(iso);
  const cls=expClass(d);
  return '<span class="exp-badge '+cls+'">'+expLabel(d)+'</span>';
}
