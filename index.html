<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Haushaltbuch"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#2563EB"/>
<link rel="manifest" href="manifest.json?v=10"/>
<link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Haushaltbuch</title>
<style>
:root{--ac:#2563EB;--al:#EFF6FF;--am:#BFDBFE;--ad:#1D4ED8;--wn:#D97706;--wl:#FFFBEB;--dg:#DC2626;--dl:#FEF2F2;--ok:#059669;--ol:#ECFDF5;--bg:#F8F9FA;--sf:#FFFFFF;--bd:#E5E7EB;--b2:#D1D5DB;--tx:#111827;--t2:#6B7280;--t3:#9CA3AF;--r:12px;--rs:8px;--nh:64px;--th:56px}
@media(prefers-color-scheme:dark){:root{--ac:#3B82F6;--al:#1E3A5F;--am:#1E40AF;--ad:#60A5FA;--wn:#F59E0B;--wl:#2D1F00;--dg:#EF4444;--dl:#3B0A0A;--ok:#10B981;--ol:#022C1A;--bg:#111827;--sf:#1F2937;--bd:#374151;--b2:#4B5563;--tx:#F9FAFB;--t2:#9CA3AF;--t3:#6B7280}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit;font-size:inherit}
#app{height:100%;display:flex;flex-direction:column}
#screens{flex:1;overflow:hidden;position:relative;padding-bottom:var(--nh)}
.sc{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .12s}
#global-nav{background:var(--sf);border-top:1px solid var(--bd);display:flex;height:var(--nh);padding-bottom:env(safe-area-inset-bottom)}.tb{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;height:var(--th);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.tb-t{font-size:18px;font-weight:700;letter-spacing:-.3px}
.tb-r{display:flex;gap:6px}
.ib{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer}
.ib:hover{background:var(--bg)}
.ib.a{background:var(--al);border-color:var(--am);color:var(--ac)}
.ib svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75}
.sbar{padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:0}
.sw{position:relative;flex:1}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;pointer-events:none}
.sw input{width:100%;padding:9px 40px 9px 33px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;color:var(--tx)}
.sw input:focus{outline:none;border-color:var(--ac)}
.chips{padding:8px 16px 6px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:var(--sf);border-bottom:1px solid var(--bd)}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--bd);font-size:13px;background:transparent;color:var(--t2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:5px}
.chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.chip.on{background:var(--al);border-color:var(--am);color:var(--ac);font-weight:500}
.scroll{flex:1;overflow-y:auto;padding:12px 16px calc(var(--nh) + 16px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.sc[style*="overflow-y:auto"]{padding-bottom:calc(var(--nh) + env(safe-area-inset-bottom))!important}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.sh{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px}
.sh:first-child{margin-top:0}
.lgs{margin-bottom:10px}
.lgh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none}
.lgh.open .chv{transform:rotate(180deg)}
.lgh-l{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600}
.lgh-l svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.75}
.lgh-r{display:flex;align-items:center;gap:6px}
.bdg{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--t2);border:1px solid var(--bd)}
.bdg.w{background:var(--wl);color:var(--wn)}
.chv{width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2;transition:transform .2s}
.lgi{background:var(--sf);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.lgi.hide{display:none}
.ar{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.ar:last-child{border-bottom:none}
.ar:hover{background:var(--bg)}
.at{width:44px;height:44px;border-radius:var(--rs);background:var(--bg);border:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.at img{width:100%;height:100%;object-fit:cover}
.at svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.75}
.ai{flex:1;min-width:0}
.an{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:12px;color:var(--t2);margin-top:1px}
.abs{text-align:right;flex-shrink:0}
.bn{font-size:17px;font-weight:700}
.bn.ok{color:var(--ok)}.bn.wn{color:var(--wn)}.bn.lo{color:var(--dg)}
.bu{font-size:11px;color:var(--t3)}
.exp-badge{font-size:10px;padding:2px 7px;border-radius:8px;margin-top:2px;display:inline-block;white-space:nowrap}
.exp-badge.fresh{background:var(--ol);color:var(--ok)}
.exp-badge.soon{background:var(--wl);color:var(--wn)}
.exp-badge.over{background:var(--dl);color:var(--dg)}
.sort-bar{display:flex;gap:6px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);font-size:12px;background:var(--sf);color:var(--t2);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:4px}
.sort-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.sort-btn.on{background:var(--al);border-color:var(--am);color:var(--ac);font-weight:500}
.sc.on{opacity:1;pointer-events:all}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--t3);font-size:9px;font-weight:500;cursor:pointer;padding:4px 2px;min-width:0;overflow:hidden}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;flex-shrink:0}
.nb span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.nb.on{color:var(--ac)}
.nbw{position:relative}
.nbb{position:absolute;top:-4px;right:-6px;background:var(--dg);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 32px);margin:10px 16px 4px;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--ad)}
.add-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5}
.stg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.stc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.stl{font-size:12px;color:var(--t2);margin-bottom:4px}
.stn{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stn.w{color:var(--wn)}.stn.ok{color:var(--ok)}.stn.a{color:var(--ac)}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer}
.rc:hover{background:var(--bg)}
.rct{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.rci{width:48px;height:48px;border-radius:var(--rs);background:var(--ol);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.rci.p{background:var(--wl)}
.rct-n{font-size:15px;font-weight:600;margin-bottom:2px}
.rct-s{font-size:12px;color:var(--t2)}
.mr{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.mp{font-weight:600}.mp.f{color:var(--ok)}.mp.p{color:var(--wn)}
.mt{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.mf{height:100%;border-radius:3px;background:var(--ac)}.mf.f{background:var(--ok)}
.ztgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.zt{font-size:11px;padding:2px 8px;border-radius:10px}
.zt.ok{background:var(--ol);color:var(--ok)}.zt.ms{background:var(--wl);color:var(--wn)}
.ei{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px}
.ei input[type=checkbox]{width:18px;height:18px;accent-color:var(--ok);cursor:pointer;flex-shrink:0}
.ei.ck .eit{text-decoration:line-through;color:var(--t3)}
.eit{flex:1;font-size:14px}
.eis{font-size:12px;color:var(--t2)}
.eid{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.mir{display:flex;gap:8px;margin-bottom:8px}
.mir input{flex:1;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px}
.mir input:focus{outline:none;border-color:var(--ac)}
.mir button{padding:10px 16px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:20px;font-weight:300;cursor:pointer;line-height:1}
.ftp{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;height:var(--th);display:flex;align-items:center;gap:12px;flex-shrink:0}
.bkb{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;flex-shrink:0}
.bkb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.ftl{font-size:16px;font-weight:600;flex:1}
.fb{padding:14px 16px 32px}
.fd{margin-bottom:14px}
.fd label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:5px}
.fd input,.fd select,.fd textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:15px}
.fd input:focus,.fd select:focus,.fd textarea:focus{outline:none;border-color:var(--ac)}
.fd textarea{resize:vertical;min-height:70px;line-height:1.5}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ur{display:flex;gap:8px}.ur input{flex:1}.ur select{width:90px}
.pz{border:2px dashed var(--b2);border-radius:var(--r);padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:var(--bg)}
.pz:hover{border-color:var(--ac)}
.pz svg{width:32px;height:32px;stroke:var(--t3);fill:none;stroke-width:1.75}
.pz span{font-size:14px;color:var(--t2)}.pz small{font-size:12px;color:var(--t3)}
.ppw{position:relative;display:none}
.ppw img{width:100%;border-radius:var(--rs);max-height:180px;object-fit:cover;display:block}
.rph{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.bcr{display:flex;gap:8px;align-items:flex-end}
.bcr .fd{flex:1;margin-bottom:0}
.scb{height:42px;padding:0 14px;background:var(--al);color:var(--ac);border:1px solid var(--am);border-radius:var(--rs);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.scb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75}
.sui{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-top:8px;text-align:center;display:none}
.sui p{font-size:13px;color:var(--t2);margin-bottom:8px}
.sln{font-family:monospace;font-size:22px;letter-spacing:4px;color:var(--t2);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sok{display:none;align-items:center;gap:7px;font-size:13px;color:var(--ok);background:var(--ol);border-radius:var(--rs);padding:7px 10px;margin-top:6px}
.sok svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.cam-wrap{position:relative;background:#000;border-radius:var(--rs);overflow:hidden;margin-top:8px;display:none}
.cam-wrap video{width:100%;display:block;max-height:280px;object-fit:cover}
.cam-wrap canvas.drawingBuffer{position:absolute;top:0;left:0;width:100%!important;height:100%!important;opacity:0.4}
.cam-frame{position:absolute;inset:20% 12%;border:2px solid var(--ac);border-radius:8px;box-shadow:0 0 0 999px rgba(0,0,0,.35);pointer-events:none}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:100%;height:2px;background:var(--ac);left:0;animation:camscan 1.8s ease-in-out infinite}
.cam-frame::before{top:0}
.cam-frame::after{display:none}
@keyframes camscan{0%{top:0}50%{top:100%}100%{top:0}}
.cam-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.cam-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.cam-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;color:#fff;font-size:12px;background:rgba(0,0,0,.4);padding:4px 0}
.cam-err{display:none;font-size:13px;color:var(--dg);background:var(--dl);border-radius:var(--rs);padding:9px 12px;margin-top:8px}
.lookup-btn{height:42px;padding:0 14px;background:var(--ol);color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 40%,transparent);border-radius:var(--rs);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.lookup-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.75}
.lookup-btn:disabled{opacity:.5;cursor:default}
.lookup-status{font-size:13px;padding:8px 11px;border-radius:var(--rs);margin-top:8px;display:none;align-items:center;gap:7px}
.lookup-status.ok{background:var(--ol);color:var(--ok);display:flex}
.lookup-status.err{background:var(--wl);color:var(--wn);display:flex}
.lookup-status.busy{background:var(--al);color:var(--ac);display:flex}
.ausgang-log{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;animation:logIn .25s ease}
@keyframes logIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ausgang-log .at{width:36px;height:36px}
.ausgang-log .ai{flex:1;min-width:0}
.ausgang-log .an{font-size:13px}
.ausgang-log .am{font-size:11px}
.ausgang-badge{font-size:13px;font-weight:700;color:var(--dg);background:var(--dl);padding:2px 9px;border-radius:8px;flex-shrink:0}
.ausgang-notfound{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--wl);border:1px solid color-mix(in srgb,var(--wn) 30%,transparent);border-radius:var(--rs);margin-bottom:6px;font-size:13px;color:var(--wn);animation:logIn .25s ease}
.scan-toggle{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--dg);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px}
.scan-toggle svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75}
.scan-toggle.active{background:var(--t2)}
.stat-chart-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.stat-chart-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.stat-chart-sub{font-size:11px;color:var(--t2);margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:12px;color:var(--t2);width:78px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-fill.ein{background:var(--ac)}
.bar-fill.aus{background:var(--dg)}
.bar-val{font-size:10px;color:#fff;font-weight:600;white-space:nowrap}
.bar-val.outside{color:var(--t2);position:absolute;left:calc(100% + 6px)}
.legend-row{display:flex;gap:14px;font-size:11px;color:var(--t2);margin-top:8px}
.legend-dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px}
.kw-spark{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:6px}
.kw-bar-pair{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.kw-bars{display:flex;align-items:flex-end;gap:2px;height:48px;width:100%;justify-content:center}
.kw-bar{width:7px;border-radius:2px 2px 0 0}
.kw-bar.ein{background:var(--ac)}
.kw-bar.aus{background:var(--dg)}
.kw-lbl{font-size:9px;color:var(--t3)}
.log-entry{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:5px;font-size:13px}
.log-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.log-icon.ein{background:var(--ol);color:var(--ac)}
.log-icon.aus{background:var(--dl);color:var(--dg)}
.log-icon svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
.log-info{flex:1;min-width:0}
.log-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:11px;color:var(--t2)}
.log-amt{font-size:13px;font-weight:600;flex-shrink:0}
.log-amt.ein{color:var(--ac)}
.log-amt.aus{color:var(--dg)}

/* Etikett / Label printing */
.label-format-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.label-format-opt{border:1px solid var(--bd);border-radius:var(--rs);padding:10px;cursor:pointer;text-align:center;background:var(--sf)}
.label-format-opt.on{border-color:var(--ac);background:var(--al)}
.label-format-opt .lf-name{font-size:13px;font-weight:600}
.label-format-opt .lf-dim{font-size:11px;color:var(--t2);margin-top:2px}
.label-preview-wrap{display:flex;justify-content:center;padding:20px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:14px;overflow-x:auto}
#label-sheet{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);padding:6px;box-sizing:border-box}
#label-sheet .lbl-name{font-weight:700;color:#000;text-align:center;line-height:1.15;width:100%;overflow:hidden}
#label-sheet .lbl-sub{color:#000;text-align:center;line-height:1.2;width:100%;overflow:hidden}
#label-sheet svg{display:block}
.own-code-box{background:var(--al);border:1px solid var(--am);border-radius:var(--rs);padding:11px 13px;margin-bottom:14px;font-size:13px;color:var(--ac)}
.own-code-box strong{font-family:monospace;font-size:14px}
.lcw{display:flex;flex-wrap:wrap;gap:7px}
.br{display:flex;gap:10px;margin-top:20px}
.bp{flex:1;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer}
.bp:hover{background:var(--ad)}
.bg2{padding:12px 18px;background:transparent;color:var(--t2);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;cursor:pointer}
.dh{width:100%;height:180px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;border-bottom:1px solid var(--bd);overflow:hidden}
.dh img{width:100%;height:100%;object-fit:cover}
.dh svg{width:64px;height:64px;stroke:var(--t3);fill:none;stroke-width:1.5}
.db{padding:16px}
.dn{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.dbr{font-size:14px;color:var(--t2);margin-bottom:14px}
.il{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ir{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bd);font-size:14px}
.ir:last-child{border-bottom:none}
.ik{color:var(--t2);display:flex;align-items:center;gap:8px}
.ik svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75}
.iv{font-weight:500;text-align:right}
.spr{display:flex;align-items:center;gap:12px}
.spb{width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.spv{font-size:20px;font-weight:700;min-width:32px;text-align:center}
.acr{display:flex;gap:8px}
.acb{flex:1;padding:11px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;text-align:center;line-height:1.3}
.acb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75}
.acb.d{border-color:color-mix(in srgb,var(--dg) 40%,transparent);color:var(--dg)}
.acb:hover{background:var(--bg)}
.db-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);font-size:14px;color:var(--tx);margin-bottom:8px;cursor:pointer;text-align:left}
.db-btn svg{width:18px;height:18px;stroke:var(--ac);fill:none;stroke-width:1.75;flex-shrink:0}
.db-btn.d svg{stroke:var(--dg)}.db-btn.d{color:var(--dg)}
.ss{margin-bottom:20px}
.ssl{font-size:15px;font-weight:600;margin-bottom:10px}
.lmi{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;font-size:14px}
.lmi svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.75}
.ghf{margin-bottom:12px}
.ghf label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.ghf input{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px}
.ghf input:focus{outline:none;border-color:var(--ac)}
.ghs{font-size:13px;padding:8px 12px;border-radius:var(--rs);margin-bottom:10px}
.ghs.ok{background:var(--ol);color:var(--ok)}.ghs.err{background:var(--dl);color:var(--dg)}.ghs.info{background:var(--al);color:var(--ac)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--t3);display:inline-block;margin-right:4px;flex-shrink:0}
.sdot.ok{background:var(--ok)}.sdot.dt{background:var(--wn);animation:pulse 1.5s ease-in-out infinite}.sdot.sy{background:var(--ac);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}
.empty p{font-size:15px;font-weight:500;color:var(--t2);margin-bottom:4px}
.empty small{font-size:13px}
#toast{position:fixed;bottom:calc(var(--nh) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;opacity:0;transition:all .2s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#update-banner{position:fixed;top:0;left:0;right:0;background:var(--ac);color:#fff;display:none;align-items:center;justify-content:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;font-size:13px;font-weight:500;z-index:10500}
#update-banner.show{display:flex}
#update-banner button{background:rgba(255,255,255,.22);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#ldr{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;display:none;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#lightbox.show{display:flex}
#lightbox img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;pointer-events:none}
#lightbox-close{position:absolute;top:calc(14px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10001}
#lightbox-close svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;pointer-events:none}
.dh{cursor:zoom-in}
.at.has-photo{cursor:zoom-in}
#ldr.on{opacity:1;pointer-events:all}
.ldb{background:var(--sf);border-radius:var(--r);padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spn{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldm{font-size:14px;color:var(--t2)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.12.1/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div id="app">
<div id="screens">

<div class="sc on" id="s-lager">
  <div class="tb">
    <span class="tb-t">Haushaltbuch <span id="app-version-badge" style="font-size:10px;font-weight:500;color:var(--t3);vertical-align:middle;"></span> <span id="artikel-count-badge" style="font-size:10px;font-weight:500;color:var(--t3);vertical-align:middle;background:var(--al);color:var(--ac);border-radius:8px;padding:1px 6px;margin-left:2px"></span></span>
    <div class="tb-r">
      <button class="ib" onclick="openQuittung()" title="Quittung scannen" style="color:var(--ac)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.75"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><line x1="13" y1="13" x2="17" y2="13"/><line x1="13" y1="17" x2="17" y2="17"/></svg>
      </button>
      <button class="ib" id="sync-btn" title="GitHub Sync" onclick="doSync()">
        <span class="sdot" id="sdot"></span>
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.21-4.45"/></svg>
      </button>
      <button class="ib" onclick="goScreen('s-settings')" title="Einstellungen">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="sbar"><div class="sw">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="lager-search" placeholder="Artikel suchen..." oninput="renderLager();document.getElementById('lager-search-clear').style.visibility=this.value?'visible':'hidden'"/>
    <button id="lager-search-clear" onclick="document.getElementById('lager-search').value='';renderLager();this.style.visibility='hidden'" style="visibility:hidden;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--b2);border:none;cursor:pointer;color:var(--t2);padding:4px;display:flex;align-items:center;border-radius:50%;width:26px;height:26px;justify-content:center">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:22px;height:22px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <button onclick="scanLagerSearch()" title="Barcode scannen" style="flex-shrink:0;padding:0 10px;background:var(--ac);border:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;height:40px;margin-left:6px">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" style="width:22px;height:22px"><rect x="1" y="6" width="1" height="12"/><rect x="4" y="6" width="2" height="12"/><rect x="8" y="6" width="1" height="12"/><rect x="11" y="6" width="2" height="12"/><rect x="15" y="6" width="1" height="12"/><rect x="18" y="6" width="2" height="12"/><rect x="22" y="6" width="1" height="12"/></svg>
  </button></div>
  <div class="chips" id="lager-chips"></div>
  <div class="sort-bar" id="sort-bar"></div>
  <div id="lager-scan-overlay" style="display:none;position:fixed;inset:0;z-index:7000;background:#000">
    <div id="cam-lager-scan-tmp" style="position:relative;height:100%">
      <button onclick="closeLagerScan()" style="position:absolute;top:16px;right:16px;z-index:10;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:44px;height:44px;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      <div id="camv-lager-scan-tmp" style="width:100%;height:100%;position:relative"></div>
      <div class="cam-frame"></div>
      <div class="cam-hint">Barcode scannen → Artikel wird direkt geöffnet</div>
    </div>
  </div>
  <div class="scroll" id="lager-list"></div>
  <div style="display:flex;gap:8px;margin:10px 16px 4px">
    <button class="add-btn" style="margin:0;flex:1" onclick="openEingang()">
      <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
      Eingang
    </button>
    <button class="add-btn" style="margin:0;flex:1;background:var(--dl);color:var(--dg)" onclick="openAusgang()">
      <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="17" y1="12" x2="7" y2="12"/></svg>
      Ausgang
    </button>
  </div>
  <div style="margin:0 16px calc(var(--nh) + 12px)">
    <button class="add-btn" style="margin:0;width:100%;background:var(--sf);color:var(--ac);border:1px solid var(--am)" onclick="openForm()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Neuer Artikel
    </button>
  </div>

</div>

<div class="sc" id="s-eingang" style="overflow-y:auto">
  <div class="ftp">
    <button class="bkb" onclick="closeEingang()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl">Wareneingang</span>
    <button class="ib" onclick="openQuittung()" title="Quittung scannen" style="color:var(--ac)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.75"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><line x1="13" y1="13" x2="17" y2="13"/><line x1="13" y1="17" x2="17" y2="17"/></svg>
    </button>
  </div>
  <div class="fb" id="eingang-body"></div>
</div>

<div class="sc" id="s-ausgang" style="overflow-y:auto">
  <div class="ftp">
    <button class="bkb" onclick="closeAusgang()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl">Warenausgang</span>
    <div style="width:36px"></div>
  </div>
  <div class="fb" id="ausgang-body"></div>
</div>

<div class="sc" id="s-etikett" style="overflow-y:auto">
  <div class="ftp">
    <button class="bkb" onclick="goScreen('s-detail')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl">Etikett drucken</span>
    <div style="width:36px"></div>
  </div>
  <div class="fb" id="etikett-body"></div>
</div>

<div class="sc" id="s-rezepte">
  <div class="tb"><span class="tb-t">Was kann ich kochen?</span>
    <div class="tb-r"><button class="ib a" onclick="syncRezepte()" title="Rezepte von GitHub laden">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.21-4.45"/></svg>
    </button></div>
  </div>
  <div class="sbar"><div class="sw">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="rezept-search" placeholder="Rezept suchen..." oninput="renderRezepte();document.getElementById('rezept-search-clear').style.visibility=this.value?'visible':'hidden'"/>
    <button id="rezept-search-clear" onclick="document.getElementById('rezept-search').value='';renderRezepte();this.style.visibility='hidden'" style="visibility:hidden;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--b2);border:none;cursor:pointer;color:var(--t2);padding:4px;display:flex;align-items:center;border-radius:50%;width:26px;height:26px;justify-content:center">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:22px;height:22px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div></div>
  <div class="scroll" id="rezept-list"></div>

</div>

<div class="sc" id="s-rezept-detail" style="overflow-y:auto">
  <div class="ftp">
    <button class="bkb" onclick="goBackFromRezeptDetail()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl" id="rezept-detail-title">Rezept</span>
    <div style="width:36px"></div>
  </div>
  <div id="rezept-detail-body" style="padding:0 16px 16px"></div>
</div>

<div class="sc" id="s-uebersicht">
  <div class="tb"><span class="tb-t">Übersicht</span></div>
  <div class="scroll" id="ub-body"></div>

</div>

<div class="sc" id="s-statistik">
  <div class="tb"><span class="tb-t">Statistik</span></div>
  <div class="chips" id="stat-period-chips"></div>
  <div class="scroll" id="stat-body"></div>

</div>

<div class="sc" id="s-einkauf">
  <div class="tb"><span class="tb-t">Einkaufsliste</span>
    <div class="tb-r"><button class="ib" onclick="clearCk()" title="Erledigte entfernen">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </button></div>
  </div>
  <div class="chips" id="ek-shop-chips"></div>
  <div class="scroll" id="ek-body"></div>

</div>

<div class="sc" id="s-form" style="overflow-y:auto">
  <div class="ftp">
    <button class="bkb" onclick="closeForm()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl" id="form-title">Neuer Artikel</span>
    <div style="width:36px"></div>
  </div>
  <div class="fb" id="form-body"></div>
</div>

<div class="sc" id="s-detail">
  <div class="ftp">
    <button class="bkb" id="d-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl" id="d-lager"></span>
    <button class="ib" id="d-edit" title="Bearbeiten">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
  <div class="scroll" style="padding:0 0 calc(var(--nh) + 24px + env(safe-area-inset-bottom)) 0" id="detail-body" onscroll="updateJumpBtns()"></div>
  <div id="jump-btns" style="display:none;position:absolute;right:14px;bottom:calc(var(--nh) + 20px);flex-direction:column;gap:8px;z-index:50">
    <button onclick="jumpDetail('top')" style="width:42px;height:42px;border-radius:50%;border:1px solid var(--bd);background:var(--sf);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ac)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;height:20px"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button onclick="jumpDetail('bottom')" style="width:42px;height:42px;border-radius:50%;border:1px solid var(--bd);background:var(--sf);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ac)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;height:20px"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>
</div>

<div class="sc" id="s-settings" style="overflow-y:auto">
  <div class="ftp">
    <button class="bkb" onclick="goScreen('s-lager')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="ftl">Einstellungen</span>
    <div style="width:36px"></div>
  </div>
  <div class="fb" id="st-body"></div>
</div>

</div></div>
<div id="global-nav" style="position:fixed;bottom:0;left:0;right:0;z-index:200;max-width:600px;margin:0 auto"></div>
<div id="toast"></div>
<div id="ldr"><div class="ldb"><div class="spn"></div><div class="ldm" id="ldr-msg">Lädt...</div></div></div>
<div id="update-banner">
  <span>Neue Version verfügbar</span>
  <button onclick="applyUpdate()">Aktualisieren</button>
</div>

<div id="invcap-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:6000;flex-direction:column">
  <div id="invcap-content" style="display:flex;flex-direction:column;height:100%;overflow:hidden"></div>
</div>
<div id="inventur-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:6000;flex-direction:column">
  <div id="inventur-content" style="display:flex;flex-direction:column;height:100%;overflow:hidden"></div>
</div>
<div id="laden-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:6000;flex-direction:column">
  <div id="laden-content" style="display:flex;flex-direction:column;height:100%;overflow:hidden"></div>
</div>
<div id="quittung-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;align-items:flex-end;justify-content:center">
  <div style="background:var(--sf);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom)">

  dirty=true;sdot('dt');

/* ── GitHub API ───────────────────────────────────────────────────── */
async function ghReq(path,method,body){
  if(!gh.tok||!gh.own||!gh.repo)throw new Error('GitHub nicht konfiguriert');
  const isGet=!method||method==='GET';
  const r=await fetch('https://api.github.com/repos/'+gh.own+'/'+gh.repo+path,{
    method:method||'GET',
    headers:{
      'Authorization':'token '+gh.tok,
      'Content-Type':'application/json',
      'Accept':'application/vnd.github.v3+json',
    },
    // cache:'no-store' nur für GET — verhindert Browser-Cache ohne CORS-Problem
    ...(isGet?{cache:'no-store'}:{}),
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){
    const t=await r.text();
    let msg='GitHub '+r.status;
    // Verständliche Meldungen für häufige Fehler
    if(r.status===401){
      msg='Token ungültig oder abgelaufen (401). Bitte in den Einstellungen ein neues GitHub-Token eintragen.';
    }else if(r.status===403){
      // 403 kann Rate-Limit ODER fehlende Berechtigung sein
      const remaining=r.headers.get('x-ratelimit-remaining');
      if(remaining==='0'){
        const reset=r.headers.get('x-ratelimit-reset');
        const resetTime=reset?new Date(parseInt(reset)*1000).toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}):'';
        msg='GitHub-Limit erreicht (403). Bitte später erneut versuchen'+(resetTime?' (zurückgesetzt um '+resetTime+')':'')+'.';
      }else if(/rate limit/i.test(t)){
        msg='GitHub-Limit erreicht (403). Bitte einige Minuten warten.';
      }else{
        msg='Zugriff verweigert (403). Token braucht «repo»-Scope (classic) bzw. «Contents: Read and write» (fine-grained) für dieses Repo. Ggf. Token neu erstellen.';
      }
    }else if(r.status===404){
      msg='Repository nicht gefunden (404). Prüfe Benutzername «'+esc(gh.own)+'» und Repo «'+esc(gh.repo)+'» in den Einstellungen.';
    }else if(r.status===409){
      msg='Konflikt (409) — bitte erneut synchronisieren.';
    }else{
      msg='GitHub '+r.status+': '+t.slice(0,120);
    }
    const err=new Error(msg);err.status=r.status;throw err;
  }
  return r.status===204?null:r.json();
}
async function ghGet(path){try{return await ghReq('/contents/'+path);}catch(e){return null;}}
function b64DecodeUtf8(b64){
  // Mirrors the encode side (encodeURIComponent → unescape → btoa) in reverse,
  // so umlauts and other non-ASCII characters survive the round-trip through GitHub.
  return decodeURIComponent(escape(atob(b64)));
}
async function ghPut(path,content,msg,sha){
  const b64=btoa(unescape(encodeURIComponent(content)));
  const body={message:msg,content:b64,branch:gh.br};
  if(sha)body.sha=sha;
  return ghReq('/contents/'+path,'PUT',body);
}
async function ghPutBin(path,b64raw,msg,sha){
  const b64=b64raw.includes(',')?b64raw.split(',')[1]:b64raw;
  const body={message:msg,content:b64,branch:gh.br};
  if(sha)body.sha=sha;
  return ghReq('/contents/'+path,'PUT',body);
}
async function ghDel(path,msg,sha){
  return ghReq('/contents/'+path,'DELETE',{message:msg,sha:sha,branch:gh.br});
}
async function uploadFoto(b64,fn){
  const path='bilder/'+fn;
  const ex=await ghGet(path);
  await ghPutBin(path,b64,'Foto: '+fn,ex?ex.sha:undefined);
  return 'https://raw.githubusercontent.com/'+gh.own+'/'+gh.repo+'/'+gh.br+'/'+path;
}

async function doSync(){
  if(!gh.tok||!gh.own||!gh.repo){toast('GitHub noch nicht konfiguriert');goScreen('s-settings');return;}
  ldr('Synchronisiere mit GitHub...');sdot('sy');
  try{
    // Nachträglicher Foto-Upload: Artikel, deren Foto noch lokal als Base64 vorliegt
    // (z.B. angelegt bevor GitHub konfiguriert war), werden jetzt hochgeladen.
    const pending=S.a.filter(a=>a.foto&&a.foto.startsWith('data:'));
    if(pending.length){
      ldr('Lade '+pending.length+' Foto(s) hoch…');
      for(const a of pending){
        try{
          const fn=a.fotoPath||(Date.now()+'_'+a.id+'.jpg');
          const url=await uploadFoto(a.foto,fn);
          a.foto=url;
          a.fotoPath=fn;
        }catch(e){
          console.error('Foto-Upload fehlgeschlagen für',a.name,e);
        }
      }
      saveL();
      ldr('Synchronisiere mit GitHub...');
    }

    let ex=await ghGet('haushaltbuch.json');

    // Sicherheitscheck: Hat GitHub mehr Artikel als lokal? → vor Überschreiben warnen
    if(ex&&ex.content){
      try{
        const ghData=JSON.parse(b64DecodeUtf8(ex.content.replace(/\n/g,'')));
        const ghCount=(ghData.artikel||[]).length;
        const lokalCount=S.a.length;
        if(ghCount>lokalCount){
          hideLdr();
          const diff=ghCount-lokalCount;
          const ghZeit=ghData.aktualisiert?new Date(ghData.aktualisiert).toLocaleString('de-CH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'unbekannt';
          const wahl=confirm(
            '⚠️ ACHTUNG — möglicher Datenverlust!\n\n'+
            'Auf GitHub liegen MEHR Artikel als auf diesem Gerät:\n\n'+
            '   GitHub: '+ghCount+' Artikel (Stand '+ghZeit+')\n'+
            '   Dieses Gerät: '+lokalCount+' Artikel\n\n'+
            'Wenn du jetzt hochlädst, werden die '+diff+' zusätzlichen Artikel auf GitHub ÜBERSCHRIEBEN.\n\n'+
            '• ABBRECHEN (empfohlen): Erst «Von GitHub laden», um den grösseren Stand zu holen.\n'+
            '• OK: Trotzdem hochladen und GitHub mit diesem Gerät überschreiben.'
          );
          if(!wahl){
            sdot('dt');renderLager();return;
          }
          ldr('Synchronisiere mit GitHub...');
        }
      }catch(e){/* Vergleich fehlgeschlagen — normal fortfahren */}
    }

    // Backup-Rotation: max. 1x täglich den alten Stand als Backup sichern (5er-Rotation)
    if(ex&&ex.content){
      try{
        const lastBk=parseInt(localStorage.getItem('hb_last_backup')||'0');
        if(Date.now()-lastBk>20*3600*1000){ // >20h seit letztem Backup
          const bkIdx=(parseInt(localStorage.getItem('hb_backup_idx')||'0')%5)+1;
          const bkName='haushaltbuch_backup_'+bkIdx+'.json';
          const bkEx=await ghGet(bkName).catch(()=>null);
          const oldContent=b64DecodeUtf8(ex.content.replace(/\n/g,''));
          await ghPut(bkName,oldContent,'Backup vor Sync',bkEx?bkEx.sha:undefined);
          localStorage.setItem('hb_last_backup',String(Date.now()));
          localStorage.setItem('hb_backup_idx',String(bkIdx));
        }
      }catch(e){/* Backup-Fehler nicht kritisch */}
    }

    const exp={artikel:S.a.map(a=>({...a})),lagerorte:S.lo,kategorien:S.ka,einheiten:S.ei,geschaefte:S.ge||[],einkauf:S.ek,einkaufOverrides:S.eko||{},log:S.log||[],aktualisiert:new Date().toISOString()};
    const expJson=JSON.stringify(exp,null,2);
    let putRes;
    let attempts=0;
    while(attempts<3){
      try{
        putRes=await ghPut('haushaltbuch.json',expJson,'Haushaltbuch Update',ex?ex.sha:undefined);
        break; // Erfolg
      }catch(e){
        if(e.message&&e.message.includes('409')&&attempts<2){
          attempts++;
          ldr('Konflikt — Versuch '+(attempts+1)+'/3...');
          await new Promise(r=>setTimeout(r,500));
          ex=await ghGet('haushaltbuch.json');
        }else throw e;
      }
    }
    // Kurz warten dann zurücklesen zur Verifikation
    await new Promise(r=>setTimeout(r,1000));
    const verify=await ghGet('haushaltbuch.json');
    if(verify&&verify.content){
      try{
        const vd=JSON.parse(b64DecodeUtf8(verify.content.replace(/\n/g,'')));
        const ghCount=(vd.artikel||[]).length;
        if(ghCount!==S.a.length){
          sdot('dt');
          toast('⚠️ Sync-Konflikt: Lokal '+S.a.length+' aber GitHub hat '+ghCount+' — nochmals synchronisieren');
          hideLdr();renderLager();return;
        }
      }catch(e){}
    }
    // Load rezepte.json (aus haushaltbuch-Repo, falls vorhanden)
    const rzf=await ghGet('rezepte.json');
    if(rzf&&rzf.content){
      try{
        const j=JSON.parse(b64DecodeUtf8(rzf.content.replace(/\n/g,'')));
        S.rz=Array.isArray(j)?j:(j.rezepte||[]);
        saveL();
      }catch(e){}
    }
    dirty=false;sdot('ok');hideLdr();
    toast('Synchronisiert: '+S.a.length+' Artikel auf GitHub geschrieben');
    renderLager();
  }catch(err){
    hideLdr();sdot('dt');
    // Bei Token-/Berechtigungsfehlern die volle Erklärung zeigen (nicht abschneiden)
    if(err.status===401||err.status===403||err.status===404){
      alert('Synchronisierung fehlgeschlagen\n\n'+err.message);
    }else{
      toast('Fehler: '+err.message.slice(0,70));
    }
  }
}

async function loadFromGH(){
  if(!gh.tok||!gh.own||!gh.repo)return;
  ldr('Lade von GitHub...');
  try{
    const f=await ghGet('haushaltbuch.json');
    if(f&&f.content){
      const d=JSON.parse(b64DecodeUtf8(f.content.replace(/\n/g,'')));
      const ghArtikel=d.artikel||[];
      // Warnung wenn lokaler Stand mehr Artikel hat als GitHub (unsynced local changes)
      if(S.a.length>ghArtikel.length){
        hideLdr();
        const diff=S.a.length-ghArtikel.length;
        const ghZeit=d.aktualisiert?new Date(d.aktualisiert).toLocaleString('de-CH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'unbekannt';
        if(!confirm('⚠️ Achtung: Dieses Gerät hat MEHR Artikel als GitHub!\n\n   Dieses Gerät: '+S.a.length+' Artikel\n   GitHub: '+ghArtikel.length+' Artikel (Stand '+ghZeit+')\n\nWenn du lädst, werden die '+diff+' zusätzlichen lokalen Artikel ÜBERSCHRIEBEN.\n\n• ABBRECHEN (empfohlen): Erst synchronisieren (Sync-Button), um dieses Gerät auf GitHub zu sichern.\n• OK: Trotzdem laden und lokale Daten überschreiben.')){
          return;
        }
        ldr('Lade von GitHub...');
      }
      S.a=ghArtikel;S.ge=d.geschaefte||[...GD];S.lo=d.lagerorte||[...LD];S.ka=d.kategorien||[...KD];S.ei=d.einheiten||[...ED];S.ek=d.einkauf||[];S.eko=d.einkaufOverrides||{};S.log=d.log||[];
      S.nid=S.a.length?Math.max(...S.a.map(x=>x.id||0))+1:1;
      saveL();
    }
    const rzf=await ghGet('rezepte.json');
    if(rzf&&rzf.content){
      try{const j=JSON.parse(b64DecodeUtf8(rzf.content.replace(/\n/g,'')));S.rz=Array.isArray(j)?j:(j.rezepte||[]);saveL();}catch(e){}
    }
    sdot('ok');hideLdr();toast('Daten von GitHub geladen ('+S.a.length+' Artikel)');renderLager();
  }catch(err){hideLdr();toast('Fehler: '+err.message.slice(0,50));}
}

/* ── Live-Kamera-Scanner (Quagga2) ────────────────────────────────── */
let qTargetInputId=null;
let qOnResult=null;
let qContinuous=false;
let qRunning=false;
let qLastCode='';
let qLastTime=0;

function cameraApiAvailable(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
}
function httpsOk(){
  return location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';
}
function camScannerHTML(id){
  return '<div class="cam-wrap" id="cam-'+id+'">'+
    '<button class="cam-close" onclick="closeScanner()">'+I.xc+'</button>'+
    '<div id="camv-'+id+'" style="width:100%;position:relative"></div>'+
    '<div class="cam-frame"></div>'+
    '<div class="cam-hint">Barcode schräg oder gerade halten</div>'+
  '</div><div class="cam-err" id="camerr-'+id+'"></div>';
}
function showCamErr(id,msg){
  const e=document.getElementById('camerr-'+id);
  if(e){e.textContent=msg;e.style.display='block';}
  const w=document.getElementById('cam-'+id);
  if(w)w.style.display='none';
}
function hideCamErr(id){const e=document.getElementById('camerr-'+id);if(e)e.style.display='none';}
function flashScanOk(id,code){toast('Barcode erkannt: '+code);}

async function openScanner(targetInputId,onResult,continuous){
  qTargetInputId=targetInputId;
  qOnResult=onResult||null;
  qContinuous=!!continuous;
  qLastCode='';qLastTime=0;

  const wrap=document.getElementById('cam-'+targetInputId);
  if(!wrap)return;
  if(!httpsOk()){showCamErr(targetInputId,'Kamera benötigt HTTPS.');return;}
  if(!cameraApiAvailable()){showCamErr(targetInputId,'Kein Kamerazugriff (getUserMedia fehlt).');return;}
  if(!window.Quagga){showCamErr(targetInputId,'Scanner-Bibliothek lädt noch — bitte kurz warten und nochmal versuchen.');return;}

  wrap.style.display='block';
  hideCamErr(targetInputId);

  const viewportEl=document.getElementById('camv-'+targetInputId);
  if(!viewportEl)return;

  if(qRunning){Quagga.stop();qRunning=false;}

  Quagga.init({
    inputStream:{
      type:'LiveStream',
      target:viewportEl,
      constraints:{
        facingMode:'environment',
        width:{ideal:1280},
        height:{ideal:720},
      },
      area:{top:'20%',left:'5%',right:'5%',bottom:'20%'},
    },
    decoder:{
      readers:[
        'ean_reader',
        'ean_8_reader',
        'upc_reader',
        'code_128_reader',
        'code_39_reader',
      ],
      multiple:false,
    },
    locate:true,
    numOfWorkers:2,
    frequency:10,
  },err=>{
    if(err){
      let msg='Kamera-Fehler: '+(err.message||err);
      if(/permission|denied/i.test(msg))msg='Kamera-Berechtigung verweigert — bitte in den Browser-Einstellungen erlauben.';
      showCamErr(targetInputId,msg);
      wrap.style.display='none';
      return;
    }
    qRunning=true;
    Quagga.start();
    // BarcodeDetector API parallel starten (Chrome/Android — liest QR-Codes)
    startBarcodeDetector(viewportEl,targetInputId);
  });

  Quagga.offDetected();
  Quagga.onDetected(result=>{
    const code=result&&result.codeResult&&result.codeResult.code;
    if(!code)return;
    const err=result.codeResult.decodedCodes
      .filter(c=>c.error!==undefined)
      .reduce((s,c)=>s+c.error,0)/Math.max(1,result.codeResult.decodedCodes.filter(c=>c.error!==undefined).length);
    if(err>0.25)return;
    const now=Date.now();
    if(code===qLastCode&&(now-qLastTime)<2500)return;
    qLastCode=code;qLastTime=now;
    if(navigator.vibrate)navigator.vibrate(80);
    if(!qContinuous){closeScanner();const input=document.getElementById(targetInputId);if(input)input.value=code;}
    if(qOnResult)qOnResult(code);
    else flashScanOk(targetInputId,code);
  });
}

let bdDetector=null;
let bdLoop=null;
async function startBarcodeDetector(videoContainer,targetInputId){
  if(!window.BarcodeDetector)return; // nicht verfügbar (z.B. Firefox, ältere Browser)
  try{
    const supported=await BarcodeDetector.getSupportedFormats();
    const formats=supported.filter(f=>['qr_code','ean_13','ean_8','code_128','code_39','upc_a','upc_e'].includes(f));
    if(!formats.length)return;
    bdDetector=new BarcodeDetector({formats});
    // Video-Element aus dem Quagga-Container holen
    const scanLoop=async()=>{
      if(!qRunning||!bdDetector)return;
      const video=videoContainer.querySelector('video');
      if(video&&video.readyState===4){
        try{
          const codes=await bdDetector.detect(video);
          for(const c of codes){
            const code=c.rawValue;
            if(!code)continue;
            const now=Date.now();
            if(code===qLastCode&&(now-qLastTime)<2500)continue;
            qLastCode=code;qLastTime=now;
            if(navigator.vibrate)navigator.vibrate(80);
            if(!qContinuous){closeScanner();const input=document.getElementById(targetInputId);if(input)input.value=code;}
            if(qOnResult)qOnResult(code);
            else flashScanOk(targetInputId,code);
            return;
          }
        }catch(e){}
      }
      bdLoop=requestAnimationFrame(scanLoop);
    };
    bdLoop=requestAnimationFrame(scanLoop);
  }catch(e){}
}

function closeScanner(){
  if(qRunning){
    try{Quagga.stop();}catch(e){}
    qRunning=false;
  }
  Quagga.offDetected();
  if(bdLoop){cancelAnimationFrame(bdLoop);bdLoop=null;}
  bdDetector=null;
  document.querySelectorAll('.cam-wrap').forEach(w=>w.style.display='none');
}

/* ── Open Food Facts Lookup ───────────────────────────────────────── */
async function lookupOFF(barcode,statusElId){
  const statusEl=document.getElementById(statusElId);
  if(!barcode){if(statusEl){statusEl.className='lookup-status err';statusEl.innerHTML='Bitte zuerst einen Barcode eingeben.';}return null;}
  if(statusEl){statusEl.className='lookup-status busy';statusEl.innerHTML='<span class="spn" style="width:14px;height:14px;border-width:2px"></span> Suche Produktdaten...';}
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(barcode)+'.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.status!==1||!data.product){
      if(statusEl){statusEl.className='lookup-status err';statusEl.innerHTML=I.xc+' Kein Produkt zu diesem Barcode gefunden.';}
      return null;
    }
    const p=data.product;
    // Menge + Einheit aus quantity/product_quantity ableiten
    let pkgMenge='',pkgEinheit='';
    if(p.product_quantity&&p.product_quantity_unit){
      pkgMenge=String(p.product_quantity);
      pkgEinheit=mapOFFUnit(p.product_quantity_unit);
    }else if(p.quantity){
      const qm=String(p.quantity).match(/([\d.,]+)\s*(kg|g|l|dl|cl|ml|stk|stück|pièces?|x)/i);
      if(qm){pkgMenge=qm[1].replace(',','.');pkgEinheit=mapOFFUnit(qm[2]);}
    }
    // Labels (Bio, Vegan etc.)
    const labelsRaw=(p.labels_tags||[]).join(' ').toLowerCase();
    const labels=[];
    if(/organic|bio|biologique/.test(labelsRaw))labels.push('Bio');
    if(/\bvegan\b/.test(labelsRaw))labels.push('Vegan');
    if(/vegetarian|végétarien/.test(labelsRaw))labels.push('Vegetarisch');
    if(/gluten-free|sans-gluten|glutenfrei/.test(labelsRaw))labels.push('Glutenfrei');
    if(/lactose-free|sans-lactose|laktosefrei/.test(labelsRaw))labels.push('Laktosefrei');
    // Nährwerte pro 100g/100ml
    const n=p.nutriments||{};
    const naehr={
      kcal:n['energy-kcal_100g']!==undefined?Math.round(n['energy-kcal_100g']):null,
      fett:n.fat_100g!==undefined?n.fat_100g:null,
      kh:n.carbohydrates_100g!==undefined?n.carbohydrates_100g:null,
      zucker:n.sugars_100g!==undefined?n.sugars_100g:null,
      eiweiss:n.proteins_100g!==undefined?n.proteins_100g:null,
      salz:n.salt_100g!==undefined?n.salt_100g:null,
    };
    const hatNaehr=Object.values(naehr).some(v=>v!==null);
    // Kaufort-Hinweis (oft leer, aber manchmal nützlich)
    const storesRaw=(p.stores||'').split(',').map(s=>s.trim()).filter(Boolean);
    const result={
      name:p.product_name_de||p.product_name||p.generic_name||'',
      marke:p.brands?p.brands.split(',')[0].trim():'',
      foto:p.image_front_url||p.image_url||'',
      kat:mapOFFCategory(p.categories_tags||[]),
      pkgMenge,pkgEinheit,
      labels,
      naehr:hatNaehr?naehr:null,
      nutriscore:(p.nutriscore_grade||'').toUpperCase(),
      stores:storesRaw,
    };
    if(statusEl){
      const extras=[];
      if(pkgMenge)extras.push(pkgMenge+' '+pkgEinheit);
      if(labels.length)extras.push(labels.join(', '));
      if(storesRaw.length)extras.push('Kaufort: '+storesRaw.join(', '));
      statusEl.className='lookup-status ok';
      statusEl.innerHTML=I.chk+' Produkt gefunden: '+esc(result.name||barcode)+(extras.length?' <span style="color:var(--t2)">('+esc(extras.join(' · '))+')</span>':'');
    }
    return result;
  }catch(e){
    if(statusEl){statusEl.className='lookup-status err';statusEl.innerHTML=I.xc+' Online-Suche fehlgeschlagen (keine Verbindung?).';}
    return null;
  }
}
function mapOFFUnit(u){
  const x=String(u||'').toLowerCase().trim();
  if(/^(g|gramm|gram)$/.test(x))return 'g';
  if(/^(kg|kilo)/.test(x))return 'kg';
  if(/^(l|liter|litre)$/.test(x))return 'l';
  if(/^dl$/.test(x))return 'dl';
  if(/^cl$/.test(x))return 'ml'; // cl → ml (×10 müsste separat, aber selten)
  if(/^ml$/.test(x))return 'ml';
  if(/^(stk|stück|pièce|piece|x)/.test(x))return 'Stk';
  return x;
}
function mapOFFCategory(tags){
  const t=tags.join(' ').toLowerCase();
  if(/milk|dairy|cheese|yogurt|cream/.test(t))return 'Milchprodukte';
  if(/meat|fish|poultry|sausage/.test(t))return 'Fleisch & Fisch';
  if(/vegetable|fruit/.test(t))return 'Gemüse & Früchte';
  if(/frozen/.test(t))return 'Tiefkühl';
  if(/beverage|drink|water|juice|soda|wine|beer/.test(t))return 'Getränke';
  if(/canned|pasta|rice|cereal|flour/.test(t))return 'Konserven & Trockenware';
  if(/bread|bakery|pastry/.test(t))return 'Backwaren & Brot';
  if(/spice|sauce|condiment|oil|vinegar/.test(t))return 'Gewürze & Saucen';
  if(/sweet|chocolate|candy|snack/.test(t))return 'Süsswaren';
  if(/clean|hygiene|detergent/.test(t))return 'Reinigung & Pflege';
  return '';
}

// Android/Chrome + Passwortmanager davon abhalten, Text-/Zahlenfelder als Login/Passwort zu behandeln
let _afCounter=0;
function suppressAutofill(root){
  const scope=root||document;
  scope.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]):not([type="file"]):not([type="date"]),textarea,select').forEach(el=>{
    if(el.dataset._afDone)return;
    const isPw=el.type==='password';
    // Passwortfeld (GitHub Token): als "new-password" markieren → keine gespeicherten Logins
    el.setAttribute('autocomplete',isPw?'new-password':'off');
    el.setAttribute('autocorrect','off');
    el.setAttribute('autocapitalize','off');
    el.setAttribute('spellcheck','false');
    el.setAttribute('data-1p-ignore','');
    el.setAttribute('data-lpignore','true');
    el.setAttribute('data-form-type','other');
    // Eindeutiger name/id-loser Name verhindert Heuristik-Zuordnung zu Login-Formularen
    if(!el.getAttribute('name'))el.setAttribute('name','f_'+(el.id||('x'+(++_afCounter)))+'_'+(++_afCounter));
    el.dataset._afDone='1';
  });
}

  if(sortMode==='ablauf'){
    // Bestand 0 und manuell ignorierte ans Ende
    const ignoriert=fil.filter(a=>a.ablaufIgnoriert);
    const aktiv=fil.filter(a=>!a.ablaufIgnoriert);
    const mitBestand=aktiv.filter(a=>a.menge>0);
    const ohneBestand=aktiv.filter(a=>a.menge<=0).sort((a,b)=>a.name.localeCompare(b.name,'de'));
    const withDate=mitBestand.filter(a=>a.ablaufdatum).sort((a,b)=>a.ablaufdatum.localeCompare(b.ablaufdatum));
    const withoutDate=mitBestand.filter(a=>!a.ablaufdatum).sort((a,b)=>a.name.localeCompare(b.name,'de'));
    const ignorSorted=ignoriert.sort((a,b)=>a.name.localeCompare(b.name,'de'));

      }

    // Fallback: kaufdatum in ms, sonst 0
    const stamp=a=>letzterEingang[a.id]||(a.kaufdatum?new Date(a.kaufdatum).getTime():0);

function relTime(a){
  // Letzter Eingang aus Log, sonst kaufdatum
  let ms=0;
  (S.log||[]).forEach(l=>{if(l.t==='ein'&&l.aid===a.id&&l.zeit>ms)ms=l.zeit;});
  if(!ms&&a.kaufdatum)ms=new Date(a.kaufdatum).getTime();
  if(!ms)return 'unbekannt';
  const diff=Date.now()-ms;
  const tag=Math.floor(diff/(24*3600*1000));
  if(tag<=0)return 'heute';
  if(tag===1)return 'gestern';
  if(tag<7)return 'vor '+tag+' Tagen';
  if(tag<30)return 'vor '+Math.floor(tag/7)+' Woche'+(Math.floor(tag/7)===1?'':'n');
  return fmtDateCH(new Date(ms).toISOString().slice(0,10));
}

  const hist=(a.preisHistorie||[]).slice().reverse();

    if(h.typ!=='aus'&&h.preis>0&&h.kaufort){

    const min=Math.min(...preise),max=Math.max(...preise);
    const range=max-min||1;
    const w=280,hgt=48,pad=4;
    const pts=preise.map((p,i)=>{
      const x=pad+(i/(preise.length-1))*(w-pad*2);
      const y=hgt-pad-((p-min)/range)*(hgt-pad*2);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    const erster=preise[0],letzter=preise[preise.length-1];

      '<div style="padding:10px 14px">'+
      '<svg viewBox="0 0 '+w+' '+hgt+'" style="width:100%;height:'+hgt+'px">'+
        '<polyline points="'+pts+'" fill="none" stroke="var(--ac)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
        preise.map((p,i)=>{

function editPreisHistorie(artikelId,idx){
  const a=S.a.find(x=>x.id===artikelId);
  if(!a||!a.preisHistorie||!a.preisHistorie[idx])return;
  const h=a.preisHistorie[idx];
  // Preis bearbeiten
  const neuerPreis=prompt('Preis (CHF):',h.preis.toFixed(2));
  if(neuerPreis===null)return;
  const p=parseFloat(neuerPreis.replace(',','.'));
  if(isNaN(p)||p<0){alert('Ungültiger Preis');return;}
  // Datum bearbeiten
  const neuesDatum=prompt('Datum (JJJJ-MM-TT):',h.datum||todayISO());
  if(neuesDatum===null)return;
  if(neuesDatum&&!/^\d{4}-\d{2}-\d{2}$/.test(neuesDatum)){alert('Datum im Format JJJJ-MM-TT eingeben');return;}
  // Menge
  const neueMenge=prompt('Menge:',h.menge||1);
  if(neueMenge===null)return;
  const m=parseInt(neueMenge)||1;
  // Aktion-Flag
  const aktion=confirm('Aktionspreis?\n(OK = Ja, Abbrechen = Nein)');
  a.preisHistorie[idx]={...h,preis:p,datum:neuesDatum||h.datum,menge:m,aktion};
  // Wenn dieser Eintrag der aktuellste ist und kein Aktionspreis: Standardpreis aktualisieren
  if(idx===a.preisHistorie.length-1&&!aktion)a.preis=p;
  saveL();showDet(artikelId);toast('Preisverlauf aktualisiert');
}
function delPreisHistorie(artikelId,idx){
  const a=S.a.find(x=>x.id===artikelId);
  if(!a||!a.preisHistorie||!a.preisHistorie[idx])return;
  const h=a.preisHistorie[idx];
  if(!confirm('Eintrag «CHF '+h.preis.toFixed(2)+' vom '+fmtDateCH(h.datum)+'» löschen?'))return;
  a.preisHistorie.splice(idx,1);
  // Standardpreis auf letzten Nicht-Aktionspreis setzen
  const letzte=a.preisHistorie.filter(e=>!e.aktion);
  if(letzte.length)a.preis=letzte[letzte.length-1].preis;
  saveL();showDet(artikelId);toast('Eintrag gelöscht');
}
/* ── Packungen (Multi-MHD pro Artikel) ───────────────────────────── */
let nextPackId=1;
function newPackId(){return nextPackId++;}

// Findet Artikel anhand Haupt-Barcode, Zusatz-Barcodes oder eigenem Code
function artikelByCode(code){
  if(!code)return null;
  const c=String(code).trim();
  return S.a.find(a=>
    (a.barcode&&a.barcode===c)||
    (a.ownCode&&a.ownCode===c)||
    (Array.isArray(a.barcodes)&&a.barcodes.includes(c))
  )||null;
}
// Alle Codes eines Artikels als Array
function alleCodes(a){
  const codes=[];
  if(a.barcode)codes.push(a.barcode);
  if(Array.isArray(a.barcodes))a.barcodes.forEach(b=>{if(b&&!codes.includes(b))codes.push(b);});
  return codes;
}

// Migration: Artikel ohne packungen-Array bekommen einen Eintrag aus bestehendem MHD
function ensurePackungen(a){
  if(!a.packungen||!Array.isArray(a.packungen)||a.packungen.length===0){
    a.packungen=[{id:newPackId(),menge:a.menge,kaufdatum:a.kaufdatum||todayISO(),ablaufdatum:a.ablaufdatum||''}];
  }
  // ablaufdatum immer aus Packungen synchronisieren
  const withDate=a.packungen.filter(p=>p.menge>0&&p.ablaufdatum).sort((x,y)=>x.ablaufdatum.localeCompare(y.ablaufdatum));
  if(withDate.length)a.ablaufdatum=withDate[0].ablaufdatum;
}

// Gesamtbestand aus Packungen berechnen und a.menge synchronisieren
function syncMenge(a){
  if(a.packungen&&a.packungen.length){
    a.menge=a.packungen.reduce((s,p)=>s+(p.menge||0),0);
    a.packungen=a.packungen.filter(p=>p.menge>0);
    const withDate=a.packungen.filter(p=>p.ablaufdatum).sort((x,y)=>x.ablaufdatum.localeCompare(y.ablaufdatum));
    if(withDate.length)a.ablaufdatum=withDate[0].ablaufdatum;
    // (kein Löschen mehr: letztes bekanntes MHD bleibt als Referenz)
    // kaufdatum = neuestes Kaufdatum
    const sorted=a.packungen.slice().sort((x,y)=>y.kaufdatum.localeCompare(x.kaufdatum));
    if(sorted.length)a.kaufdatum=sorted[0].kaufdatum;
  }
}

function chgB(id,d){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  ensurePackungen(a);
  const aktive=a.packungen.filter(p=>p.menge>0);
  
  if(d>0){
    // EINGANG: +1 — immer nach neuem MHD fragen (optional)
    showEingangMhdDialog(a);
    return;
  }
  
  // AUSGANG: −1
  if(a.menge<=0){toast('Bestand bereits 0');return;}
  if(aktive.length<=1){
    // Nur eine Packung → direkt verringern
    if(aktive.length===1){
      aktive[0].menge=Math.max(0,aktive[0].menge-1);
    }
    syncMenge(a);saveL();
    addLogEntry('aus',a.id,a.name,a.lager,a.kat,1,a.einheit,0);
    toast('−1 entnommen');showDet(id);
  }else{
    // Mehrere Packungen mit verschiedenen MHDs → Auswahl
    const uniqueMhd=[...new Set(aktive.map(p=>p.ablaufdatum||''))];
    if(uniqueMhd.length<=1){
      // Alle gleich → älteste direkt reduzieren
      aktive.sort((x,y)=>(x.kaufdatum||'').localeCompare(y.kaufdatum||''));
      aktive[0].menge=Math.max(0,aktive[0].menge-1);
      syncMenge(a);saveL();
      addLogEntry('aus',a.id,a.name,a.lager,a.kat,1,a.einheit,0);
      toast('−1 entnommen');showDet(id);
    }else{
      showPackDialog(a,'aus');
    }
  }
}

function doEingangSchnell(artikelId){
  const a=S.a.find(x=>x.id===artikelId);if(!a)return;
  const decOk=isDecUnit(a.einheit);

  toast('+'+fmtMenge(menge)+' eingelagert'+(mhd?' (MHD '+fmtDateCH(mhd)+')':''));

function doPackChange(artikelId,packId,typ){
  const a=S.a.find(x=>x.id===artikelId);if(!a)return;
  const p=a.packungen.find(x=>x.id===packId);if(!p)return;
  if(typ==='ein'){
    p.menge++;
  }else{
    p.menge=Math.max(0,p.menge-1);
  }
  syncMenge(a);saveL();
  addLogEntry(typ,a.id,a.name,a.lager,a.kat,1,a.einheit,0);
  const dlg=document.getElementById('pack-dlg');if(dlg)dlg.remove();
  toast(typ==='ein'?'+1 eingelagert (MHD '+(p.ablaufdatum?fmtDateCH(p.ablaufdatum):'—')+')':'−1 entnommen (MHD '+(p.ablaufdatum?fmtDateCH(p.ablaufdatum):'—')+')');
  showDet(artikelId);
}

function doPackNew(artikelId){
  const a=S.a.find(x=>x.id===artikelId);if(!a)return;

function mergeArtikel(zielId,quelleId){
  const ziel=S.a.find(x=>x.id===zielId);
  const quelle=S.a.find(x=>x.id===quelleId);
  if(!ziel||!quelle)return;
  if(!confirm('«'+quelle.name+'» in «'+ziel.name+'» eingliedern?\n\nBestand: '+ziel.menge+' + '+quelle.menge+' = '+(ziel.menge+quelle.menge)+' '+(ziel.einheit||'Stk')+'\n\nDies kann nicht rückgängig gemacht werden.'))return;

  ensurePackungen(ziel);
  ensurePackungen(quelle);
  // Packungen übernehmen (mit neuen IDs zur Kollisionsvermeidung)
  quelle.packungen.forEach(p=>{
    if(p.menge>0)ziel.packungen.push({id:newPackId(),menge:p.menge,kaufdatum:p.kaufdatum,ablaufdatum:p.ablaufdatum||''});
  });
  // Barcodes zusammenführen: Quell-Hauptbarcode + Quell-Zusatzbarcodes werden Zusatzbarcodes am Ziel
  if(!Array.isArray(ziel.barcodes))ziel.barcodes=[];
  const zielCodes=new Set(alleCodes(ziel));
  alleCodes(quelle).forEach(c=>{
    if(c&&!zielCodes.has(c)){ziel.barcodes.push(c);zielCodes.add(c);}
  });
  // Preishistorie zusammenführen (chronologisch)
  if(!ziel.preisHistorie)ziel.preisHistorie=[];
  if(quelle.preisHistorie)ziel.preisHistorie.push(...quelle.preisHistorie);
  ziel.preisHistorie.sort((x,y)=>(x.datum||'').localeCompare(y.datum||''));
  // Log-Einträge der Quelle auf Ziel umhängen (Statistik bleibt konsistent)
  (S.log||[]).forEach(e=>{if(e.aid===quelleId){e.aid=zielId;e.name=ziel.name;}});
  // Falls Ziel kein Foto hat, Quell-Foto übernehmen
  if(!ziel.foto&&quelle.foto){ziel.foto=quelle.foto;ziel.fotoPath=quelle.fotoPath||'';}
  // Bestand neu berechnen
  syncMenge(ziel);
  // Quelle entfernen
  S.a=S.a.filter(x=>x.id!==quelleId);
  saveL();
  const dlg=document.getElementById('merge-dlg');
  if(dlg)dlg.remove();
  toast('✓ Zusammengeführt — «'+ziel.name+'»: '+ziel.menge+' '+(ziel.einheit||'Stk'));
  showDet(zielId);
}

function toEk(id){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  // Duplikat-Schutz
  if(S.ek.some(e=>e.text.toLowerCase()===a.name.toLowerCase()&&!e.checked)){
    toast('«'+a.name+'» ist schon auf der Einkaufsliste');return;
  }
  // Mengen-Warnung: wurde dieser Artikel oft verworfen?
  if(opt.fwMengenWarnung){
    const wegCount=(S.log||[]).filter(l=>l.t==='weg'&&l.name&&l.name.toLowerCase()===a.name.toLowerCase()).length;
    if(wegCount>=2){
      toast('💡 «'+a.name+'» hast du '+wegCount+'× verworfen — evtl. kleinere Menge kaufen');
    }
  }
  const fehlmenge=Math.max(1,(a.mindest||0)-a.menge);
  S.ek.push({id:Date.now(),text:a.name,menge:String(fehlmenge),einheit:a.einheit||'Stk',checked:false});
  saveL();toast('🛒 «'+a.name+'» zur Einkaufsliste hinzugefügt');
  renderLager();
}

async function doLookupForm(){
  const bc=document.getElementById('f-bc').value.trim();
  const result=await lookupOFF(bc,'lookup-status-f');
  if(!result)return;
  if(result.name&&!document.getElementById('f-nm').value.trim())document.getElementById('f-nm').value=result.name;
  if(result.marke&&!document.getElementById('f-mk').value.trim())document.getElementById('f-mk').value=result.marke;
  if(result.kat){
    const kc=document.querySelector('#f-ka .chip[data-kat="'+result.kat+'"]');
    if(kc){document.querySelectorAll('#f-ka .chip[data-kat]').forEach(c=>c.classList.remove('on'));kc.classList.add('on');}
  }
  // Verpackungsmenge + Einheit
  if(result.pkgMenge&&result.pkgEinheit){
    // Bei Gewicht/Volumen (Offen-Verkauf-Einheiten) → als Packungsgrösse
    const pgEl=document.getElementById('f-pg');
    const peEl=document.getElementById('f-pe');
    if(pgEl&&!pgEl.value.trim())pgEl.value=result.pkgMenge;
    if(peEl){
      const opt=[...peEl.options].find(o=>o.value===result.pkgEinheit);
      if(opt)peEl.value=result.pkgEinheit;
    }
    // Einheit des Artikels passend setzen wenn noch Default
    const eiEl=document.getElementById('f-ei');
    if(eiEl&&isDecUnit(result.pkgEinheit)){
      const opt=[...eiEl.options].find(o=>o.value===result.pkgEinheit);
      if(opt)eiEl.value=result.pkgEinheit;
    }
  }
  // Labels + Nährwerte in Notiz einfügen (nur wenn Notiz leer)
  const ntEl=document.getElementById('f-nt');
  if(ntEl&&!ntEl.value.trim()){
    const teile=[];
    if(result.labels&&result.labels.length)teile.push(result.labels.join(', '));
    if(result.nutriscore&&/^[A-E]$/.test(result.nutriscore))teile.push('Nutri-Score '+result.nutriscore);
    if(result.naehr){
      const n=result.naehr;
      const nz=[];
      if(n.kcal!==null)nz.push(n.kcal+' kcal');
      if(n.fett!==null)nz.push('Fett '+n.fett+'g');
      if(n.kh!==null)nz.push('KH '+n.kh+'g');
      if(n.eiweiss!==null)nz.push('Eiweiss '+n.eiweiss+'g');
      if(nz.length)teile.push('Pro 100g/ml: '+nz.join(', '));
    }
    if(teile.length)ntEl.value=teile.join('\n');
  }
  // Kaufort-Vorschlag aus OFF (nur als Hinweis, wenn kein Kaufort gesetzt)
  if(result.stores&&result.stores.length){
    const geChips=document.querySelectorAll('#f-ge .chip.on[data-ge]');
    const hatKaufort=geChips&&geChips.length>0;

/* ── Foodwaste: Überkauf-Erkennung ───────────────────────────────── */
// Analysiert Kauf- vs. Verbrauchsrhythmus eines Artikels aus dem Log
function ueberkaufHinweis(a){
  if(!opt.fwUeberkauf)return '';
  const eintraege=(S.log||[]).filter(l=>l.aid===a.id).sort((x,y)=>(x.zeit||0)-(y.zeit||0));
  const kaeufe=eintraege.filter(l=>l.t==='ein');
  const wegwerf=eintraege.filter(l=>l.t==='weg');
  // Nur aussagekräftig ab 3 Käufen
  if(kaeufe.length<3)return '';
  // Durchschnittlicher Kaufabstand in Tagen
  let summe=0,n=0;
  for(let i=1;i<kaeufe.length;i++){
    const d=((kaeufe[i].zeit||0)-(kaeufe[i-1].zeit||0))/86400000;
    if(d>0){summe+=d;n++;}
  }
  if(!n)return '';
  const schnitt=Math.round(summe/n);
  // Wenn oft weggeworfen wird → Überkauf-Signal
  if(wegwerf.length>=2){
    return '<div style="margin-top:14px;padding:11px 14px;background:var(--wl);color:var(--wn);border-radius:var(--rs);font-size:13px;line-height:1.5">📊 Du kaufst «'+esc(a.name)+'» ca. alle '+schnitt+' Tage, hast ihn aber schon '+wegwerf.length+'× weggeworfen. Eventuell seltener oder in kleinerer Menge kaufen.</div>';
  }
  return '';
}

// Kategorien/Namen, die sich gut einfrieren lassen
const EINFRIERBAR_KAT=['Fleisch & Fisch','Backwaren & Brot','Gemüse & Früchte'];
const NICHT_EINFRIERBAR=['salat','gurke','tomate','ei ','eier','rahm','joghurt','kartoffel'];
function istEinfrierbar(a){
  const n=(a.name||'').toLowerCase();
  if(NICHT_EINFRIERBAR.some(x=>n.includes(x)))return false;
  if(a.lager&&/gefrier|tiefk/i.test(a.lager))return false; // schon tiefgekühlt
  return EINFRIERBAR_KAT.includes(a.kat);
}
function markEingefroren(id){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  // Gefriertruhe als Lagerort suchen
  const gefrierLager=S.lo.find(l=>/gefrier|tiefk/i.test(l));
  const neu=new Date();neu.setMonth(neu.getMonth()+3); // konservativ 3 Monate
  const iso=neu.getFullYear()+'-'+String(neu.getMonth()+1).padStart(2,'0')+'-'+String(neu.getDate()).padStart(2,'0');
  if(!confirm('«'+a.name+'» einfrieren?\n\n• Neues Haltbarkeitsdatum: '+fmtDateCH(iso)+' (ca. 3 Monate)'+(gefrierLager?'\n• Lagerort wird auf «'+gefrierLager+'» gesetzt':'')+'\n\nGefrorene Lebensmittel bleiben mehrere Monate haltbar.'))return;
  a.ablaufdatum=iso;

/* ── Foodwaste: Anbruch/Geöffnet-Markierung ──────────────────────── */
function markGeoeffnet(id){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  const tage=anbruchHaltbarkeit(a.kat);
  const neu=new Date();neu.setDate(neu.getDate()+tage);
  const iso=neu.getFullYear()+'-'+String(neu.getMonth()+1).padStart(2,'0')+'-'+String(neu.getDate()).padStart(2,'0');
  let msg='«'+a.name+'» als geöffnet markieren?\n\nNach dem Öffnen ist '+a.kat+' typisch noch ca. '+tage+' Tag'+(tage===1?'':'e')+' haltbar.\n\n';
  if(a.ablaufdatum&&a.ablaufdatum<iso){
    msg+='Das aktuelle MHD ('+fmtDateCH(a.ablaufdatum)+') liegt früher — es bleibt bestehen.';
    if(!confirm(msg+'\n\nTrotzdem als geöffnet markieren?'))return;
    a.geoeffnet=todayISO();
  }else{
    msg+='Neues «Frisch bis»: '+fmtDateCH(iso)+' (statt '+(a.ablaufdatum?fmtDateCH(a.ablaufdatum):'ohne MHD')+')';
    if(!confirm(msg))return;
    a.geoeffnet=todayISO();
    a.ablaufdatum=iso;
    // Packungen-MHD anpassen (die aktuell offene = früheste)
    ensurePackungen(a);
    const offen=a.packungen.filter(p=>p.menge>0).sort((x,y)=>(x.ablaufdatum||'9999').localeCompare(y.ablaufdatum||'9999'))[0];
    if(offen)offen.ablaufdatum=iso;
  }
  saveL();toast('📂 Als geöffnet markiert — frisch bis '+fmtDateCH(a.ablaufdatum));
  showDet(id);
}

/* ── Foodwaste: Verworfen-Buchung ────────────────────────────────── */
function openVerworfen(id){
  const a=S.a.find(x=>x.id===id);if(!a)return;
  if(a.menge<=0){toast('Kein Bestand zum Verwerfen vorhanden');return;}
  const eingabe=prompt('Wieviel wurde verworfen/entsorgt?\n(Bestand: '+a.menge+' '+(a.einheit||'Stk')+')','1');
  if(eingabe===null)return;
  const menge=Math.min(a.menge,Math.max(1,parseInt(eingabe)||1));
  const wert=(a.preis||0)*menge/(a.packMenge&&a.menge?1:1); // Wert = Stückpreis × Menge
  if(!confirm(menge+' '+(a.einheit||'Stk')+' «'+a.name+'» als verworfen buchen?'+(a.preis?'\n\nGeschätzter Wert: CHF '+((a.preis||0)*menge).toFixed(2):''))){return;}
  // Von Packungen abbuchen (älteste zuerst — FIFO)
  ensurePackungen(a);
  let rest=menge;
  const sorted=a.packungen.filter(p=>p.menge>0).sort((x,y)=>{
    if(!x.ablaufdatum&&!y.ablaufdatum)return x.kaufdatum.localeCompare(y.kaufdatum);
    if(!x.ablaufdatum)return 1;if(!y.ablaufdatum)return -1;
    return x.ablaufdatum.localeCompare(y.ablaufdatum);
  });
  for(const p of sorted){
    if(rest<=0)break;
    const nimm=Math.min(p.menge,rest);
    p.menge-=nimm;rest-=nimm;
  }
  syncMenge(a);
  // Log mit Typ 'weg' + Wert
  if(!S.log)S.log=[];
  S.log.push({t:'weg',aid:a.id,name:a.name,lager:a.lager,kat:a.kat,menge,einheit:a.einheit||'Stk',preis:a.preis||0,aktion:false,datum:todayISO(),zeit:Date.now()});
  // Auch im Artikel-Verlauf vermerken
  if(!a.preisHistorie)a.preisHistorie=[];
  a.preisHistorie.push({datum:todayISO(),preis:0,menge,einheit:a.einheit||'Stk',typ:'weg',aktion:false});
  saveL();
  toast('🗑 '+menge+' '+(a.einheit||'Stk')+' als verworfen gebucht');
  showDet(id);
}
